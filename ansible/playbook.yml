---
# Host layer for Phase 2a (Story 2.1): provision a 3-node k3s cluster with EMBEDDED ETCD,
# then install ArgoCD + inject bootstrap creds. Responsibility boundary ENDS just before the
# root-app sync — the single MANUAL line
#   kubectl apply -f bootstrap/root-app.yaml
# is NOT owned by Ansible (see the final comment).
#
# This is a CLEAN bootstrap, NOT an in-place promotion of the Phase 1 SQLite node (AR9):
#   Play 1  node 1   — `--cluster-init` initializes etcd; capture the node token.
#   Play 2  nodes2/3 — join as `server` (NOT agent) so all three are control-plane + worker
#                      and etcd reaches quorum=3 (never settle at 2).
#   Play 3  node 1   — Helm + ArgoCD (installed ONCE) + repo Secret + Cloudflare DNS-01 token.
#                      + Story 2.2: un-default the bundled local-path StorageClass.
#   Play 0  all      — Story 2.2: Longhorn host prerequisites (runs first; see below).
#
# Token-free by design: real IPs come from rendered/ansible/inventory.yml; the repo credential
# ($ARGOCD_REPO_TOKEN, only for a private repo) and the Cloudflare DNS-01 token
# ($CLOUDFLARE_DNS01_TOKEN) come from the operator's environment — never tracked.

# ── Story 2.2 ───────────────────────────────────────────────────────────────
# Longhorn host prerequisites on EVERY node. Runs first because they are plain host
# packages, independent of k3s, and must exist before the Longhorn Application (wave 0)
# attaches any volume. The two disaster traps Longhorn-on-bare-metal hits:
#   1. open-iscsi installed ≠ working — `iscsid` must be ENABLED + ACTIVE or attach fails.
#   2. multipathd steals the Longhorn block device ("device or resource busy") — disable AND
#      mask the service (survives reboot/reinstall) AND blacklist the devices in multipath.conf.
- name: Play 0 — Longhorn node prerequisites (ALL nodes, Story 2.2)
  hosts: all
  become: true
  gather_facts: false
  tasks:
    - name: Install Longhorn prerequisite packages (open-iscsi for V1 iSCSI attach, nfs-common for RWX)
      ansible.builtin.apt:
        name:
          - open-iscsi
          - nfs-common
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Enable + start iscsid (the package being present is NOT enough — Longhorn V1 needs it running)
      ansible.builtin.systemd_service:
        name: iscsid
        enabled: true
        state: started

    - name: Disable + mask multipathd so it never claims Longhorn devices (masking survives reinstall/reboot)
      # `state: stopped` + `masked: true` is stronger than disable alone: a mask points the unit at
      # /dev/null so even a package reinstall or a dependency pulling multipath-tools back in cannot
      # start it. Idempotent and harmless if multipath-tools is not installed at all.
      ansible.builtin.systemd_service:
        name: multipathd
        state: stopped
        enabled: false
        masked: true
      # If multipath-tools is genuinely absent the unit may not exist; that is already the desired state.
      failed_when: false

    - name: Belt-and-suspenders — blacklist ALL block devices in /etc/multipath.conf
      # In case multipath-tools is ever reinstalled and unmasked, this stops it grabbing ANY device.
      ansible.builtin.copy:
        dest: /etc/multipath.conf
        mode: '0644'
        content: |
          # Managed by Ansible (Story 2.2). This node never uses multipathd, so blacklist EVERY
          # device — a narrow `^sd…` regex misses the Proxmox virtio disk names (`vd*`) and NVMe
          # (`nvme*`) the Longhorn data device may actually use, leaving it unprotected.
          blacklist {
              devnode "^.*"
          }

- name: Play 1 — initialize etcd on node 1 (--cluster-init)
  hosts: k3s_init
  become: true
  gather_facts: false
  vars_files:
    - ../versions.yaml   # NFR14: component pins (k3s/argocd/helm) come from here, the SSOT.
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  tasks:
    - name: Install k3s server with embedded etcd (--cluster-init, bundled Traefik + TLS-SAN)
      # --cluster-init initializes embedded etcd (Phase 2a REQUIRES it — the opposite of Phase 1).
      # NO --disable=traefik (Traefik stays k3s-owned via its HelmChart CR).
      ansible.builtin.shell: |
        set -o pipefail
        curl -sfL https://get.k3s.io | INSTALL_K3S_VERSION={{ k3s.version }} \
          sh -s - server --cluster-init \
          {% for san in k3s_tls_sans %}--tls-san {{ san }} {% endfor %}
      args:
        executable: /bin/bash   # pipefail is bash-only; default sh (dash) would swallow a curl failure
        creates: /usr/local/bin/k3s

    - name: Wait for node 1 to register and become Ready
      # `kubectl wait --all` returns 0 immediately if the node object doesn't exist yet
      # (empty set = vacuous success), so poll until a node is actually reported Ready.
      ansible.builtin.shell: |
        set -o pipefail
        k3s kubectl get nodes --no-headers 2>/dev/null | grep -qw Ready
      args:
        executable: /bin/bash
      register: k3s_node_ready
      changed_when: false
      retries: 18
      delay: 10
      until: k3s_node_ready.rc == 0

    - name: Drop the Traefik entryPoints HelmChartConfig into k3s's auto-deploy manifests dir (Story 4.4)
      # Anytype needs raw-TCP(33010)+QUIC/UDP(33020) entryPoints, which are Traefik *static* config —
      # settable ONLY on the k3s-bundled traefik HelmChart, NOT via a runtime CRD. This is the
      # k3s-native, outside-ArgoCD path (matches the "Traefik controller stays k3s-owned" boundary).
      # k3s's addon controller watches this dir and (re)applies the HelmChartConfig, which merge-
      # patches the traefik HelmChart values. Idempotent: re-running just re-copies the same file.
      # The SAME drop runs on the join nodes (Play 2) so the file survives a re-bootstrap from ANY
      # server node — otherwise the anytype TCP/UDP entryPoints would silently vanish on the next
      # traefik reconcile if node 1 is not the bootstrapping node.
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../infra/traefik/traefik-helmchartconfig.yaml"
        dest: /var/lib/rancher/k3s/server/manifests/traefik-config.yaml
        mode: '0644'

    - name: Read the cluster node-token (the shared join secret for nodes 2 & 3)
      ansible.builtin.slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: k3s_node_token_raw
      no_log: true

    - name: Expose the node-token to the join nodes via hostvars
      ansible.builtin.set_fact:
        k3s_node_token: "{{ k3s_node_token_raw.content | b64decode | trim }}"
      no_log: true

- name: Play 2 — join nodes 2 & 3 as servers (etcd quorum -> 3)
  hosts: k3s_join
  become: true
  gather_facts: false
  vars_files:
    - ../versions.yaml
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  tasks:
    - name: Join the etcd cluster as a server (NOT agent — agent would leave etcd 1-member)
      ansible.builtin.shell: |
        set -o pipefail
        curl -sfL https://get.k3s.io | INSTALL_K3S_VERSION={{ k3s.version }} \
          sh -s - server --server https://{{ node1_ip }}:6443 \
          {% for san in k3s_tls_sans %}--tls-san {{ san }} {% endfor %}
      args:
        executable: /bin/bash
        creates: /usr/local/bin/k3s
      environment:
        # Passed via env (not on the command line) so the join token never appears in `ps`/audit
        # on the target host — same hardening the Cloudflare token task uses.
        K3S_TOKEN: "{{ hostvars[groups['k3s_init'][0]]['k3s_node_token'] }}"
      no_log: true   # K3S_TOKEN is in the env — keep it out of logs / -v output too

    - name: Wait for this node to become Ready
      ansible.builtin.shell: |
        set -o pipefail
        k3s kubectl get node "$(hostname)" --no-headers 2>/dev/null | grep -qw Ready
      args:
        executable: /bin/bash
      register: k3s_join_ready
      changed_when: false
      retries: 18
      delay: 10
      until: k3s_join_ready.rc == 0

    - name: Drop the Traefik entryPoints HelmChartConfig on the join nodes too (Story 4.4)
      # Same file as Play 1 on node 1. k3s's deploy controller reads the manifests dir of whichever
      # server node it runs on, so the HelmChartConfig must be present on ALL servers — otherwise a
      # re-bootstrap from node 2/3 drops the anytype TCP/UDP entryPoints silently. Idempotent.
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../infra/traefik/traefik-helmchartconfig.yaml"
        dest: /var/lib/rancher/k3s/server/manifests/traefik-config.yaml
        mode: '0644'

- name: Play 3 — ArgoCD + bootstrap creds (node 1 only, installed ONCE)
  hosts: k3s_init
  become: true
  gather_facts: false
  vars_files:
    - ../versions.yaml
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  tasks:
    - name: Require the Cloudflare DNS-01 token up front (AC3 — fail fast, not a silent skip)
      # The staging ClusterIssuer (Story 1.5) and the prod one (Story 2.4) both reference the
      # cloudflare-dns01-token Secret; without it certificate issuance fails LATER, after the
      # GitOps handoff, with an opaque error. Injecting it is a required bootstrap step (AC3), so
      # refuse to proceed silently. ARGOCD_REPO_TOKEN stays optional (public repo) — not asserted.
      ansible.builtin.assert:
        that:
          - "lookup('ansible.builtin.env', 'CLOUDFLARE_DNS01_TOKEN') | trim | length > 0"
        fail_msg: >-
          CLOUDFLARE_DNS01_TOKEN is not set. Export it (Cloudflare API token, Zone:DNS:Edit on the
          public zone only — NFR11) before running the playbook; it is injected as the
          cloudflare-dns01-token Secret the ClusterIssuer consumes.
        quiet: true

    - name: Confirm etcd quorum — wait until every server node is an etcd member AND Ready
      # Count nodes carrying the etcd role label, not just any Ready node: a node whose join
      # half-failed (binary installed via the `creates:` guard but never joined etcd) can still
      # report Ready as a stray, and a plain `grep -c Ready` would falsely pass at quorum=2 — the
      # exact "never settle at 2" hazard. Require EXACTLY the inventory's server count to also
      # reject a stale extra node inflating the total.
      ansible.builtin.shell: |
        set -o pipefail
        expected={{ (groups['k3s_init'] | default([]) | length) + (groups['k3s_join'] | default([]) | length) }}
        ready=$(k3s kubectl get nodes -l node-role.kubernetes.io/etcd=true --no-headers 2>/dev/null | grep -cw Ready)
        [ "$ready" -eq "$expected" ]
      args:
        executable: /bin/bash
      register: cluster_quorum
      changed_when: false
      retries: 18
      delay: 10
      until: cluster_quorum.rc == 0

    - name: Un-default the bundled local-path StorageClass (Story 2.2 — so `longhorn` becomes the SOLE default)
      # k3s ships local-path as the default StorageClass. The Longhorn Helm app sets `longhorn`
      # default too; TWO defaults make Kubernetes reject class-less PVCs. Patch local-path to
      # non-default here at bootstrap (durable through a clean rebuild — local-path returns as
      # default on every fresh k3s install, so this MUST live in the bootstrap layer, not as a
      # one-off kubectl). local-path was the Phase-1-only throwaway provisioner; Longhorn is the
      # Phase-2a default. The SC exists shortly after k3s starts — wait for it, then patch idempotently.
      # CAVEAT: an in-place k3s UPGRADE re-applies the bundled local-storage manifest and can re-stamp
      # local-path as default again — re-run this playbook after a k3s version bump to re-assert.
      ansible.builtin.shell: |
        set -o pipefail   # NOT -e: a transient patch failure must retry the loop, not abort the task
        for _ in $(seq 1 18); do
          if k3s kubectl get storageclass local-path >/dev/null 2>&1; then
            if k3s kubectl patch storageclass local-path \
                 -p '{"metadata":{"annotations":{"storageclass.kubernetes.io/is-default-class":"false"}}}'; then
              exit 0
            fi
          fi
          sleep 5
        done
        echo "local-path StorageClass never appeared (or patch never succeeded)" >&2; exit 1
      args:
        executable: /bin/bash
      register: localpath_patch
      # kubectl prints "… patched (no change)" when the annotation is already set — honour the
      # playbook's "re-running converges" contract instead of always reporting CHANGED.
      changed_when: "'(no change)' not in localpath_patch.stdout"

    - name: Install Helm (installer pinned to a tag, not main — reproducible)
      ansible.builtin.shell: |
        set -o pipefail
        curl -fsSL https://raw.githubusercontent.com/helm/helm/{{ helm.installerRef }}/scripts/get-helm-3 \
          | DESIRED_VERSION={{ helm.version }} bash
      args:
        executable: /bin/bash
        creates: /usr/local/bin/helm

    - name: Stage the render-token file on the node (real values; from the operator's git-ignored tokens.env)
      # The render CMP (argocd-values.yaml) substitutes ${SECRET:NAME} in workloads at sync time;
      # it reads these real values from a Secret. tokens.env is the SSOT (controller-side, git-ignored).
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../internal/tokens.env"
        dest: /tmp/render-tokens.env
        mode: '0600'
      no_log: true

    - name: Ensure the argocd namespace exists (the Helm install --create-namespace runs LATER;
            the render-token Secret below is injected into it FIRST, so it must exist now)
      ansible.builtin.shell: |
        set -eo pipefail
        k3s kubectl create namespace {{ argocd_namespace }} \
          --dry-run=client -o yaml | k3s kubectl apply -f -
      args:
        executable: /bin/bash
      changed_when: true

    - name: Inject the render-token Secret DIRECTLY (bootstrap-class, like the repo Secret — never via Sealed Secrets)
      ansible.builtin.shell: |
        set -eo pipefail
        # always wipe the plaintext token file, but a failed apply must still fail the task
        trap 'rm -f /tmp/render-tokens.env' EXIT
        k3s kubectl create secret generic argocd-render-tokens \
          --namespace {{ argocd_namespace }} \
          --from-file=tokens.env=/tmp/render-tokens.env \
          --dry-run=client -o yaml | k3s kubectl apply -f -
      args:
        executable: /bin/bash
      no_log: true
      changed_when: true

    - name: Stage the ArgoCD Helm values (render CMP sidecar) on the node
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/argocd-values.yaml"
        dest: /tmp/argocd-values.yaml
        mode: '0644'

    - name: Install ArgoCD via Helm (idempotent; render CMP sidecar from argocd-values.yaml)
      # Installed ONCE, on node 1. The self-management Application (argocd/apps/argocd.yaml)
      # adopts this release after the root sync so future upgrades flow through GitOps (AR5/NFR14).
      ansible.builtin.shell: |
        set -eo pipefail
        helm repo add argo https://argoproj.github.io/argo-helm
        helm repo update argo
        helm upgrade --install argocd argo/argo-cd \
          --version {{ argocd.chartVersion }} \
          --namespace {{ argocd_namespace }} --create-namespace \
          -f /tmp/argocd-values.yaml --wait --timeout 10m
      args:
        executable: /bin/bash
      changed_when: true

    - name: Inject the ArgoCD repository Secret DIRECTLY (AR4 — never via Sealed Secrets)
      # Public repo -> ArgoCD reads anonymously; this Secret registers it so `argocd repo list`
      # shows it. If a PRIVATE repo is ever added, set ARGOCD_REPO_TOKEN — same direct-inject
      # path, no circular dependency on a sealed-secrets controller (which is wave 0, Story 2.3).
      ansible.builtin.shell: |
        k3s kubectl apply -f - <<'EOF'
        apiVersion: v1
        kind: Secret
        metadata:
          name: repo-home-server-gitops
          namespace: {{ argocd_namespace }}
          labels:
            argocd.argoproj.io/secret-type: repository
        stringData:
          type: git
          url: {{ gitops_repo_url }}
        {% if lookup('ansible.builtin.env', 'ARGOCD_REPO_TOKEN') %}
          username: git
          password: {{ lookup('ansible.builtin.env', 'ARGOCD_REPO_TOKEN') }}
        {% endif %}
        EOF
      no_log: true   # ARGOCD_REPO_TOKEN is interpolated into this task — keep it out of logs / -v output
      changed_when: true

    - name: Inject the Cloudflare DNS-01 token Secret DIRECTLY (AR4 bootstrap secret — NEW in Phase 2a)
      # Story 2.4's production ClusterIssuer (and the Story 1.5 staging one already) reference
      # Secret `cloudflare-dns01-token` (key api-token) in ns cert-manager. It is a BOOTSTRAP
      # credential, so Ansible injects it directly — routing it through Sealed Secrets (wave 0)
      # would be the circular dependency AR4 forbids. Scope the token least-privilege
      # (Zone:DNS:Edit on the public zone only — NFR11). The cert-manager namespace is created
      # here so the Secret exists before cert-manager (wave 1) reconciles onto it.
      ansible.builtin.shell: |
        set -eo pipefail
        k3s kubectl create namespace {{ certmanager_namespace }} \
          --dry-run=client -o yaml | k3s kubectl apply -f -
        k3s kubectl create secret generic cloudflare-dns01-token \
          --namespace {{ certmanager_namespace }} \
          --from-literal=api-token="$CLOUDFLARE_DNS01_TOKEN" \
          --dry-run=client -o yaml | k3s kubectl apply -f -
      args:
        executable: /bin/bash
      environment:
        CLOUDFLARE_DNS01_TOKEN: "{{ lookup('ansible.builtin.env', 'CLOUDFLARE_DNS01_TOKEN') }}"
      no_log: true   # the token is passed via env — keep it out of logs / -v output
      changed_when: true
      # No `when:` guard — presence is asserted at the top of this play (fail fast, not skip).

    # ── BOUNDARY ──────────────────────────────────────────────────────────────
    # Ansible STOPS here. The next (manual) step is the single GitOps entry point:
    #     k3s kubectl apply -f bootstrap/root-app.yaml
    # Everything after it reconciles. Ansible owns nothing past this line.
