---
# Deploy the Jellyfin-host *arr media stack via docker compose (Semaphore-driven, GitOps).
# Idempotent: re-running converges (apt `state: present`, `creates:`-style guards, compose
# `pull: missing` + state: present). It does NOT touch existing media ownership, and it never
# writes a plaintext secret into the repo — the rendered .env lives in a repo-外 host dir.
#
# Run (workstation, syntax only — apply happens via Semaphore):
#   ansible-playbook --syntax-check ansible/media-stack/deploy.yml
#
# Secrets: secrets.sops.yaml is decrypted at runtime with the SINGLE cluster age identity already
# mounted in the Semaphore pod at /keys/age/keys.txt (same recipient openwrt/oracle use — "zero new
# keys", DECISIONS.md). See runbook.md.
- name: Media stack — *arr + optional downloader on the Jellyfin host
  hosts: media
  become: true
  gather_facts: false
  environment:
    SOPS_AGE_KEY_FILE: /keys/age/keys.txt   # the existing single cluster age identity (semaphore-age)
  vars:
    download_stack_enabled: "{{ DOWNLOAD_STACK_ENABLED | default(false) | bool }}"
    base_stack_dirs:
      - "{{ deploy_dir }}"
      - "{{ HOST_DATA }}/media/movies"
      - "{{ HOST_DATA }}/media/tv"
      - "{{ HOST_CONFIG }}/prowlarr"
      - "{{ HOST_CONFIG }}/radarr"
      - "{{ HOST_CONFIG }}/sonarr"
      - "{{ HOST_CONFIG }}/jellyseerr"
      - "{{ HOST_CONFIG }}/maintainerr"
    download_stack_dirs:
      - "{{ HOST_DATA }}/torrents"
      - "{{ HOST_CONFIG }}/qbittorrent"
    owned_stack_dirs: "{{ base_stack_dirs + (download_stack_enabled | ternary(download_stack_dirs, [])) }}"
  tasks:
    - name: Ensure Docker engine + compose plugin are present (idempotent)
      # docker.io + docker-compose-v2 are the Ubuntu-native packages; docker-compose-v2 provides the
      # `docker compose` subcommand that community.docker.docker_compose_v2 drives. No docker-ce repo
      # dance — keep the footprint minimal on a host that already does GPU transcoding.
      ansible.builtin.apt:
        name:
          - docker.io
          - docker-compose-v2
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Preflight — stat the library/download dirs (NOT the mount root, which is legitimately root-owned)
      # The *arr apps hardlink between these dirs as PUID:PGID. A blind chown -R on the whole library
      # would be enormous and break Jellyfin, so we DETECT a mismatch on the dirs that matter and fail
      # fast — never the $HOST_DATA mount root, which on a real host is owned by root and would falsely fail.
      ansible.builtin.stat:
        path: "{{ item }}"
      loop:
        - "{{ HOST_DATA }}/media/movies"
        - "{{ HOST_DATA }}/media/tv"
        - "{{ HOST_DATA }}/torrents"
      register: media_dirs_stat
      when: item != HOST_DATA ~ '/torrents' or download_stack_enabled

    - name: Assert any EXISTING library/download dir is owned by PUID:PGID (skip dirs not created yet)
      ansible.builtin.assert:
        that:
          - item.stat.uid | int == PUID | int
          - item.stat.gid | int == PGID | int
        fail_msg: >-
          {{ item.item }} exists but is owned by {{ item.stat.uid }}:{{ item.stat.gid }}, not
          PUID:PGID {{ PUID }}:{{ PGID }}. The *arr apps hardlink as PUID:PGID — a mismatch breaks
          imports. Align ownership deliberately (Ask First); do NOT chown -R blindly on a large library.
        quiet: true
      loop: "{{ media_dirs_stat.results }}"
      loop_control:
        label: "{{ item.item }}"
      when:
        - not item.skipped | default(false)
        - item.stat.exists

    - name: Create only the directories the stack owns (PUID:PGID) — never the whole media tree
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ PUID }}"
        group: "{{ PGID }}"
        mode: '0755'
      loop: "{{ owned_stack_dirs }}"

    - name: Decrypt the gluetun VPN secrets (SOPS+age, cluster identity)
      # community.sops.load_vars loads the decrypted keys as task/play vars for the .env template
      # below. Requires the `sops` + `age` binaries on the runner (runbook §4) and SOPS_AGE_KEY_FILE
      # (set at play level). no_log so the WireGuard key never lands in Semaphore output.
      community.sops.load_vars:
        file: "{{ playbook_dir }}/secrets.sops.yaml"
      no_log: true
      when: download_stack_enabled

    - name: Fail fast if secrets.sops.yaml is still the unencrypted template (REPLACE_ME)
      # Without this, the template values flow into .env and gluetun loops forever on invalid VPN
      # creds — a silent bad deploy. assert prints only the failed expression text, never the value.
      ansible.builtin.assert:
        that:
          - VPN_SERVICE_PROVIDER is defined
          - VPN_SERVICE_PROVIDER != 'REPLACE_ME'
          - WIREGUARD_PRIVATE_KEY != 'REPLACE_ME'
        fail_msg: >-
          secrets.sops.yaml still holds template values — fill it and `sops -e -i` it (runbook §3)
          before enabling DOWNLOAD_STACK_ENABLED.
        quiet: true
      when: download_stack_enabled

    - name: Render the runtime .env (repo-外, 0600) — docker compose auto-loads it
      ansible.builtin.template:
        src: env.j2
        dest: "{{ deploy_dir }}/.env"
        owner: "{{ PUID }}"
        group: "{{ PGID }}"
        mode: '0600'
      no_log: true

    - name: Place the compose file next to the .env
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/docker-compose.yml"
        dest: "{{ deploy_dir }}/docker-compose.yml"
        mode: '0644'

    - name: "Bring the stack up (pull missing — pinned images never jump on a re-run/--check)"
      community.docker.docker_compose_v2:
        project_src: "{{ deploy_dir }}"
        state: present
        pull: missing
      environment:
        COMPOSE_PROFILES: "{{ download_stack_enabled | ternary('download', '') }}"
