# Tokenized — this is the RENDER SOURCE, not what Semaphore runs directly.
# The Semaphore pod has no git-ignored internal/tokens.env, so `bin/render` can't run there.
# Operator (on a workstation that has tokens.env) does:
#     bin/render ansible/media-stack/inventory.yml      # -> rendered/ansible/media-stack/inventory.yml
# then pastes the rendered result into a Semaphore Static Inventory (runbook §4). Same pattern the
# OpenWrt stack uses (day2-tooling §1c). IP_JELLYFIN is REUSED (same host edge-proxies fronts at :8096);
# no separate IP_JELLYFIN_VM token — it would duplicate the same value.
all:
  children:
    media:
      hosts:
        jellyfin:
          ansible_host: ${SECRET:IP_JELLYFIN}
      vars:
        ansible_user: root
        ansible_ssh_private_key_file: /keys/ssh/jellyfin   # added to the semaphore-ssh secret (runbook §1)
        # ── Non-secret stack knobs (secrets live ONLY in secrets.sops.yaml) ──
        # Operator confirms these against the live host before first apply.
        TZ: Asia/Seoul
        PUID: 1000               # `id <media-owner>` — uid that owns the media files
        PGID: 1000               # `id <media-owner>` — gid likewise
        HOST_DATA: /mnt/media    # library + downloads parent (SAME fs → hardlinks): /mnt/media/{torrents,media/movies,media/tv}
        HOST_CONFIG: /opt/media-stack/config   # per-app config/DB (the ONLY backup target)
        deploy_dir: /opt/media-stack           # repo-外 host path where compose + rendered .env land
        DOWNLOAD_STACK_ENABLED: false           # true later: enables gluetun + qbittorrent (`download` profile) after VPN secrets are encrypted
