# Story 2.3 — Sealed Secrets (Bitnami) controller as a wave-0 platform Application.
#
# Lives under argocd/ (the app-of-apps root recurses this dir and adopts it) rather than
# infra/sealed-secrets/, for the SAME reason as longhorn/cert-manager: its `source` is the
# REMOTE Bitnami Helm chart — there are no local manifests to put in infra/. infra/sealed-secrets/
# holds only the README (the OOB sealing-key export/restore runbook + the round-trip proof),
# which nothing syncs.
#
# Vendor component -> Helm `source`, no chart mirroring. Version pinned in versions.yaml (SSOT).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
  annotations:
    # AR3: wave 0 — same wave as Longhorn, BEFORE cert-manager (wave 1). The controller (and its
    # CRD) must exist before any later-wave workload references a materialized Secret.
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: homelab
  source:
    # NOTE: the repo moved bitnami-labs -> bitnami; the old bitnami-labs.github.io Pages site is
    # dead (404). bitnami.github.io/sealed-secrets is the live index for the SAME chart.
    repoURL: https://bitnami.github.io/sealed-secrets
    chart: sealed-secrets
    targetRevision: 2.18.6   # == versions.yaml sealed-secrets.chartVersion (appVersion v0.37.0)
    helm:
      # Pin the release name AND namespace so the kubeseal CLI's --controller-name /
      # --controller-namespace match exactly (see infra/sealed-secrets/README.md). The chart
      # defaults the controller name to the release name; ArgoCD's release name == the Application
      # name (`sealed-secrets`), and destination.namespace below is `sealed-secrets`.
      values: |
        # Pin the controller image to the chart's appVersion explicitly — no floating tag (AR29).
        image:
          tag: 0.37.0
  destination:
    server: https://kubernetes.default.svc
    namespace: sealed-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true   # AR7: Sealed Secrets CRD annotations exceed client-side apply
