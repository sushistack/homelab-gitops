# Story 1.5 — Task 1: cert-manager as a wave-1 platform Application.
#
# Lives under argocd/ (the app-of-apps root recurses this dir and adopts it) rather than
# infra/cert-manager/, because its `source` is the REMOTE jetstack Helm chart — there are no
# local manifests to put in infra/. The cluster-issuer (our own manifests) DOES live in
# infra/cluster-issuer/ and its Application is argocd/apps/cluster-issuer.yaml.
#
# Vendor component -> Helm `source`, no chart mirroring. Version pinned in versions.yaml (SSOT).
# k3s owns Traefik; ArgoCD must NOT manage the Traefik controller — only cert-manager here.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"   # AR3: CRDs before the ClusterIssuer (wave 2) / Certificates (wave 3)
spec:
  project: homelab
  source:
    repoURL: https://charts.jetstack.io
    chart: cert-manager
    targetRevision: v1.19.5   # == versions.yaml cert-manager.chartVersion
    helm:
      values: |
        # v1.19.x: install the CRDs with the chart (older charts used `installCRDs: true`).
        crds:
          enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true   # AR7: cert-manager CRD annotations exceed client-side apply
