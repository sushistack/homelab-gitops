# AppProject for all homelab children (workloads + future infra). Single-tenant homelab:
# wide-open resource whitelists; tighten per-namespace only if multi-tenant ever matters.
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: homelab
  namespace: argocd
spec:
  description: Homelab workloads and infra managed by the app-of-apps root.
  sourceRepos:
    - https://github.com/sushistack/home-server-gitops.git
    - https://charts.jetstack.io   # Story 1.5: cert-manager Helm chart (vendor repo referenced as a source)
    - https://argoproj.github.io/argo-helm   # Story 2.1: ArgoCD self-management chart (argocd/apps/argocd.yaml)
    - https://charts.longhorn.io   # Story 2.2: Longhorn storage Helm chart (vendor repo referenced as a source)
    - https://bitnami-labs.github.io/sealed-secrets   # Story 2.3: Sealed Secrets controller Helm chart (vendor repo referenced as a source)
  destinations:
    - server: https://kubernetes.default.svc
      namespace: '*'
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
