# Git directory generator over workloads/*. Each workloads/<name> dir becomes one Application.
# Phase 1: workloads/ holds only .gitkeep (a FILE, not a dir) -> zero apps generated.
# An empty/near-empty child set that is Synced/Healthy is the correct Phase 1 end state.
# Excalidraw (Story 1.3) is the first workloads/* child this picks up.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: workloads
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: https://github.com/sushistack/home-server-gitops.git
        revision: HEAD
        directories:
          - path: workloads/*
          # _template/ is the copy-to-fill golden path, NOT a deployable service.
          # Without this exclude the generator creates a never-syncable Application for it.
          - path: workloads/_template
            exclude: true
  template:
    metadata:
      name: '{{.path.basename}}'
      annotations:
        # AR3: workloads sync AFTER platform infra (cert-manager wave 1, ClusterIssuer wave 2).
        # Story 1.5: excalidraw's Certificate needs the cert-manager CRDs + ClusterIssuer first.
        argocd.argoproj.io/sync-wave: "3"
    spec:
      project: homelab
      source:
        repoURL: https://github.com/sushistack/home-server-gitops.git
        targetRevision: HEAD
        path: '{{.path.path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{.path.basename}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
