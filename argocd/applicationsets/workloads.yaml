# Git directory generator over workloads/*. Each workloads/<name> dir becomes one Application.
# Phase 1: workloads/ holds only .gitkeep (a FILE, not a dir) -> zero apps generated.
# An empty/near-empty child set that is Synced/Healthy is the correct Phase 1 end state.
# Excalidraw (Story 1.3) is the first workloads/* child this picks up.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: workloads
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: https://github.com/sushistack/homelab-gitops.git
        revision: HEAD
        directories:
          - path: workloads/*
          # _template/ is the copy-to-fill golden path, NOT a deployable service.
          # Without this exclude the generator creates a never-syncable Application for it.
          - path: workloads/_template
            exclude: true
          # anytype is the HAND-WRITTEN exception (Story 4.4): IngressRouteTCP/UDP on dedicated
          # entryPoints, which this uniform template can't express. Its Application lives at
          # argocd/apps/anytype.yaml; without this exclude BOTH would create an App named `anytype`.
          - path: workloads/anytype
            exclude: true
          # ntfy-web is the SECOND hand-written exception: its Argo CD Image Updater config lives as
          # annotations on the Application CR (argocd/apps/ntfy-web.yaml), which this uniform template
          # can't carry per-app. Same dual-creation guard as anytype.
          - path: workloads/ntfy-web
            exclude: true
  template:
    metadata:
      name: '{{.path.basename}}'
      annotations:
        # AR3: workloads sync AFTER platform infra (cert-manager wave 1, ClusterIssuer wave 2).
        # Story 1.5: excalidraw's Certificate needs the cert-manager CRDs + ClusterIssuer first.
        argocd.argoproj.io/sync-wave: "3"
    spec:
      project: homelab
      source:
        repoURL: https://github.com/sushistack/homelab-gitops.git
        targetRevision: HEAD
        path: '{{.path.path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{.path.basename}}'
      ignoreDifferences:
        # local-path-retain PVCs have volumeName set by the binding controller after migration.
        # Git manifests intentionally omit volumeName (cluster-specific). Ignore to stay Synced.
        - group: ""
          kind: PersistentVolumeClaim
          jsonPointers:
            - /spec/volumeName
        # scale-to-0 backup actors temporarily set replicas=0; selfHeal would fight the quiesce.
        - group: apps
          kind: Deployment
          jsonPointers:
            - /spec/replicas
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - RespectIgnoreDifferences=true
