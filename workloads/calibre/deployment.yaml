# calibre-web (ebook reader), LinuxServer image. SQLite-backed -> strategy:Recreate.
# Storage split: calibre-data (local-path-retain) for /config (app.db only);
# calibre-books-local (static local PV at /mnt/books, k3s-cp-1) for the ebook library.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: calibre
spec:
  replicas: 1
  progressDeadlineSeconds: 180
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: calibre
  template:
    metadata:
      labels:
        app.kubernetes.io/name: calibre
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: calibre
          # lscr.io/linuxserver/calibre-web. CONFIRM the current tag + SWAP TO @sha256 at cutover (AR29):
          #   docker buildx imagetools inspect lscr.io/linuxserver/calibre-web:latest
          image: lscr.io/linuxserver/calibre-web:0.6.24
          ports:
            - containerPort: 8083
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: Asia/Seoul
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          # calibre-web serves its login at / -> 200. startupProbe covers the s6 init + SQLite open.
          startupProbe:
            httpGet:
              path: /
              port: 8083
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 8083
          livenessProbe:
            httpGet:
              path: /
              port: 8083
          volumeMounts:
            - name: config
              mountPath: /config
              subPath: config
            - name: books
              mountPath: /books
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: calibre-data
        - name: books
          persistentVolumeClaim:
            claimName: calibre-books-local
