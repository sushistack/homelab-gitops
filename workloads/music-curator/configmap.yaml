apiVersion: v1
kind: ConfigMap
metadata:
  name: music-curator-config
  namespace: music-curator
data:
  # Navidrome Subsonic API endpoint — ClusterIP FQDN (port 4533 from navidrome/deployment.yaml)
  ND_URL: http://navidrome.navidrome.svc.cluster.local:4533
  # Operator fills real value after first deploy
  ND_USER: admin
  # Lidarr ClusterIP FQDN (port 8686 from lidarr/deployment-lidarr.yaml)
  LIDARR_URL: http://lidarr.lidarr.svc.cluster.local:8686
  # Last.fm scrobbling account username — operator fills real value
  LASTFM_USER: changeme
  TZ: Asia/Seoul
  GRACE_PERIOD_DAYS: "28"
  # Lidarr quality profile id — "1" is the default "Any" profile; override if custom profile exists
  LIDARR_QUALITY_PROFILE_ID: "1"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: music-curator-script
  namespace: music-curator
data:
  curator.py: |
    # /// script
    # requires-python = ">=3.12"
    # dependencies = ["requests", "apscheduler==3.*", "pylast"]
    # ///
    """
    music-curator — quarterly playlist lifecycle manager for Navidrome + Lidarr.

    Jobs (all times KST / Asia/Seoul):
      weekly_discovery   every Monday 03:00  — Last.fm → Navidrome playlist + Lidarr artist import
      quarterly_archive  Jan/Apr/Jul/Oct 1 02:00 — retain starred + grace-period songs; delete rest
      annual_best_of     Jan 1 03:00         — collate previous year's Q playlists into Best-Of
    """

    import logging
    import os
    from datetime import datetime, timedelta, timezone
    from pathlib import Path

    import pylast
    import requests
    from apscheduler.schedulers.blocking import BlockingScheduler

    # ---------------------------------------------------------------------------
    # Env vars — read at module level; process exits on missing key (fail fast)
    # ---------------------------------------------------------------------------
    ND_URL = os.environ["ND_URL"]
    ND_USER = os.environ["ND_USER"]
    ND_PASSWORD = os.environ["ND_PASSWORD"]
    LIDARR_URL = os.environ["LIDARR_URL"]
    LIDARR_API_KEY = os.environ["LIDARR_API_KEY"]
    LASTFM_USER = os.environ["LASTFM_USER"]
    LASTFM_API_KEY = os.environ["LASTFM_API_KEY"]
    LASTFM_API_SECRET = os.environ["LASTFM_API_SECRET"]

    log = logging.getLogger(__name__)


    # ---------------------------------------------------------------------------
    # Helpers
    # ---------------------------------------------------------------------------

    def current_quarter() -> str:
        """Return the current quarter as 'YYYY-QN' (e.g. '2026-Q2')."""
        now = datetime.now()
        q = (now.month - 1) // 3 + 1
        return f"{now.year}-Q{q}"


    def subsonic_get(path: str, **params) -> dict:
        """
        Call a Subsonic REST endpoint and return the subsonic-response dict.
        Auth params are appended automatically.
        """
        auth = {
            "u": ND_USER,
            "p": ND_PASSWORD,
            "v": "1.16.1",
            "c": "curator",
            "f": "json",
        }
        url = f"{ND_URL}/rest/{path}"
        resp = requests.get(url, params={**params, **auth}, timeout=30)
        resp.raise_for_status()
        return resp.json()["subsonic-response"]


    def get_or_create_playlist(name: str) -> str:
        """Return the Subsonic playlist id for *name*, creating it if missing."""
        data = subsonic_get("getPlaylists")
        playlists = data.get("playlists", {}).get("playlist", [])
        for pl in playlists:
            if pl["name"] == name:
                return pl["id"]
        # Not found — create it
        data = subsonic_get("createPlaylist", name=name)
        return data["playlist"]["id"]


    def playlist_entries(pid: str) -> list[dict]:
        """Return the entry list for playlist *pid* (each dict has id, path, created, etc.)."""
        data = subsonic_get("getPlaylist", id=pid)
        entries = data.get("playlist", {}).get("entry", [])
        if isinstance(entries, dict):
            # Subsonic returns a single dict (not a list) when there is exactly one entry
            entries = [entries]
        return entries


    def starred_ids() -> set[str]:
        """Return the set of starred song IDs from Navidrome."""
        data = subsonic_get("getStarred2")
        songs = data.get("starred2", {}).get("song", [])
        if isinstance(songs, dict):
            songs = [songs]
        return {s["id"] for s in songs}


    # ---------------------------------------------------------------------------
    # Weekly discovery
    # ---------------------------------------------------------------------------

    def weekly_discovery() -> None:
        """
        Pull recent Last.fm tracks → find similar artists → search Navidrome →
        add found songs to the current quarter playlist; POST unknown artists to Lidarr.
        """
        log.info("weekly_discovery: start")
        network = pylast.LastFMNetwork(
            api_key=LASTFM_API_KEY, api_secret=LASTFM_API_SECRET
        )
        user = network.get_user(LASTFM_USER)
        recent = user.get_recent_tracks(limit=100)

        # Unique artist names from recent scrobbles
        seen_artists: set[str] = set()
        for scrobble in recent:
            try:
                seen_artists.add(scrobble.track.artist.name)
            except Exception:
                pass

        # Current quarter playlist
        q_name = current_quarter()
        q_pid = get_or_create_playlist(q_name)
        existing_ids = {e["id"] for e in playlist_entries(q_pid)}

        to_add: list[str] = []
        lidarr_submitted: set[str] = set()

        for artist_name in seen_artists:
            try:
                artist_obj = network.get_artist(artist_name)
                similars = artist_obj.get_similar(limit=5)
            except Exception as exc:
                log.warning("weekly_discovery: skipping artist %r — %s", artist_name, exc)
                continue

            for sim_item in similars:
                try:
                    sim_artist = sim_item.item
                    top_tracks = sim_artist.get_top_tracks(limit=5)
                except Exception as exc:
                    sim_name = getattr(getattr(sim_item, 'item', None), 'name', '?')
                    log.warning("weekly_discovery: skipping similar artist %r — %s", sim_name, exc)
                    continue

                for track_item in top_tracks:
                    try:
                        title = track_item.item.title
                        artist = track_item.item.artist.name
                    except Exception:
                        continue

                    # Search Navidrome
                    try:
                        sr = subsonic_get(
                            "search3",
                            query=f"{artist} {title}",
                            songCount=5,
                            albumCount=0,
                            artistCount=0,
                        )
                        songs = sr.get("searchResult3", {}).get("song", [])
                        if isinstance(songs, dict):
                            songs = [songs]
                    except Exception as exc:
                        log.warning("weekly_discovery: Navidrome search error — %s", exc)
                        continue

                    if songs:
                        for song in songs:
                            sid = song["id"]
                            if sid not in existing_ids and sid not in to_add:
                                to_add.append(sid)
                    else:
                        # Artist not in library — POST to Lidarr for monitoring
                        if artist not in lidarr_submitted:
                            _lidarr_add_artist(artist)
                            lidarr_submitted.add(artist)

        if to_add:
            _playlist_add(q_pid, to_add)
            log.info("weekly_discovery: added %d songs to %s", len(to_add), q_name)
        else:
            log.info("weekly_discovery: no new songs found for %s", q_name)

        log.info("weekly_discovery: done")


    def _lidarr_add_artist(artist_name: str) -> None:
        """Look up artist in Lidarr and POST for monitoring if found. Swallows 400 (already exists)."""
        headers = {"X-Api-Key": LIDARR_API_KEY}
        try:
            resp = requests.get(
                f"{LIDARR_URL}/api/v1/artist/lookup",
                params={"term": artist_name},
                headers=headers,
                timeout=30,
            )
            resp.raise_for_status()
            results = resp.json()
            if not results:
                log.debug("_lidarr_add_artist: %r not found in Lidarr lookup", artist_name)
                return

            artist_data = results[0]
            artist_data["monitored"] = True
            artist_data["qualityProfileId"] = int(
                os.getenv("LIDARR_QUALITY_PROFILE_ID", "1")
            )
            artist_data["rootFolderPath"] = artist_data.get("rootFolderPath", "/music")
            artist_data["addOptions"] = {"monitor": "all", "searchForMissingAlbums": True}

            post_resp = requests.post(
                f"{LIDARR_URL}/api/v1/artist",
                json=artist_data,
                headers=headers,
                timeout=30,
            )
            if post_resp.status_code == 400:
                log.debug("_lidarr_add_artist: %r already monitored", artist_name)
                return
            post_resp.raise_for_status()
            log.info("_lidarr_add_artist: added %r to Lidarr", artist_name)
        except Exception as exc:
            log.warning("_lidarr_add_artist: error adding %r — %s", artist_name, exc)


    def _playlist_add(pid: str, song_ids: list[str]) -> None:
        """Add song IDs to a Subsonic playlist via updatePlaylist."""
        auth = [("u", ND_USER), ("p", ND_PASSWORD), ("v", "1.16.1"), ("c", "curator"), ("f", "json")]
        params = auth + [("playlistId", pid)] + [("songIdToAdd", sid) for sid in song_ids]
        resp = requests.get(f"{ND_URL}/rest/updatePlaylist", params=params, timeout=30)
        resp.raise_for_status()


    # ---------------------------------------------------------------------------
    # Quarterly archive
    # ---------------------------------------------------------------------------

    def quarterly_archive() -> None:
        """
        Archive the current quarter playlist:
        - Songs within the 4-week grace period → carry over to next quarter playlist
        - Starred songs → keep (do nothing — they stay in the archive)
        - Remaining unstarred songs → delete track file via Lidarr + remove from playlist
        """
        log.info("quarterly_archive: start")
        q = _prev_quarter(current_quarter())
        pid = get_or_create_playlist(q)
        entries = playlist_entries(pid)
        stars = starred_ids()

        grace_cutoff = datetime.now(timezone.utc) - timedelta(
            days=int(os.getenv("GRACE_PERIOD_DAYS", "28"))
        )

        carry_over: list[str] = []
        to_remove_indices: list[int] = []

        for idx, entry in enumerate(entries):
            # Parse Subsonic ISO created timestamp (e.g. "2026-06-01T12:00:00.000Z")
            created_str = entry.get("created", "")
            try:
                created_dt = datetime.fromisoformat(
                    created_str.replace("Z", "+00:00")
                )
            except (ValueError, AttributeError):
                log.warning(
                    "quarterly_archive: cannot parse created=%r for song %s; treating as old",
                    created_str,
                    entry.get("id"),
                )
                created_dt = datetime.min.replace(tzinfo=timezone.utc)

            if created_dt > grace_cutoff:
                # Within grace period — carry over regardless of star status
                carry_over.append(entry["id"])
                continue

            if entry["id"] in stars:
                # Starred — keep in current archive (do nothing)
                continue

            # Unstarred + past grace period — delete file and remove from playlist
            _delete_track_file(entry)
            to_remove_indices.append(idx)

        # Remove unstarred songs from the current playlist (indices sorted descending)
        if to_remove_indices:
            to_remove_indices.sort(reverse=True)
            auth = [("u", ND_USER), ("p", ND_PASSWORD), ("v", "1.16.1"), ("c", "curator"), ("f", "json")]
            params = auth + [("playlistId", pid)] + [("songIndexToRemove", idx) for idx in to_remove_indices]
            resp = requests.get(f"{ND_URL}/rest/updatePlaylist", params=params, timeout=30)
            resp.raise_for_status()
            log.info("quarterly_archive: removed %d songs from %s", len(to_remove_indices), q)

        starred_count = sum(
            1 for e in entries
            if e["id"] in stars and e["id"] not in [entries[i]["id"] for i in to_remove_indices]
        )
        if starred_count == 0:
            log.warning("quarterly_archive: 0 starred songs archived for %s", q)

        # Carry-over songs → next quarter playlist
        if carry_over:
            next_q = _next_quarter(q)
            next_pid = get_or_create_playlist(next_q)
            existing_next = {e["id"] for e in playlist_entries(next_pid)}
            new_carry = [sid for sid in carry_over if sid not in existing_next]
            if new_carry:
                _playlist_add(next_pid, new_carry)
                log.info(
                    "quarterly_archive: carried %d songs to %s", len(new_carry), next_q
                )

        log.info("quarterly_archive: done")


    def _next_quarter(q: str) -> str:
        """Return the next quarter string given 'YYYY-QN'."""
        year, qn = q.split("-Q")
        year = int(year)
        qn = int(qn)
        if qn == 4:
            return f"{year + 1}-Q1"
        return f"{year}-Q{qn + 1}"


    def _prev_quarter(q: str) -> str:
        """Return the previous quarter string given 'YYYY-QN'."""
        year, qn = q.split("-Q")
        year = int(year)
        qn = int(qn)
        if qn == 1:
            return f"{year - 1}-Q4"
        return f"{year}-Q{qn - 1}"


    def _delete_track_file(entry: dict) -> None:
        """
        Delete the Lidarr track file corresponding to a Navidrome entry.
        Resolves artistId via artist lookup, then matches path in trackFile list.
        Swallows 404 (already gone); logs other errors as WARNING.
        """
        headers = {"X-Api-Key": LIDARR_API_KEY}
        artist_name = entry.get("artist", "")
        song_path = entry.get("path", "")

        try:
            # Step 1 — resolve Lidarr artistId from managed library (not lookup/MusicBrainz)
            resp = requests.get(
                f"{LIDARR_URL}/api/v1/artist",
                headers=headers,
                timeout=30,
            )
            resp.raise_for_status()
            all_artists = resp.json()
            matches = [a for a in all_artists if a.get("artistName", "").lower() == artist_name.lower()]
            if not matches:
                log.warning("_delete_track_file: artist %r not in Lidarr managed library", artist_name)
                return
            artist_id = matches[0]["id"]

            # Step 2 — list track files for this artist
            resp = requests.get(
                f"{LIDARR_URL}/api/v1/trackFile",
                params={"artistId": artist_id},
                headers=headers,
                timeout=30,
            )
            resp.raise_for_status()
            track_files = resp.json()

            # Step 3 — match by path substring
            track_file_id = None
            for tf in track_files:
                tf_path = tf.get("path", "")
                if song_path and (song_path in tf_path or tf_path in song_path):
                    track_file_id = tf["id"]
                    break

            if track_file_id is None:
                log.warning(
                    "_delete_track_file: no matching trackFile for path=%r (artist=%r)",
                    song_path,
                    artist_name,
                )
                return

            # Step 4 — delete the track file
            del_resp = requests.delete(
                f"{LIDARR_URL}/api/v1/trackFile/{track_file_id}",
                headers=headers,
                timeout=30,
            )
            if del_resp.status_code == 404:
                log.debug(
                    "_delete_track_file: trackFile %d already gone", track_file_id
                )
                return
            del_resp.raise_for_status()
            log.info(
                "_delete_track_file: deleted trackFile %d for %r", track_file_id, song_path
            )

        except Exception as exc:
            log.warning(
                "_delete_track_file: error deleting file for entry %r — %s",
                entry.get("id"),
                exc,
            )


    # ---------------------------------------------------------------------------
    # Annual best-of
    # ---------------------------------------------------------------------------

    def annual_best_of() -> None:
        """
        Collect all songs from the previous year's quarterly playlists (YYYY-Q1..Q4)
        and consolidate them into a 'YYYY-Best-Of' playlist.
        """
        log.info("annual_best_of: start")
        prev_year = datetime.now().year - 1

        data = subsonic_get("getPlaylists")
        all_playlists = data.get("playlists", {}).get("playlist", [])
        if isinstance(all_playlists, dict):
            all_playlists = [all_playlists]

        q_playlists = [
            pl for pl in all_playlists if pl["name"].startswith(f"{prev_year}-Q")
        ]

        if not q_playlists:
            log.warning(
                "annual_best_of: no quarterly playlists found for %d", prev_year
            )
            return

        # Collect unique song IDs across all quarterly playlists
        all_ids: list[str] = []
        seen: set[str] = set()
        for pl in q_playlists:
            for entry in playlist_entries(pl["id"]):
                sid = entry["id"]
                if sid not in seen:
                    seen.add(sid)
                    all_ids.append(sid)

        if not all_ids:
            log.warning("annual_best_of: quarterly playlists for %d are empty", prev_year)
            return

        best_name = f"{prev_year}-Best-Of"
        best_pid = get_or_create_playlist(best_name)
        existing = {e["id"] for e in playlist_entries(best_pid)}
        new_ids = [sid for sid in all_ids if sid not in existing]

        if new_ids:
            _playlist_add(best_pid, new_ids)
            log.info(
                "annual_best_of: added %d songs to %s", len(new_ids), best_name
            )
        else:
            log.info("annual_best_of: %s already up to date", best_name)

        log.info("annual_best_of: done")


    # ---------------------------------------------------------------------------
    # Scheduler + entrypoint
    # ---------------------------------------------------------------------------

    scheduler = BlockingScheduler(timezone="Asia/Seoul")
    scheduler.add_job(weekly_discovery, "cron", day_of_week="mon", hour=3)
    scheduler.add_job(quarterly_archive, "cron", month="1,4,7,10", day=1, hour=2)
    scheduler.add_job(annual_best_of, "cron", month=1, day=1, hour=3)

    if __name__ == "__main__":
        logging.basicConfig(
            level=logging.INFO, format="%(asctime)s %(levelname)s %(message)s"
        )
        get_or_create_playlist(current_quarter())  # create immediately on startup
        Path("/tmp/started").touch()
        scheduler.start()
