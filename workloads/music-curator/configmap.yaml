apiVersion: v1
kind: ConfigMap
metadata:
  name: music-curator-config
  namespace: music-curator
data:
  # Navidrome Subsonic API endpoint — ClusterIP FQDN (port 4533 from navidrome/deployment.yaml)
  ND_URL: http://navidrome.navidrome.svc.cluster.local:4533
  # Operator fills real value after first deploy
  ND_USER: jay
  # Lidarr ClusterIP FQDN (port 8686 from lidarr/deployment-lidarr.yaml)
  LIDARR_URL: http://lidarr.lidarr.svc.cluster.local:8686
  # Last.fm scrobbling account username — operator fills real value
  LASTFM_USER: JongminGim
  TZ: Asia/Seoul
  GRACE_PERIOD_DAYS: "28"
  # Comma-separated Last.fm tag whitelist — similar artists without any of these tags
  # are skipped during discovery. Empty string = allow all.
  DISCOVERY_ALLOWED_TAGS: >-
    j-pop,jpop,j-rock,jrock,anime,vocaloid,japanese,anisong,idol,doujin,
    visual kei,city pop,j-indie,touhou,niconico,
    k-pop,kpop,korean,k-indie,
    pop,rock,indie,alternative,electronic,ambient,
    soundtrack,film score,orchestral,instrumental,
    post-rock,synthpop,synth-pop,new wave,dream pop,shoegaze,electropop,
    singer-songwriter,art pop,indie pop,indie rock,alt-pop
  # Lidarr quality profile id — "1" is the default "Any" profile; override if custom profile exists
  LIDARR_QUALITY_PROFILE_ID: "1"
  # slskd (Soulseek client) — track-level download for weekly_discovery
  SLSKD_URL: http://slskd.lidarr.svc.cluster.local:5030
  # Max tracks to queue per weekly_discovery run (prevents runaway slskd searches)
  DISCOVERY_MAX_TRACKS_PER_RUN: "30"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: music-curator-script
  namespace: music-curator
data:
  curator.py: |
    # /// script
    # requires-python = ">=3.12"
    # dependencies = ["requests", "apscheduler==3.*", "pylast"]
    # ///
    """
    music-curator — quarterly playlist lifecycle manager for Navidrome + Lidarr.

    Jobs (all times KST / Asia/Seoul):
      weekly_discovery   every Monday 03:00  — Last.fm → Navidrome playlist + Lidarr artist import
      quarterly_archive  Jan/Apr/Jul/Oct 1 02:00 — retain starred + grace-period songs; delete rest
      annual_best_of     Jan 1 03:00         — collate previous year's Q playlists into Best-Of
    """

    import logging
    import os
    import re
    import time
    from datetime import datetime, timedelta, timezone
    from pathlib import Path
    from urllib.parse import quote as url_quote

    import pylast
    import requests
    from apscheduler.schedulers.blocking import BlockingScheduler

    # ---------------------------------------------------------------------------
    # Env vars — read at module level; process exits on missing key (fail fast)
    # ---------------------------------------------------------------------------
    ND_URL = os.environ["ND_URL"]
    ND_USER = os.environ["ND_USER"]
    ND_PASSWORD = os.environ["ND_PASSWORD"]
    LIDARR_URL = os.environ["LIDARR_URL"]
    LIDARR_API_KEY = os.environ["LIDARR_API_KEY"]
    LASTFM_USER = os.environ["LASTFM_USER"]
    LASTFM_API_KEY = os.environ["LASTFM_API_KEY"]
    LASTFM_API_SECRET = os.environ["LASTFM_API_SECRET"]
    SLSKD_URL = os.environ["SLSKD_URL"]
    SLSKD_API_KEY = os.environ["SLSKD_API_KEY"]
    DISCOVERY_MAX_TRACKS_PER_RUN = int(os.getenv("DISCOVERY_MAX_TRACKS_PER_RUN", "30"))
    # Comma-separated Last.fm tag whitelist for discovery. Empty = allow all.
    _ALLOWED_TAGS: frozenset[str] = frozenset(
        t.strip().lower()
        for t in os.getenv("DISCOVERY_ALLOWED_TAGS", "").split(",")
        if t.strip()
    )

    log = logging.getLogger(__name__)


    # ---------------------------------------------------------------------------
    # Helpers
    # ---------------------------------------------------------------------------

    def current_quarter() -> str:
        """Return the current quarter as 'YYYY-QN' (e.g. '2026-Q2')."""
        now = datetime.now()
        q = (now.month - 1) // 3 + 1
        return f"{now.year}-Q{q}"


    def subsonic_get(path: str, **params) -> dict:
        """
        Call a Subsonic REST endpoint and return the subsonic-response dict.
        Auth params are appended automatically.
        """
        auth = {
            "u": ND_USER,
            "p": ND_PASSWORD,
            "v": "1.16.1",
            "c": "curator",
            "f": "json",
        }
        url = f"{ND_URL}/rest/{path}"
        resp = requests.get(url, params={**params, **auth}, timeout=30)
        resp.raise_for_status()
        sr = resp.json()["subsonic-response"]
        if sr.get("status") == "failed":
            err = sr.get("error", {})
            raise RuntimeError(f"Subsonic {path} failed [{err.get('code')}]: {err.get('message')}")
        return sr


    def get_or_create_playlist(name: str) -> str:
        """Return the Subsonic playlist id for *name*, creating it if missing."""
        data = subsonic_get("getPlaylists")
        playlists = data.get("playlists", {}).get("playlist", [])
        for pl in playlists:
            if pl["name"] == name:
                return pl["id"]
        # Not found — create it
        data = subsonic_get("createPlaylist", name=name)
        if "playlist" in data:
            return data["playlist"]["id"]
        # ponytail: some Navidrome versions don't return playlist on createPlaylist — re-fetch
        data = subsonic_get("getPlaylists")
        playlists = data.get("playlists", {}).get("playlist", [])
        for pl in playlists:
            if pl["name"] == name:
                return pl["id"]
        raise RuntimeError(f"Created playlist '{name}' but could not find its ID after re-fetch")


    def playlist_entries(pid: str) -> list[dict]:
        """Return the entry list for playlist *pid* (each dict has id, path, created, etc.)."""
        data = subsonic_get("getPlaylist", id=pid)
        entries = data.get("playlist", {}).get("entry", [])
        if isinstance(entries, dict):
            # Subsonic returns a single dict (not a list) when there is exactly one entry
            entries = [entries]
        return entries


    def starred_ids() -> set[str]:
        """Return the set of starred song IDs from Navidrome."""
        data = subsonic_get("getStarred2")
        songs = data.get("starred2", {}).get("song", [])
        if isinstance(songs, dict):
            songs = [songs]
        return {s["id"] for s in songs}


    # ---------------------------------------------------------------------------
    # Weekly discovery
    # ---------------------------------------------------------------------------

    def weekly_discovery() -> None:
        """
        Pull recent Last.fm tracks → find similar artists → search Navidrome →
        add found songs to the current quarter playlist.
        For tracks not yet in the library: search slskd (Soulseek) and queue
        the individual FLAC file for download (track-level, not album-level).
        Downloaded tracks appear in Navidrome after its next rescan, ready for
        the following week's run.
        """
        log.info("weekly_discovery: start")

        # Trigger Navidrome rescan so last week's slskd downloads are visible
        try:
            subsonic_get("startScan")
            log.info("weekly_discovery: triggered Navidrome rescan")
        except Exception as exc:
            log.warning("weekly_discovery: rescan trigger failed — %s", exc)

        network = pylast.LastFMNetwork(
            api_key=LASTFM_API_KEY, api_secret=LASTFM_API_SECRET
        )
        user = network.get_user(LASTFM_USER)
        recent = user.get_recent_tracks(limit=100)

        # Unique artist names from recent scrobbles
        seen_artists: set[str] = set()
        for scrobble in recent:
            try:
                seen_artists.add(scrobble.track.artist.name)
            except Exception:
                pass

        # Current quarter playlist
        q_name = current_quarter()
        q_pid = get_or_create_playlist(q_name)
        existing_ids = {e["id"] for e in playlist_entries(q_pid)}

        to_add: list[str] = []
        slskd_queued_artists: set[str] = set()   # one track per new artist per run
        slskd_queued = 0

        for artist_name in seen_artists:
            try:
                artist_obj = network.get_artist(artist_name)
                similars = artist_obj.get_similar(limit=5)
            except Exception as exc:
                log.warning("weekly_discovery: skipping artist %r — %s", artist_name, exc)
                continue

            for sim_item in similars:
                try:
                    sim_artist = sim_item.item
                    top_tracks = sim_artist.get_top_tracks(limit=5)
                except Exception as exc:
                    sim_name = getattr(getattr(sim_item, 'item', None), 'name', '?')
                    log.warning("weekly_discovery: skipping similar artist %r — %s", sim_name, exc)
                    continue

                for track_item in top_tracks:
                    try:
                        title = track_item.item.title
                        artist = track_item.item.artist.name
                    except Exception:
                        continue

                    # Search Navidrome
                    try:
                        sr = subsonic_get(
                            "search3",
                            query=f"{artist} {title}",
                            songCount=5,
                            albumCount=0,
                            artistCount=0,
                        )
                        songs = sr.get("searchResult3", {}).get("song", [])
                        if isinstance(songs, dict):
                            songs = [songs]
                    except Exception as exc:
                        log.warning("weekly_discovery: Navidrome search error — %s", exc)
                        continue

                    if songs:
                        for song in songs:
                            sid = song["id"]
                            if sid not in existing_ids and sid not in to_add:
                                to_add.append(sid)
                    elif (
                        slskd_queued < DISCOVERY_MAX_TRACKS_PER_RUN
                        and artist not in slskd_queued_artists
                        and _sim_artist_allowed(sim_artist)
                    ):
                        # Track not in library — queue the specific FLAC via slskd
                        if _slskd_queue_track(artist, title):
                            slskd_queued_artists.add(artist)
                            slskd_queued += 1

        if to_add:
            _playlist_add(q_pid, to_add)
            log.info("weekly_discovery: added %d songs to %s", len(to_add), q_name)
        else:
            log.info("weekly_discovery: no new songs found for %s", q_name)

        log.info("weekly_discovery: done — slskd queued %d new tracks", slskd_queued)


    def _sim_artist_allowed(artist_obj) -> bool:
        """Return True if artist has at least one tag in _ALLOWED_TAGS (fail-open on errors)."""
        if not _ALLOWED_TAGS:
            return True
        try:
            tags = artist_obj.get_top_tags(limit=5)
            artist_tags = {t.item.name.lower() for t in tags}
            allowed = bool(artist_tags & _ALLOWED_TAGS)
            if not allowed:
                log.debug("_sim_artist_allowed: skip %r — no matching tags (got %s)", artist_obj.name, artist_tags)
            return allowed
        except Exception:
            return True  # fail open — don't block on Last.fm tag errors


    def _slskd_queue_track(artist: str, title: str) -> bool:
        """
        Search slskd (Soulseek) for a specific FLAC track and queue it for download.
        Returns True if successfully enqueued, False if not found or on error.
        Each track lands in /mnt/music/.incoming/{user}/... and Navidrome picks it up on rescan.
        """
        headers = {"X-Api-Key": SLSKD_API_KEY}
        query = f"{artist} {title}"
        try:
            # 1. Initiate search
            resp = requests.post(
                f"{SLSKD_URL}/api/v0/searches",
                json={
                    "searchText": query,
                    "searchTimeout": 5000,
                    "filterResponses": True,
                    "maximumPeerQueueLength": 50,
                    "minimumPeerUploadSpeed": 0,
                },
                headers=headers,
                timeout=15,
            )
            resp.raise_for_status()
            search_id = resp.json()["id"]

            # 2. Wait for results (slskd needs a moment to gather responses)
            time.sleep(6)
            deadline = time.time() + 8
            while time.time() < deadline:
                state = requests.get(
                    f"{SLSKD_URL}/api/v0/searches/{search_id}",
                    params={"includeResponses": "false"},
                    headers=headers,
                    timeout=10,
                ).json().get("state", "")
                if state != "InProgress":
                    break
                time.sleep(1)

            # 3. Get results
            results = requests.get(
                f"{SLSKD_URL}/api/v0/searches/{search_id}/responses",
                headers=headers,
                timeout=10,
            ).json()

            # 4. Cleanup search
            requests.delete(f"{SLSKD_URL}/api/v0/searches/{search_id}", headers=headers, timeout=5)

            if not results:
                log.debug("_slskd_queue_track: no results for %r", query)
                return False

            # 5. Find best FLAC matching the track title
            title_norm = re.sub(r"[^\w\s]", "", title.lower())
            title_words = [w for w in title_norm.split() if len(w) > 1]
            best: tuple | None = None  # (size, username, file_dict)

            for result in results:
                username = result.get("username", "")
                for f in result.get("files", []):
                    fname = f.get("filename", "")
                    if not fname.lower().endswith(".flac"):
                        continue
                    basename = re.sub(r"[^\w\s]", "", fname.rsplit("\\", 1)[-1].lower())
                    if not title_words or sum(1 for w in title_words if w in basename) < max(1, len(title_words) // 2):
                        continue
                    size = f.get("size", 0)
                    if best is None or size > best[0]:
                        best = (size, username, f)

            if not best:
                log.debug("_slskd_queue_track: no FLAC match for %r — %r", title, query)
                return False

            # 6. Enqueue
            _, username, file_dict = best
            enq = requests.post(
                f"{SLSKD_URL}/api/v0/transfers/downloads/{url_quote(username)}",
                json=[{"filename": file_dict["filename"], "size": file_dict["size"]}],
                headers=headers,
                timeout=10,
            )
            if enq.ok:
                log.info(
                    "_slskd_queue_track: queued %r — %r from %r",
                    title, file_dict["filename"].rsplit("\\", 1)[-1], username,
                )
                return True
            log.debug("_slskd_queue_track: enqueue failed for %r: %s", query, enq.text)
            return False

        except Exception as exc:
            log.warning("_slskd_queue_track: error for %r — %s", query, exc)
            return False


    def _lidarr_add_artist(artist_name: str) -> None:
        """Keep for manual use / Lidarr UI management. Not called from weekly_discovery."""
        headers = {"X-Api-Key": LIDARR_API_KEY}
        try:
            resp = requests.get(
                f"{LIDARR_URL}/api/v1/artist/lookup",
                params={"term": artist_name},
                headers=headers,
                timeout=30,
            )
            resp.raise_for_status()
            results = resp.json()
            if not results:
                return

            artist_data = results[0]
            artist_data["monitored"] = True
            artist_data["qualityProfileId"] = int(os.getenv("LIDARR_QUALITY_PROFILE_ID", "1"))
            artist_data["metadataProfileId"] = int(os.getenv("LIDARR_METADATA_PROFILE_ID", "1"))
            artist_data["rootFolderPath"] = artist_data.get("rootFolderPath", "/music")
            artist_data["monitorNewItems"] = "all"
            artist_data["addOptions"] = {"monitor": "all", "searchForMissingAlbums": True}

            post_resp = requests.post(
                f"{LIDARR_URL}/api/v1/artist",
                json=artist_data,
                headers=headers,
                timeout=30,
            )
            if post_resp.status_code != 400:
                post_resp.raise_for_status()
                log.info("_lidarr_add_artist: added %r", artist_name)
        except Exception as exc:
            log.warning("_lidarr_add_artist: error adding %r — %s", artist_name, exc)


    def _playlist_add(pid: str, song_ids: list[str]) -> None:
        """Add song IDs to a Subsonic playlist via updatePlaylist."""
        auth = [("u", ND_USER), ("p", ND_PASSWORD), ("v", "1.16.1"), ("c", "curator"), ("f", "json")]
        params = auth + [("playlistId", pid)] + [("songIdToAdd", sid) for sid in song_ids]
        resp = requests.get(f"{ND_URL}/rest/updatePlaylist", params=params, timeout=30)
        resp.raise_for_status()


    # ---------------------------------------------------------------------------
    # Quarterly archive
    # ---------------------------------------------------------------------------

    def quarterly_archive() -> None:
        """
        Archive ALL past quarterly playlists (any YYYY-QN older than current quarter):
        - Direct previous quarter: grace period applies (songs added within 28 days carry over)
        - Older quarters (e.g. Q1 processed on Jul 1): no grace period — star status only
        - Starred songs → kept in archive playlist
        - Unstarred + eligible → track file deleted via Lidarr + removed from playlist
        """
        log.info("quarterly_archive: start")
        current_q = current_quarter()
        prev_q = _prev_quarter(current_q)

        data = subsonic_get("getPlaylists")
        all_pls = data.get("playlists", {}).get("playlist", [])
        if isinstance(all_pls, dict):
            all_pls = [all_pls]

        # Find all playlists matching YYYY-QN that are older than current quarter
        past_q_pls = [
            p for p in all_pls
            if re.match(r"^\d{4}-Q[1-4]$", p["name"]) and p["name"] < current_q
        ]

        if not past_q_pls:
            log.info("quarterly_archive: no past quarterly playlists found")
            return

        stars = starred_ids()
        grace_days = int(os.getenv("GRACE_PERIOD_DAYS", "28"))
        grace_cutoff = datetime.now(timezone.utc) - timedelta(days=grace_days)
        # Songs carried over always go to the new current quarter
        carry_next_pid: str | None = None

        for pl in sorted(past_q_pls, key=lambda p: p["name"]):
            q = pl["name"]
            pid = pl["id"]
            # Only the direct previous quarter gets grace period; older ones do not
            apply_grace = (q == prev_q)
            entries = playlist_entries(pid)
            log.info("quarterly_archive: processing %s (%d songs, grace=%s)", q, len(entries), apply_grace)

            carry_over: list[str] = []
            to_remove_indices: list[int] = []

            for idx, entry in enumerate(entries):
                created_str = entry.get("created", "")
                try:
                    created_dt = datetime.fromisoformat(created_str.replace("Z", "+00:00"))
                except (ValueError, AttributeError):
                    log.warning("quarterly_archive: cannot parse created=%r for %s; treating as old", created_str, entry.get("id"))
                    created_dt = datetime.min.replace(tzinfo=timezone.utc)

                if apply_grace and created_dt > grace_cutoff:
                    carry_over.append(entry["id"])
                    continue

                if entry["id"] in stars:
                    continue  # starred — keep in archive

                # Unstarred + eligible → delete file + remove from playlist
                _delete_track_file(entry)
                to_remove_indices.append(idx)

            if to_remove_indices:
                to_remove_indices.sort(reverse=True)
                auth = [("u", ND_USER), ("p", ND_PASSWORD), ("v", "1.16.1"), ("c", "curator"), ("f", "json")]
                params = auth + [("playlistId", pid)] + [("songIndexToRemove", i) for i in to_remove_indices]
                resp = requests.get(f"{ND_URL}/rest/updatePlaylist", params=params, timeout=30)
                resp.raise_for_status()
                log.info("quarterly_archive: removed %d songs from %s", len(to_remove_indices), q)

            starred_kept = len(entries) - len(to_remove_indices) - len(carry_over)
            if starred_kept == 0:
                log.warning("quarterly_archive: 0 starred songs kept in %s", q)

            if carry_over:
                if carry_next_pid is None:
                    carry_next_pid = get_or_create_playlist(current_q)
                existing_next = {e["id"] for e in playlist_entries(carry_next_pid)}
                new_carry = [sid for sid in carry_over if sid not in existing_next]
                if new_carry:
                    _playlist_add(carry_next_pid, new_carry)
                    log.info("quarterly_archive: carried %d songs from %s to %s", len(new_carry), q, current_q)

        log.info("quarterly_archive: done")


    def _next_quarter(q: str) -> str:
        """Return the next quarter string given 'YYYY-QN'."""
        year, qn = q.split("-Q")
        year = int(year)
        qn = int(qn)
        if qn == 4:
            return f"{year + 1}-Q1"
        return f"{year}-Q{qn + 1}"


    def _prev_quarter(q: str) -> str:
        """Return the previous quarter string given 'YYYY-QN'."""
        year, qn = q.split("-Q")
        year = int(year)
        qn = int(qn)
        if qn == 1:
            return f"{year - 1}-Q4"
        return f"{year}-Q{qn - 1}"


    def _delete_track_file(entry: dict) -> None:
        """
        Delete the Lidarr track file corresponding to a Navidrome entry.
        Resolves artistId via artist lookup, then matches path in trackFile list.
        Swallows 404 (already gone); logs other errors as WARNING.
        """
        headers = {"X-Api-Key": LIDARR_API_KEY}
        artist_name = entry.get("artist", "")
        song_path = entry.get("path", "")

        try:
            # Step 1 — resolve Lidarr artistId from managed library (not lookup/MusicBrainz)
            resp = requests.get(
                f"{LIDARR_URL}/api/v1/artist",
                headers=headers,
                timeout=30,
            )
            resp.raise_for_status()
            all_artists = resp.json()
            matches = [a for a in all_artists if a.get("artistName", "").lower() == artist_name.lower()]
            if not matches:
                log.warning("_delete_track_file: artist %r not in Lidarr managed library", artist_name)
                return
            artist_id = matches[0]["id"]

            # Step 2 — list track files for this artist
            resp = requests.get(
                f"{LIDARR_URL}/api/v1/trackFile",
                params={"artistId": artist_id},
                headers=headers,
                timeout=30,
            )
            resp.raise_for_status()
            track_files = resp.json()

            # Step 3 — match by path substring
            track_file_id = None
            for tf in track_files:
                tf_path = tf.get("path", "")
                if song_path and (song_path in tf_path or tf_path in song_path):
                    track_file_id = tf["id"]
                    break

            if track_file_id is None:
                log.warning(
                    "_delete_track_file: no matching trackFile for path=%r (artist=%r)",
                    song_path,
                    artist_name,
                )
                return

            # Step 4 — delete the track file
            del_resp = requests.delete(
                f"{LIDARR_URL}/api/v1/trackFile/{track_file_id}",
                headers=headers,
                timeout=30,
            )
            if del_resp.status_code == 404:
                log.debug(
                    "_delete_track_file: trackFile %d already gone", track_file_id
                )
                return
            del_resp.raise_for_status()
            log.info(
                "_delete_track_file: deleted trackFile %d for %r", track_file_id, song_path
            )

        except Exception as exc:
            log.warning(
                "_delete_track_file: error deleting file for entry %r — %s",
                entry.get("id"),
                exc,
            )


    # ---------------------------------------------------------------------------
    # Annual best-of
    # ---------------------------------------------------------------------------

    def annual_best_of() -> None:
        """
        Collect all songs from the previous year's quarterly playlists (YYYY-Q1..Q4)
        and consolidate them into a 'YYYY-Best-Of' playlist.
        """
        log.info("annual_best_of: start")
        prev_year = datetime.now().year - 1

        data = subsonic_get("getPlaylists")
        all_playlists = data.get("playlists", {}).get("playlist", [])
        if isinstance(all_playlists, dict):
            all_playlists = [all_playlists]

        q_playlists = [
            pl for pl in all_playlists if pl["name"].startswith(f"{prev_year}-Q")
        ]

        if not q_playlists:
            log.warning(
                "annual_best_of: no quarterly playlists found for %d", prev_year
            )
            return

        # Collect unique song IDs across all quarterly playlists
        all_ids: list[str] = []
        seen: set[str] = set()
        for pl in q_playlists:
            for entry in playlist_entries(pl["id"]):
                sid = entry["id"]
                if sid not in seen:
                    seen.add(sid)
                    all_ids.append(sid)

        if not all_ids:
            log.warning("annual_best_of: quarterly playlists for %d are empty", prev_year)
            return

        best_name = f"{prev_year}-Best-Of"
        best_pid = get_or_create_playlist(best_name)
        existing = {e["id"] for e in playlist_entries(best_pid)}
        new_ids = [sid for sid in all_ids if sid not in existing]

        if new_ids:
            _playlist_add(best_pid, new_ids)
            log.info(
                "annual_best_of: added %d songs to %s", len(new_ids), best_name
            )
        else:
            log.info("annual_best_of: %s already up to date", best_name)

        log.info("annual_best_of: done")


    # ---------------------------------------------------------------------------
    # Scheduler + entrypoint
    # ---------------------------------------------------------------------------

    scheduler = BlockingScheduler(timezone="Asia/Seoul")
    scheduler.add_job(weekly_discovery, "cron", day_of_week="mon", hour=3)
    scheduler.add_job(quarterly_archive, "cron", month="1,4,7,10", day=1, hour=2)
    scheduler.add_job(annual_best_of, "cron", month=1, day=1, hour=3)

    if __name__ == "__main__":
        logging.basicConfig(
            level=logging.INFO, format="%(asctime)s %(levelname)s %(message)s"
        )
        get_or_create_playlist(current_quarter())  # create immediately on startup
        Path("/tmp/started").touch()
        scheduler.start()
