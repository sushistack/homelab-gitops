apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - configmap.yaml
  - sealedsecret.yaml
  - deployment.yaml

# `labels:` (never commonLabels — pollutes selectors). Only shared identity here;
# app.kubernetes.io/name + /component are hand-written inline on each resource.
labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/instance: music-curator
      app.kubernetes.io/part-of: music-curator
      app.kubernetes.io/managed-by: argocd
