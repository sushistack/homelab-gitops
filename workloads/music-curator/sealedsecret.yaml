# music-curator API credentials. SEALED to name+ns
# (music-curator-secrets/music-curator) -> safe to commit; only this cluster decrypts it.
# Consumed via envFrom: secretRef in deployment.yaml.
#
# To ROTATE, re-run:
#
#   kubectl create secret generic music-curator-secrets -n music-curator \
#     --from-literal=ND_PASSWORD='<navidrome admin password>' \
#     --from-literal=LIDARR_API_KEY='<lidarr api key>' \
#     --from-literal=LASTFM_API_KEY='<lastfm api key>' \
#     --from-literal=LASTFM_API_SECRET='<lastfm api secret>' \
#     --dry-run=client -o yaml \
#   | kubeseal --controller-namespace sealed-secrets --controller-name sealed-secrets --format yaml \
#   > workloads/music-curator/sealedsecret.yaml
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: music-curator-secrets
  namespace: music-curator
spec:
  encryptedData:
    ND_PASSWORD: REPLACE_WITH_KUBESEAL_OUTPUT==
    LIDARR_API_KEY: REPLACE_WITH_KUBESEAL_OUTPUT==
    LASTFM_API_KEY: REPLACE_WITH_KUBESEAL_OUTPUT==
    LASTFM_API_SECRET: REPLACE_WITH_KUBESEAL_OUTPUT==
  template:
    metadata:
      name: music-curator-secrets
      namespace: music-curator
