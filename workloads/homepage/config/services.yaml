---
# Hosts are tokenized as SECRET:DOMAIN_<NAME> and substituted by the Argo CD render CMP
# at sync (from argocd-render-tokens). `kustomize build` leaves them literal (expected).
# NOTE: never write a real token shape here — this comment ships inside the ConfigMap and
# an unresolved token shape would trip the render fail-closed guard.
- Tools:
    
    - n8n:
        href: https://${SECRET:DOMAIN_N8N}
        icon: n8n.png
        description: Workflow automation
    - vault:
        href: https://${SECRET:DOMAIN_VAULTWARDEN}
        icon: vaultwarden.png
        description: Vaultwarden
    - draw:
        href: https://${SECRET:DOMAIN_DRAW}
        icon: excalidraw.png
        description: Excalidraw
    - notify:
        href: https://${SECRET:DOMAIN_NTFY_WEB}
        icon: ntfy.png
        description: ntfy notifications
        widgets:
          - type: ntfy
            url: https://${SECRET:DOMAIN_NTFY}
            topic: homelab-critical
          - type: ntfy
            url: https://${SECRET:DOMAIN_NTFY}
            topic: homelab-monitor
          - type: ntfy
            url: https://${SECRET:DOMAIN_NTFY}
            topic: homelab-ops

- Reads:
    - keep:
        href: https://${SECRET:DOMAIN_KEEP}
        icon: karakeep.png
        description: Karakeep
        widget:
          type: karakeep
          url: https://${SECRET:DOMAIN_KEEP}
          key: "{{HOMEPAGE_VAR_KARAKEEP_API_KEY}}"
    - comics:
        href: https://${SECRET:DOMAIN_KOMGA}
        icon: komga.png
        description: Komga
        widget:
          type: komga
          url: https://${SECRET:DOMAIN_KOMGA}
          key: "{{HOMEPAGE_VAR_KOMGA_API_KEY}}"
    - comics-admin:
        href: https://${SECRET:DOMAIN_SUWAYOMI}
        icon: suwayomi.png
        description: Suwayomi
    - book:
        href: https://${SECRET:DOMAIN_CALIBRE}
        icon: calibre.png
        description: Calibre
        widget:
          type: calibreweb
          url: https://${SECRET:DOMAIN_CALIBRE}
          username: "{{HOMEPAGE_VAR_CALIBRE_USER}}"
          password: "{{HOMEPAGE_VAR_CALIBRE_PASSWORD}}"
    - rss:
        href: https://${SECRET:DOMAIN_RSS}
        icon: miniflux.png
        description: Miniflux
        widget:
          type: miniflux
          url: https://${SECRET:DOMAIN_RSS}
          key: "{{HOMEPAGE_VAR_MINIFLUX_API_KEY}}"

- Monitoring:
    - kuma:
        href: https://${SECRET:DOMAIN_KUMA}
        icon: uptime-kuma.png
        description: Uptime Kuma
        widget:
          type: uptimekuma
          url: https://${SECRET:DOMAIN_KUMA}
          # ponytail: slug is public (status page URL) — no secret needed; change if slug differs
          slug: default
    - netdata:
        href: https://${SECRET:DOMAIN_NETDATA}
        icon: netdata.png
        description: Netdata
        widget:
          type: netdata
          url: https://${SECRET:DOMAIN_NETDATA}

- Media:
    - jellyfin:
        href: https://${SECRET:DOMAIN_JELLYFIN}
        icon: jellyfin.png
        description: Media server
        widget:
          type: jellyfin
          url: https://${SECRET:DOMAIN_JELLYFIN}
          key: "{{HOMEPAGE_VAR_JELLYFIN_API_KEY}}"
          enableBlocks: true
    - immich:
        href: https://${SECRET:DOMAIN_IMMICH}
        icon: immich.png
        description: Photos
        widget:
          type: immich
          url: https://${SECRET:DOMAIN_IMMICH}
          key: "{{HOMEPAGE_VAR_IMMICH_API_KEY}}"
          version: 2
    - music:
        href: https://${SECRET:DOMAIN_NAVIDROME}
        icon: navidrome.png
        description: Navidrome
        widget:
          type: navidrome
          url: https://${SECRET:DOMAIN_NAVIDROME}
          user: "{{HOMEPAGE_VAR_NAVIDROME_USER}}"
          # ponytail: Homepage v1.13.2 generic handler doesn't compute md5(password+salt);
          # pre-computed token = md5(password + salt) with fixed salt stored in secret.
          # To regenerate: printf '%s%s' "$PASSWORD" "$SALT" | md5sum
          token: "{{HOMEPAGE_VAR_NAVIDROME_TOKEN}}"
          salt: "{{HOMEPAGE_VAR_NAVIDROME_SALT}}"
    - lidarr:
        href: https://${SECRET:DOMAIN_LIDARR}
        icon: lidarr.png
        description: Music collection
        widget:
          type: lidarr
          url: https://${SECRET:DOMAIN_LIDARR}
          key: "{{HOMEPAGE_VAR_LIDARR_API_KEY}}"
    - slskd:
        href: https://${SECRET:DOMAIN_SLSKD}
        icon: slskd.png
        description: Soulseek client
        widget:
          type: slskd
          url: https://${SECRET:DOMAIN_SLSKD}
          # ponytail: slskd has web.authentication.disabled=true (CF Access handles auth);
          # the widget sends X-API-Key but slskd ignores it when auth is disabled.
          key: dummy

- Ops:
    - argocd:
        href: https://${SECRET:DOMAIN_ARGOCD}
        icon: argo-cd.png
        description: GitOps
        widget:
          type: argocd
          url: https://${SECRET:DOMAIN_ARGOCD}
          key: "{{HOMEPAGE_VAR_ARGOCD_API_KEY}}"
    - semaphore:
        href: https://${SECRET:DOMAIN_SEMAPHORE}
        icon: semaphore.png
        description: Ansible Semaphore
    - traefik:
        href: https://${SECRET:DOMAIN_TRAEFIK}/dashboard/
        icon: traefik.png
        description: Ingress dashboard
        widget:
          type: traefik
          url: https://${SECRET:DOMAIN_TRAEFIK}

- Infra:
    - proxmox:
        href: https://${SECRET:DOMAIN_PROXMOX}
        icon: proxmox.png
        description: Proxmox VE
        widget:
          # Hit the FQDN, not 10.0.0.2:8006 — proxmox.eli.kr is fronted by this cluster's
          # Traefik with a valid LE cert (edge-proxies/proxmox.yaml), so TLS verifies and no
          # NODE_TLS relaxation is needed. LAN-only DNS; the pod resolves it via the LAN resolver.
          # token id/secret come from the homepage-secrets Secret via runtime {{HOMEPAGE_VAR_*}}.
          type: proxmox
          url: https://${SECRET:DOMAIN_PROXMOX}
          username: "{{HOMEPAGE_VAR_PROXMOX_TOKEN_ID}}"
          password: "{{HOMEPAGE_VAR_PROXMOX_TOKEN_SECRET}}"
    - openwrt:
        href: https://${SECRET:DOMAIN_OPENWRT}
        icon: openwrt.png
        description: OpenWrt
        widget:
          type: openwrt
          url: https://${SECRET:DOMAIN_OPENWRT}
          username: "{{HOMEPAGE_VAR_OPENWRT_USER}}"
          password: "{{HOMEPAGE_VAR_OPENWRT_PASSWORD}}"
    - kvm:
        href: https://${SECRET:DOMAIN_KVM}
        icon: mdi-monitor-dashboard
        description: NanoKVM
