---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - deployment.yaml
  - service.yaml
  - ingressroute.yaml      # INTERNAL (CF Access); host homepage.eli.kr
  - certificate.yaml       # letsencrypt-prod DNS-01
  - sealedsecret.yaml      # homepage-secrets: Proxmox + Jellyfin/Immich/Navidrome/Lidarr/Miniflux API keys

# Hashed name suffix → editing any config file rolls the Deployment automatically.
configMapGenerator:
  - name: homepage-config
    files:
      - config/settings.yaml
      - config/services.yaml
      - config/widgets.yaml
      - config/bookmarks.yaml

labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/instance: homepage
      app.kubernetes.io/part-of: homepage
      app.kubernetes.io/managed-by: argocd
      app.kubernetes.io/component: dashboard
