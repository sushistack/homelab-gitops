# Story 4.3 — navidrome DB-class data. The music library moved to
# pvc-music-local.yaml during the Lidarr/slskd/soularr migration; the old
# Longhorn navidrome-music PVC was removed after copy+cutover verification.
#
# navidrome-data -> SQLite metadata (play counts, scrobble state, library index).
# Dumped to R2 by backup-cronjob.yaml (online sqlite3 .backup, <=6h).
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: navidrome-data
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 2Gi   # navidrome.db (~3 MB today) + cache/covers; grow via PR if it climbs
