# Story 4.3 — navidrome backup actor. DB-CLASS ONLY (AC1): online sqlite3 .backup of the metadata
# DB -> R2. The music PVC is NOT mounted here, so the regenerable library is structurally excluded
# from the dump (Longhorn snapshots cover it instead — see pvc.yaml + stateful-cutover.md "Backup
# scope"). Ports the Compose navidrome-backup sidecar (docker-compose.yml:711-725, which already
# backed up ./data/navidrome/data:ro only). Copied from the ntfy reference (Story 4.1) with only the
# dump command + R2 path changed.
#
# RWO multi-mount trap (Reconciliation 1): navidrome-data is RWO -> Longhorn attaches to one node.
# This Job co-schedules onto the navidrome pod's node via podAffinity and mounts the PVC read-write
# (online `sqlite3 .backup` needs the -wal/-shm files), writing the dump to an emptyDir /scratch —
# NEVER back onto /data. The app is NOT scaled to 0 (online backup needs no quiesce).
apiVersion: batch/v1
kind: CronJob
metadata:
  name: navidrome-backup
  namespace: navidrome
spec:
  schedule: "5 */6 * * *"          # ≤6h (the freed Compose navidrome-backup slot); NFR5 cadence
  timeZone: Asia/Seoul
  concurrencyPolicy: Forbid
  # A hung pod would otherwise run forever and, with Forbid, silently suppress every later backup.
  # Bound both: activeDeadlineSeconds kills the job (-> Failed, visible); a missed schedule is only
  # honored within startingDeadlineSeconds.
  startingDeadlineSeconds: 300
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 900       # ~15 min ceiling: apk + sqlite .backup + rclone copy
      template:
        metadata:
          # NOT `app.kubernetes.io/name: navidrome` — that is the Service selector, and this pod has
          # no listener, so sharing it would add a dead endpoint to the navidrome Service every run.
          labels:
            app.kubernetes.io/name: navidrome-backup
            app.kubernetes.io/component: backup
        spec:
          restartPolicy: OnFailure
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: navidrome
                  topologyKey: kubernetes.io/hostname   # land on the node holding the RWO data volume
          containers:
            - name: backup
              # sqlite3 + rclone in one small image. // ponytail: runtime `apk add` floats the tool
              # versions and needs egress to the alpine CDN — fine under today's allow-all; when the
              # network-baseline default-deny lands, allow egress to the CDN + R2, or bake a pinned
              # sqlite+rclone image (upgrade path). Pin alpine by digest in that same sweep.
              image: alpine:3.20
              command:
                - /bin/sh
                - -ceu
                - |
                  apk add --no-cache sqlite rclone ca-certificates tzdata
                  ts=$(date +%Y-%m-%dT%H-%M-%S)
                  # online, lock-safe — source stays live (no scale-down). DB-class ONLY: /music is
                  # deliberately not mounted, so the dump can never include the regenerable library.
                  sqlite3 /data/navidrome.db ".backup /scratch/navidrome.db"
                  tar -C /scratch -czf "/scratch/navidrome-${ts}.tar.gz" navidrome.db
                  rclone copy "/scratch/navidrome-${ts}.tar.gz" "r2:homelab-k3s-services-backup/navidrome/"
                  # ~30-day retention (offen semantics). homelab-k3s-services-backup is the dedicated
                  # k3s-service bucket, so this prefix only holds our own archives.
                  rclone delete --min-age 720h "r2:homelab-k3s-services-backup/navidrome/" || true
              env:
                # bucket-scoped token (Object R&W) can't ListBuckets/CreateBucket -> rclone's default
                # bucket probe 403s; no_check_bucket skips it and PUTs straight to the existing bucket.
                - name: RCLONE_CONFIG_R2_NO_CHECK_BUCKET
                  value: "true"
              envFrom:
                - secretRef:
                    name: navidrome-backup-r2   # per-ns SealedSecret: R2 creds + rclone remote
              volumeMounts:
                - name: data
                  mountPath: /data          # RW: online .backup needs -wal/-shm (Reconciliation 1)
                - name: scratch
                  mountPath: /scratch
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: navidrome-data    # ONLY the DB-class PVC — music is never mounted here
            - name: scratch
              emptyDir: {}
