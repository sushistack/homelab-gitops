# ytdlp-api — internal yt-dlp HTTP API (nbr23/youtube-dl-server). Ported from configs/docker
# (home.server) compose. Graded Disposable / stateless / owns-no-data (architecture criticality
# grade): no PVC, no SealedSecret, no backup CronJob. Config is a mounted ConfigMap (config.yml).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ytdlp-api
spec:
  replicas: 1
  # Hand-written selector (kept out of kustomize labels) so it stays immutable across re-applies.
  selector:
    matchLabels:
      app.kubernetes.io/name: ytdlp-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ytdlp-api
    spec:
      containers:
        - name: ytdlp-api
          # nbr23/youtube-dl-server publishes only :latest (AR29 forbids :latest) -> pin by digest.
          # Multi-arch index sha256 captured 2026-06-18 via
          #   docker buildx imagetools inspect nbr23/youtube-dl-server:latest
          # Upgrade = re-inspect, bump this digest via PR (GitOps-revertible). yt-dlp's YouTube
          # extractor rots fast — a stale pin = silent extractor failure (runbook common-failure).
          image: nbr23/youtube-dl-server@sha256:5b4cc20efbb277a1c8819c4618c3b57c56e68d39534760c3b9b768ef20aed5ce
          ports:
            - containerPort: 8080
          env:
            - name: TZ
              value: Asia/Seoul
            - name: YDL_CONFIG_PATH
              value: /app_config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              # Memory limit only — NO cpu limit (a cpu limit causes CFS throttling).
              # 512Mi (not the 256Mi default tier): yt-dlp + ffmpeg audio extract/transcode spikes.
              memory: 512Mi
          # Service is HTTP -> httpGet on / (ports the Compose wget --spider loopback check;
          # AR31). startupProbe gates liveness until the port first opens.
          startupProbe:
            httpGet:
              path: /
              port: 8080
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 8080
          livenessProbe:
            httpGet:
              path: /
              port: 8080
          volumeMounts:
            - name: config
              mountPath: /app_config
              readOnly: true
            # Scratch /downloads (emptyDir), NOT a Longhorn PVC: ytdlp-api owns no data. The real
            # music library is navidrome's Longhorn volume, wired at navidrome's Epic 4 cutover
            # (Story 4.3) — not invented here. Re-downloads on pod restart (lost dedup DB) are
            # acceptable for this golden-path *deployment* proof.
            - name: downloads
              mountPath: /downloads
      volumes:
        - name: config
          configMap:
            name: ytdlp-api-config
        - name: downloads
          emptyDir: {}
