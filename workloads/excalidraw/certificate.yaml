# Story 2.4 — Task 3: PRODUCTION wildcard TLS for the cluster's hosts.
# cert-manager issues a browser-trusted wildcard cert from the PRODUCTION ClusterIssuer
# (letsencrypt-prod: LE production + Cloudflare DNS-01) into the `excalidraw-tls` Secret,
# which the websecure IngressRoute (ingressroute.yaml) serves.
#
# WILDCARD (not per-host): DNS-01 supports wildcards natively (this is WHY DNS-01 is mandated —
# HTTP-01 cannot issue them). One production issuance covers draw today and every SINGLE-LABEL
# Epic 3/4 cutover host under the public zone with the same Secret — lowest LE rate-limit pressure
# as services migrate. `*.<zone>` covers EXACTLY one label: the apex `<zone>` and nested
# `a.b.<zone>` hosts are NOT covered and would need their own SAN/cert. Future single-label hosts
# reuse this `excalidraw-tls` Secret via their own IngressRoute tls.secretName.
#
# INVARIANT: the IngressRoute Host (${SECRET:DOMAIN_DRAW}) must be a single-label child of
# ${SECRET:DOMAIN_PUBLIC}, or Traefik serves this wildcard cert against a non-matching host.
#
# ── STAGING -> PROD SWAP DONE ──
# Story 1.5 served this from letsencrypt-staging (browser-untrusted rehearsal). This is the live
# production issuance; renewal is automatic (cert-manager renewBefore, ~2/3 of the 90-day LE leaf).
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: excalidraw-tls
spec:
  secretName: excalidraw-tls
  dnsNames:
    - "*.${SECRET:DOMAIN_PUBLIC}"   # wildcard for the public zone (tokenized); covers draw + all single-label hosts under the zone (NOT apex/nested)
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
