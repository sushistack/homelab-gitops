# Story 1.5 — Task 3: web -> websecure. draw served over HTTPS from the cert-manager
# `excalidraw-tls` Secret (certificate.yaml); plain HTTP is redirected to HTTPS.
# Replaces the Story 1.4 HTTP-only IngressRoute.
#
# Host is tokenized (${SECRET:DOMAIN_DRAW}); the render CMP substitutes at ArgoCD sync time
# (see ansible/argocd-values.yaml). traefik.io/v1alpha1 (v3) — old traefik.containo.us silently fails.
#
# OPERATOR NOTE (live, no file): the cloudflared tunnel origin for draw points at https://<node>:443
# (Story 2.4: No-TLS-Verify OFF + originServerName=<draw host>, now the origin cert is real LE-prod —
# was noTLSVerify+staging cert in 1.5) or the :80 redirect below loops the CF path. LAN clients hit
# :80 and follow the redirect to :443.
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: excalidraw-redirect-https
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
# HTTPS (websecure :443) — serves the app with the cert-manager cert.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: excalidraw
  annotations:
    # public (whitelist): external-dns publishes this host to CF DNS
    external-dns.alpha.kubernetes.io/target: 761ca633-e9d6-4af8-8508-727bba00f0a9.cfargotunnel.com
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`${SECRET:DOMAIN_DRAW}`)
      kind: Rule
      services:
        - name: excalidraw
          port: 80
  tls:
    secretName: excalidraw-tls
---
# HTTP (web :80) — 301 to HTTPS via the redirect middleware.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: excalidraw-redirect
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`${SECRET:DOMAIN_DRAW}`)
      kind: Rule
      middlewares:
        - name: excalidraw-redirect-https
      services:
        - name: excalidraw   # required by the IngressRoute schema; the middleware redirects before it is hit
          port: 80
