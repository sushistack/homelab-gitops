# Netdata parent dbengine history (/var/cache/netdata). Longhorn-replicated, RWO → the parent uses
# strategy:Recreate. Prune=false + Retain: losing it costs metric history (minutes-to-days of charts),
# not config — the same deliberate no-backup stance as beszel (pairings/metrics are reproducible/short).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: netdata-cache
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path-retain
  volumeName: pvc-d8702784-1ad1-4984-a4f2-74d95f52849a
  resources:
    requests:
      storage: 10Gi
