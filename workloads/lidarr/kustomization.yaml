apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# slskd (Soulseek client) — Soulseek downloads for music-curator weekly_discovery (track-level).
# Lidarr and soularr removed: album-level downloads replaced by direct track-level slskd calls from
# music-curator. slskd stays as the Soulseek transport layer.
resources:
  - namespace.yaml
  - pvc-music-local.yaml   # static node-local PV -> k3s-cp-1:/mnt/music (RWX, off-Longhorn; dedicated music disk)
  - pvc-config.yaml        # slskd-config only (Longhorn RWO); lidarr-config + soularr-data kept for data safety
  - configmap.yaml         # slskd.yml non-secret config (auth disabled; download dir on the shared volume)
  - deployment-slskd.yaml
  - services.yaml          # slskd (5030) ClusterIP
  - ingressroute.yaml      # slskd INTERNAL (CF Access)
  - certificate.yaml       # slskd-tls letsencrypt-prod cert
  - sealedsecret-slskd.yaml    # slskd-soulseek (Soulseek creds)

# `labels:` (never commonLabels — pollutes selectors; never namePrefix — breaks the name+ns SealedSecret
# binding). Only the SHARED identity here; app.kubernetes.io/name + /component DIFFER per component
# (hand-written inline on each resource; every Service selector targets `name`). part-of: lidarr ties
# the three components to one logical service.
labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/instance: lidarr
      app.kubernetes.io/part-of: lidarr
      app.kubernetes.io/managed-by: argocd
