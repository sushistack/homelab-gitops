---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: slskd-redirect-https
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
# slskd HTTPS (websecure :443) — INTERNAL (CF Access).
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: slskd
  annotations:
    external-dns.alpha.kubernetes.io/target: 761ca633-e9d6-4af8-8508-727bba00f0a9.cfargotunnel.com
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`${SECRET:DOMAIN_SLSKD}`)
      kind: Rule
      services:
        - name: slskd
          port: 5030
  tls:
    secretName: slskd-tls
---
# slskd HTTP (web :80) — 301 to HTTPS.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: slskd-redirect
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`${SECRET:DOMAIN_SLSKD}`)
      kind: Rule
      middlewares:
        - name: slskd-redirect-https
      services:
        - name: slskd
          port: 5030
