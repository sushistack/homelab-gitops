# Session 2 — the small, precious app state goes on Longhorn (NOT the local music disk): lidarr's
# SQLite DBs (lidarr.db + logs.db: library/wishlist/quality state), slskd's app dir (slskd.db + state),
# and soularr's working dir (config.ini + run state/logs). RWO -> each Deployment is strategy:Recreate
# (SQLite single-writer/WAL). Prune=false + Retain: ArgoCD/Longhorn never delete real state on removal.
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: lidarr-config
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path-retain
  volumeName: pvc-d06e84d1-54a2-4320-babb-fcaa22d043ba
  resources:
    requests:
      storage: 2Gi   # lidarr.db + logs.db + metadata cache; grow via PR
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: slskd-config
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path-retain
  volumeName: pvc-cdae88e3-5138-47d6-b8ee-1c86a5e26111
  resources:
    requests:
      storage: 2Gi   # slskd.db (peer/search/transfer state) + incomplete downloads; grow via PR
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: soularr-data
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path-retain
  volumeName: pvc-f45cfea0-2fdf-421b-b217-eb1883fecceb
  resources:
    requests:
      storage: 1Gi   # soularr working dir: run state + logs (config.ini overlaid from the SealedSecret)
