apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - pvc.yaml                # vaultwarden-data (single durable class) — Prune=false/Retain
  - configmap.yaml          # vaultwarden-config: non-secret env (envFrom: configMapRef)
  - deployment.yaml
  - service.yaml
  - ingressroute.yaml       # web->websecure (TLS serve + HTTP->HTTPS redirect); host tokenized; WS-safe
  - certificate.yaml        # per-host cert-manager Certificate -> vaultwarden-tls (letsencrypt-prod)
  - backup-cronjob.yaml     # online sqlite3 .backup + durable companions -> R2
  - cloud-sync-configmap.yaml   # vaultwarden-cloud-sync-script: the bw mirror script (verbatim port)
  - cloud-sync-cronjob.yaml     # weekly vaultwarden -> Bitwarden Cloud mirror (SUSPENDED until sealed)
  - sealedsecret.yaml       # vaultwarden-backup-r2: R2 cred for the CronJob (REAL — sealed at the 2026-06-19 cutover)
  - sealedsecret-admin.yaml # vaultwarden-secrets: ADMIN_TOKEN (envFrom: secretRef) (REAL — sealed at the 2026-06-19 cutover)
  - sealedsecret-cloud-sync.yaml  # vaultwarden-cloud-sync: 7 VW_/BW_ creds for the mirror CronJob
# NOT included on purpose:
#   _cutover/   -> one-shot ingest Job, applied by hand during the cutover (must NOT be ArgoCD-managed)

# Use `labels:` (newer field), NEVER commonLabels (pollutes selectors -> immutable conflict) and
# NEVER namePrefix (breaks the name+ns binding SealedSecrets are sealed against). includeSelectors:
# false keeps these out of spec.selector / matchLabels (hand-written in deployment.yaml).
labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/name: vaultwarden
      app.kubernetes.io/instance: vaultwarden
      app.kubernetes.io/part-of: vaultwarden
      app.kubernetes.io/managed-by: argocd
      app.kubernetes.io/component: app
