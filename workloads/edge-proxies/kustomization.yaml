apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - common.yaml          # shared ServersTransport (insecure-backend) + redirect Middleware
  - proxmox.yaml         # https 8006 (self-signed)
  - openwrt.yaml         # https 443 (self-signed; Plane 0 gateway)
  - jellyfin.yaml        # http 8096  (confirm vs live NPM conf at cutover)
  - immich.yaml          # http 2283  (confirm vs live NPM conf at cutover)
  - kvm.yaml             # http 80    (confirm vs live NPM conf at cutover)

# No `labels:` block: these are selector-less Services with manual EndpointSlices, and a
# commonLabels/labels transformer that touched the Service selector would break the manual-endpoint
# association (kubernetes.io/service-name is the only label that may match). Keep it minimal.
#
# ⚠️ EndpointSlices are NOT ArgoCD-synced. ArgoCD's cluster-wide resource.exclusions (argocd-cm)
# excludes both core/v1 Endpoints and discovery.k8s.io/EndpointSlice, so the EndpointSlice doc in
# each <host>.yaml is dropped at sync (ExcludedResourceWarning — expected, not an error). The
# Service/Certificate/IngressRoute ARE synced. Apply the 5 slices out of band — they're static and
# persist (a selector-less Service never auto-manages them):  bash workloads/edge-proxies/apply-endpoints.sh
# Re-run after a cluster rebuild. (Discovered live during the 5.8 cutover.)
