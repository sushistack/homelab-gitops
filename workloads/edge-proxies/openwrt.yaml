# Story 5.8 (AC6b) — Traefik front for the openwrt host (was an NPM proxy-host on .20).
# Backend = http://${SECRET:IP_OPENWRT}:80. CONFIRMED against live NPM conf (8.conf: http .1:80) —
# the LuCI UI is served plain http on the gateway, so NO insecure-backend transport is needed.
# Plane 0 GATEWAY: the LAN recovery path during a k3s outage is the LAN IP, not the public host (runbook E5).
#
# Selector-less headless Service + manual EndpointSlice: k8s won't manage endpoints (no pod selector),
# so Traefik routes to the IP in the EndpointSlice. The public cert (openwrt-tls) is browser-trusted;
# the Traefik->backend hop is LAN-internal.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: openwrt-tls
  namespace: edge-proxies
spec:
  secretName: openwrt-tls
  dnsNames:
    - "${SECRET:DOMAIN_OPENWRT}"
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
---
apiVersion: v1
kind: Service
metadata:
  name: openwrt-backend
  namespace: edge-proxies
spec:
  clusterIP: None        # headless; endpoints come from the manual EndpointSlice below
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: openwrt-backend-1
  namespace: edge-proxies
  labels:
    kubernetes.io/service-name: openwrt-backend   # associates this slice with the Service above
addressType: IPv4
ports:
  - name: http
    port: 80
    protocol: TCP
endpoints:
  - addresses:
      - "${SECRET:IP_OPENWRT}"                      # backend IP (tokenized — never a raw 10.0.0.x in git)
    conditions:
      ready: true        # explicit: an absent `ready` defaults to ready, but stricter Traefik builds may skip NotReady endpoints
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: openwrt
  namespace: edge-proxies
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`${SECRET:DOMAIN_OPENWRT}`)
      kind: Rule
      services:
        - name: openwrt-backend
          port: 80
          scheme: http
  tls:
    secretName: openwrt-tls
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: openwrt-redirect
  namespace: edge-proxies
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`${SECRET:DOMAIN_OPENWRT}`)
      kind: Rule
      middlewares:
        - name: redirect-https
      services:
        - name: openwrt-backend
          port: 80
          scheme: http
