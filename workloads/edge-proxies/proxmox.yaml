# Story 5.8 (AC6b) — Traefik front for the proxmox host (was an NPM proxy-host on .20).
# Backend = https://${SECRET:IP_PROXMOX}:8006. Proxmox UI: self-signed cert -> insecure-backend transport. CONFIRMED against live NPM (7.conf: https :8006).
#
# Selector-less headless Service + manual EndpointSlice: k8s won't manage endpoints (no pod selector),
# so Traefik routes to the IP in the EndpointSlice. The public cert (proxmox-tls) is browser-trusted;
# the Traefik->backend hop is LAN-internal.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: proxmox-tls
  namespace: edge-proxies
spec:
  secretName: proxmox-tls
  dnsNames:
    - "${SECRET:DOMAIN_PROXMOX}"
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
---
apiVersion: v1
kind: Service
metadata:
  name: proxmox-backend
  namespace: edge-proxies
spec:
  clusterIP: None        # headless; endpoints come from the manual EndpointSlice below
  ports:
    - name: https
      port: 8006
      targetPort: 8006
      protocol: TCP
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: proxmox-backend-1
  namespace: edge-proxies
  labels:
    kubernetes.io/service-name: proxmox-backend   # associates this slice with the Service above
addressType: IPv4
ports:
  - name: https
    port: 8006
    protocol: TCP
endpoints:
  - addresses:
      - "${SECRET:IP_PROXMOX}"                          # backend IP (tokenized — never a raw .x in git)
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: proxmox
  namespace: edge-proxies
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`${SECRET:DOMAIN_PROXMOX}`)
      kind: Rule
      services:
        - name: proxmox-backend
          port: 8006
          scheme: https
          serversTransport: insecure-backend
  tls:
    secretName: proxmox-tls
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: proxmox-redirect
  namespace: edge-proxies
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`${SECRET:DOMAIN_PROXMOX}`)
      kind: Rule
      middlewares:
        - name: redirect-https
      services:
        - name: proxmox-backend
          port: 8006
          scheme: https
