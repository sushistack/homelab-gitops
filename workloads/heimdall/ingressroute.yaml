# Story 5.7 — Heimdall INTERNAL-only (operator dashboard). No cloudflared tunnel rule + LAN-only
# OpenWrt DNS override → 10.0.0.101 (staged in runbook). NO ipAllowList (tunnel egresses from a LAN IP
# → an allowlist would admit internet-via-tunnel; "no tunnel rule + LAN-only DNS" is the correct gate).
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: heimdall-redirect-https
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: heimdall
  annotations:
    # Stage 3: behind CF Access (email-OTP). Public record so Access can gate it.
    external-dns.alpha.kubernetes.io/target: 761ca633-e9d6-4af8-8508-727bba00f0a9.cfargotunnel.com
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`${SECRET:DOMAIN_HEIMDALL}`)
      kind: Rule
      services:
        - name: heimdall
          port: 80
  tls:
    secretName: heimdall-tls
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: heimdall-redirect
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`${SECRET:DOMAIN_HEIMDALL}`)
      kind: Rule
      middlewares:
        - name: heimdall-redirect-https
      services:
        - name: heimdall
          port: 80
