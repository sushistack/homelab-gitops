# Story 5.7 — Heimdall: an at-a-glance app-launcher dashboard on the platform under GitOps.
#
# 🔴 BITE 2 / Reconciliation 2 — this REVERSES 5.5's "no replacement dashboard" decision. It does NOT
# un-retire the Compose `homepage` (that stays dead); it adds a NEW, GitOps-managed dashboard. Operator
# decision 2026-06-19, recorded in DECISIONS.md. Karakeep overlap: Heimdall = launcher tiles (+ optional
# live status), Karakeep = bookmarks/read-later. The 5.5 links already live in Karakeep — re-adding them
# as Heimdall tiles is an OPTIONAL operator nicety (Story 5.8 item 4), not required here.
#
# SQLite at /config/www/app.sqlite → strategy:Recreate + startupProbe (the Epic 4 / komga pattern).
# linuxserver image runs as PUID/PGID and chowns /config in its s6 init, so no chown initContainer.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: heimdall
spec:
  replicas: 1
  progressDeadlineSeconds: 180
  strategy:
    type: Recreate          # SQLite single-writer
  selector:
    matchLabels:
      app.kubernetes.io/name: heimdall
  template:
    metadata:
      labels:
        app.kubernetes.io/name: heimdall
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: heimdall
          # lscr.io/linuxserver/heimdall. CONFIRM the current stable tag at install (plausible
          # placeholder) + SWAP TO @sha256 digest at cutover (AR29):
          #   docker buildx imagetools inspect lscr.io/linuxserver/heimdall:2.6.3
          image: lscr.io/linuxserver/heimdall:2.6.3
          ports:
            - containerPort: 80
          env:
            - name: TZ
              value: Asia/Seoul
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
          startupProbe:
            httpGet:
              path: /
              port: 80
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 80
          livenessProbe:
            httpGet:
              path: /
              port: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
          volumeMounts:
            - name: config
              mountPath: /config
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: heimdall-config
