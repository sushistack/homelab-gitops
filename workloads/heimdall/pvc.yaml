# Story 5.7 — Heimdall config + SQLite (/config/www/app.sqlite: tile layout). Small, Longhorn-replicated,
# RWO → Recreate. Prune=false + Retain so the tile layout survives PVC removal. No backup CronJob: the
# layout is reproducible config (re-clicking minutes), not user data (the deliberate no-backup-actor
# stance, unlike 5.6's reading-progress DBs). Tile list captured in the runbook for reproducibility.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: heimdall-config
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 1Gi
