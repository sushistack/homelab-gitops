# Traefik dashboard — INTERNAL-only. Per-host production TLS (letsencrypt-prod, DNS-01).
# DNS-01 needs no public reachability, so an internal-only host still gets a browser-trusted cert.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: traefik-dashboard-tls
spec:
  secretName: traefik-dashboard-tls
  dnsNames:
    - "${SECRET:DOMAIN_TRAEFIK}"
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
