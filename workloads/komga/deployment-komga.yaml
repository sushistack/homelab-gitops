# Story 5.6 — komga (the manga/comic READER). Mounts the shared NFS manga library READ-ONLY at /data
# and its own SQLite config (database.sqlite + tasks.sqlite) on a Longhorn PVC at /config. komga runs
# as root in the upstream image, so no chown initContainer is needed (it can write /config and read
# the NFS export). SQLite -> strategy:Recreate + grace 30s + startupProbe (WAL replay), per the Epic 4
# SQLite pattern (Reconciliation 5).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: komga
  labels:
    app.kubernetes.io/name: komga
    app.kubernetes.io/component: reader
spec:
  replicas: 1
  progressDeadlineSeconds: 180
  strategy:
    type: Recreate          # SQLite single-writer: never two pods on one WAL (RollingUpdate is the anti-pattern)
  selector:
    matchLabels:
      app.kubernetes.io/name: komga
  template:
    metadata:
      labels:
        app.kubernetes.io/name: komga
    spec:
      terminationGracePeriodSeconds: 30   # WAL checkpoint flush on shutdown
      containers:
        - name: komga
          # gotson/komga. CONFIRM the current stable tag + SWAP TO @sha256 digest at cutover (AR29):
          #   docker buildx imagetools inspect gotson/komga:1.21.0
          image: gotson/komga:1.21.0
          ports:
            - containerPort: 25600
          env:
            - name: TZ
              value: Asia/Seoul
            - name: SERVER_PORT
              value: "25600"      # Spring Boot honors SERVER_PORT; matches the LXC :25600 and the Service
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi         # memory-only limit (no CPU limit -> no throttle); JVM + thumbnail render
          # komga serves its SPA (login) at / -> 200/302. startupProbe holds liveness back through the
          # JVM boot + SQLite WAL replay (up to 40*5s); without it the default liveness window crash-loops.
          startupProbe:
            httpGet:
              path: /
              port: 25600
            failureThreshold: 40
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 25600
          livenessProbe:
            httpGet:
              path: /
              port: 25600
          volumeMounts:
            - name: config
              mountPath: /config        # database.sqlite + tasks.sqlite (Longhorn)
            - name: manga
              mountPath: /data          # the 90G node-local library — READ-ONLY (komga only reads)
              readOnly: true
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: komga-config
        - name: manga
          persistentVolumeClaim:
            claimName: komga-manga-local
