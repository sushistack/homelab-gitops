# Least-privilege RBAC for suwayomi-backup scale-to-0 actor (H2/file-class, mirrors anytype pattern).
# In komga namespace because suwayomi shares it with komga.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: suwayomi-backup
  namespace: komga
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: suwayomi-backup
  namespace: komga
rules:
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: suwayomi-backup
  namespace: komga
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: suwayomi-backup
subjects:
  - kind: ServiceAccount
    name: suwayomi-backup
    namespace: komga
