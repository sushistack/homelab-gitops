# Story 5.6 — per-host production TLS (the Epic 4 pattern). cert-manager issues a browser-trusted
# cert per host from letsencrypt-prod (DNS-01) into a per-app Secret served by the IngressRoute.
# DNS-01 needs no public reachability, so suwayomi (internal-only) gets a real cert too.
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: komga-tls
spec:
  secretName: komga-tls
  dnsNames:
    - "${SECRET:DOMAIN_KOMGA}"
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: suwayomi-tls
spec:
  secretName: suwayomi-tls
  dnsNames:
    - "${SECRET:DOMAIN_SUWAYOMI}"
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
