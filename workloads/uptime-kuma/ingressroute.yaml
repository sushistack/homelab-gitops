# Story 5.8 (AC6a) — public route for uptime-kuma: web -> websecure, TLS from uptime-kuma-tls;
# plain HTTP 301-redirects to HTTPS. Same shape as the ntfy/draw routes. Host tokenized
# (${SECRET:DOMAIN_KUMA}); the render CMP substitutes at ArgoCD sync time.
# traefik.io/v1alpha1 (v3) — the old traefik.containo.us API silently fails.
#
# CUTOVER (live, no file): the cloudflared route for this host re-points NPM -> https://<node>:443
# (originServerName=${SECRET:DOMAIN_KUMA}). See docs/runbooks/legacy-teardown.md (kuma is migrated
# in-cluster, so it flips like a 4.x stateful cutover, NOT like the 5 EndpointSlice-fronted externals).
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: uptime-kuma-redirect-https
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
# HTTPS (websecure :443) — serves uptime-kuma with the cert-manager cert.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: uptime-kuma
  annotations:
    # Stage 3: behind CF Access (email-OTP). Public record so Access can gate it.
    external-dns.alpha.kubernetes.io/target: 761ca633-e9d6-4af8-8508-727bba00f0a9.cfargotunnel.com
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`${SECRET:DOMAIN_KUMA}`)
      kind: Rule
      services:
        - name: uptime-kuma
          port: 3001
  tls:
    secretName: uptime-kuma-tls
---
# HTTP (web :80) — 301 to HTTPS via the redirect middleware.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: uptime-kuma-redirect
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`${SECRET:DOMAIN_KUMA}`)
      kind: Rule
      middlewares:
        - name: uptime-kuma-redirect-https
      services:
        - name: uptime-kuma   # required by the IngressRoute schema; middleware redirects before it's hit
          port: 3001
