# Story 5.8 (AC6a) — per-host production TLS for uptime-kuma. cert-manager issues a browser-trusted
# cert for ${SECRET:DOMAIN_KUMA} from letsencrypt-prod (DNS-01, Story 2.4) into `uptime-kuma-tls` in
# THIS namespace, which the websecure IngressRoute serves. Per-host (not the shared wildcard) — same
# rationale as ntfy: an IngressRoute resolves tls.secretName in its own namespace (Epic 4 pattern).
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: uptime-kuma-tls
spec:
  secretName: uptime-kuma-tls
  dnsNames:
    - "${SECRET:DOMAIN_KUMA}"
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
