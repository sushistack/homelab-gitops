# Story 5.8 (AC6a) — ONE-SHOT ingest Job (legacy-teardown.md "kuma data migrate"). THROWAWAY:
# NOT in workloads/uptime-kuma/kustomization.yaml, so ArgoCD never manages it (let it, and it fights
# you on the next sync). Apply by hand during the cutover, then delete.
#
# Parks a pod holding the uptime-kuma-data PVC open so the operator can copy the quiesced kuma.db
# (taken from the live Compose volume on .20 — STOP the kuma container first so the DB is
# consistent, per memory cutover_data_consistency) into it, then byte-verify:
#
#   kubectl apply -f workloads/uptime-kuma/_cutover/ingest-job.yaml
#   pod=$(kubectl -n uptime-kuma get pod -l job-name=uptime-kuma-ingest -o name | head -1)
#   kubectl -n uptime-kuma cp ./kuma.db "${pod#pod/}:/data/kuma.db"
#   kubectl -n uptime-kuma exec "${pod#pod/}" -- sh -c 'sha256sum /data/kuma.db; sqlite3 /data/kuma.db "select count(*) from monitor;"'
#   # compare the sha256 against the source kuma.db on .20 BEFORE deleting the job
#   kubectl -n uptime-kuma delete -f workloads/uptime-kuma/_cutover/ingest-job.yaml
#
# RWO: run ingest BEFORE the Deployment exists (or scale it to 0) — the Job and the app pod must not
# hold the volume on different nodes at once.
apiVersion: batch/v1
kind: Job
metadata:
  name: uptime-kuma-ingest
  namespace: uptime-kuma
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: ingest
          image: alpine:3.20
          command: ["/bin/sh", "-c", "echo 'ready for kubectl cp into /data; sleeping'; sleep 3600"]
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: uptime-kuma-data
