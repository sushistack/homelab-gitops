apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - pvc.yaml
  - sealedsecret.yaml      # uptime-kuma-backup-r2 (resealed live) — Secret exists before the backup CronJob
  - service.yaml
  - ingressroute.yaml      # web->websecure (TLS serve + HTTP->HTTPS redirect); host tokenized
  - certificate.yaml       # per-host cert-manager Certificate -> uptime-kuma-tls (letsencrypt-prod)
  # Enabled after the PVC was pre-populated with the migrated kuma.db (byte-verified) — the 4.8
  # pre-populate-before-app-create pattern dodged the empty-DB/selfHeal race.
  - deployment.yaml
  - backup-cronjob.yaml    # the reusable backup actor (copied from ntfy); co-locates on the app node
# NOT included on purpose:
#   _cutover/          -> one-shot ingest Job, applied by hand during the cutover (must NOT be ArgoCD-managed)

labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/name: uptime-kuma
      app.kubernetes.io/instance: uptime-kuma
      app.kubernetes.io/part-of: uptime-kuma
      app.kubernetes.io/managed-by: argocd
      app.kubernetes.io/component: app
