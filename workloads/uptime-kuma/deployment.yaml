# Story 5.8 (AC6a) — uptime-kuma on k3s (was binwiederhier-style Compose on .20 behind NPM).
# SQLite on an RWO volume: strategy MUST be Recreate (two pods sharing one WAL is the named
# anti-pattern) and terminationGracePeriodSeconds 30 gives the WAL checkpoint time to flush on
# shutdown. Same DB-class shape as ntfy/navidrome (AR14; architecture.md 717).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: uptime-kuma
spec:
  replicas: 1
  # Recreate => a stuck rollout is a full outage (no fallback pod). 120s (vs 600s default) makes
  # ArgoCD surface the Application Degraded fast so the operator can `git revert`.
  progressDeadlineSeconds: 120
  strategy:
    type: Recreate
  # Hand-written selector (kept out of kustomize labels) so it stays immutable across re-applies.
  selector:
    matchLabels:
      app.kubernetes.io/name: uptime-kuma
  template:
    metadata:
      labels:
        app.kubernetes.io/name: uptime-kuma
    spec:
      terminationGracePeriodSeconds: 30   # WAL checkpoint flush on shutdown
      containers:
        - name: uptime-kuma
          # louislam/uptime-kuma is :1 / :latest upstream (AR29 forbids floating refs). Pinned to the
          # EXACT digest the live Compose host runs (was :latest = 1.23.17), so the migrated kuma.db
          # is read by the same schema (avoids the komga 1.21-vs-1.24 trap from 5.6). Re-confirm via
          #   docker buildx imagetools inspect louislam/uptime-kuma:1.23.17
          image: louislam/uptime-kuma@sha256:3d632903e6af34139a37f18055c4f1bfd9b7205ae1138f1e5e8940ddc1d176f9
          ports:
            - containerPort: 3001
          env:
            - name: TZ
              value: Asia/Seoul
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 512Mi   # memory limit only — NO cpu limit (no CFS throttle). Node.js + SQLite.
          # uptime-kuma exposes no documented /health path (its Docker healthcheck shells a node
          # script). A TCP probe on 3001 is the lazy-correct readiness signal (same call 5.7's beszel
          # agent made). startupProbe holds liveness off until the SQLite open + any WAL replay
          # finishes (up to 30*5s = 150s) — the DB-class boot trap the golden path warns about.
          # ponytail: tcpSocket, not an app-specific health endpoint that doesn't exist.
          startupProbe:
            tcpSocket:
              port: 3001
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            tcpSocket:
              port: 3001
          livenessProbe:
            tcpSocket:
              port: 3001
          volumeMounts:
            - name: data
              mountPath: /app/data   # kuma.db (+ -wal/-shm) and uploads
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: uptime-kuma-data
