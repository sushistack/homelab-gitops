# Story 4.4 — FILE-CLASS scale-to-0 backup actors (one per component). This is the BadgerDB port of
# the Compose offen sidecar's `stop-during-backup` (docker-compose.yml:133-136,159-162) — NOT the
# online `sqlite3 .backup` path (ntfy/navidrome): BadgerDB/leveldb has no online-consistent dump, so
# the writer must be STOPPED before the copy or the KV store is torn. (AC3 / Reconciliation 2)
#
# HOW SCALE-TO-0 WORKS WITH RWO (the crux): RWO = ReadWriteOnce-per-NODE (not per-pod). So the backup
# pod co-schedules onto the app pod's node (podAffinity) and shares the same RWO volume — THEN scales
# the app Deployment to 0. BadgerDB flushes/closes on SIGTERM (grace 30s); once the app pod is gone
# the volume is quiesced (only this read-only backup pod holds it), so the tar is consistent. A trap
# on EXIT+INT+TERM scales the app back to 1 on success, error, eviction, AND the SIGTERM k8s sends
# when activeDeadlineSeconds is hit — a backup must never leave the service down. (Trapping TERM/INT
# matters BECAUSE argocd/apps/anytype.yaml ignores /spec/replicas: selfHeal will NOT rescue a
# stuck-at-0 app, so the trap is the only scale-back. The sole residual is the final SIGKILL after
# the grace window — Story 4.2 backup-failure alerting catches that.) // ponytail: brief re-attach
# wait when the app pod reschedules after scale-up — fine for a ≤6h cron; don't build a watchdog.
#
# Needs a Role granting deployments/scale patch + pods get/watch (rbac.yaml) bound to the
# anytype-backup SA — file-class services that scale-to-0 need this; SQLite services (online dump)
# do NOT. R2 cred = the per-ns anytype-backup-r2 SealedSecret (sealedsecret.yaml).
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: anytype-backup
spec:
  schedule: "30 */6 * * *"          # ≤6h (NFR5); offset from heart's :40 so they don't scale-flap together
  timeZone: Asia/Seoul
  # PARKED until cutover. Pre-ingest, a tick would (a) tar an EMPTY /data and (b) the EXIT trap would
  # scale the app to replicas=1 on that empty PVC → anysync mints a NEW identity (the orphan-clients
  # disaster). Backing up a parked, dataless service is pointless anyway. Operator flips to false (or
  # removes this line) AFTER ingest + identity-verify, when the Deployments are at replicas=1.
  suspend: true
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 900     # ~15 min ceiling: scale-down + tar + rclone; trap still scales back up
      template:
        metadata:
          labels:
            app.kubernetes.io/name: anytype-backup    # NOT `anytype` — would join the Service as a dead endpoint
            app.kubernetes.io/component: backup
        spec:
          restartPolicy: OnFailure
          serviceAccountName: anytype-backup
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: anytype   # land on the node holding the RWO volume
                  topologyKey: kubernetes.io/hostname
          containers:
            - name: backup
              # rclone + kubectl + tar in alpine. // ponytail: runtime `apk add` floats versions and
              # needs CDN egress — fine under today's allow-all; bake a pinned image when the
              # network-baseline default-deny lands (upgrade path). PIN by digest at cutover.
              image: alpine:3.20
              command:
                - /bin/sh
                - -ceu
                - |
                  apk add --no-cache rclone kubectl ca-certificates tzdata
                  # ALWAYS bring the app back: on success/error (EXIT) and on the SIGTERM k8s sends
                  # at activeDeadline/eviction (INT TERM) — only a hard post-grace SIGKILL slips past.
                  trap 'kubectl scale deploy/anytype -n anytype --replicas=1 || true' EXIT INT TERM
                  ts=$(date +%Y-%m-%dT%H-%M-%S)
                  # quiesce: stop the writer so BadgerDB flushes+closes, then wait for the pod to go
                  kubectl scale deploy/anytype -n anytype --replicas=0
                  kubectl wait --for=delete pod -l app.kubernetes.io/name=anytype -n anytype --timeout=120s || true
                  tar -C /data -czf "/scratch/anytype-${ts}.tar.gz" .
                  rclone copy "/scratch/anytype-${ts}.tar.gz" "r2:homelab-k3s-services-backup/anytype/"
                  rclone delete --min-age 720h "r2:homelab-k3s-services-backup/anytype/" || true
              env:
                - name: RCLONE_CONFIG_R2_NO_CHECK_BUCKET   # bucket-scoped token can't probe/create the bucket → 403
                  value: "true"
              envFrom:
                - secretRef:
                    name: anytype-backup-r2
              volumeMounts:
                - name: data
                  mountPath: /data
                  readOnly: true   # backup only reads; the app (now scaled to 0) was the only writer
                - name: scratch
                  mountPath: /scratch
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: anytype-data
            - name: scratch
              emptyDir: {}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: anytype-heart-backup
spec:
  schedule: "40 */6 * * *"
  timeZone: Asia/Seoul
  # PARKED until cutover. Pre-ingest, a tick would (a) tar an EMPTY /data and (b) the EXIT trap would
  # scale the app to replicas=1 on that empty PVC → anysync mints a NEW identity (the orphan-clients
  # disaster). Backing up a parked, dataless service is pointless anyway. Operator flips to false (or
  # removes this line) AFTER ingest + identity-verify, when the Deployments are at replicas=1.
  suspend: true
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 900
      template:
        metadata:
          labels:
            app.kubernetes.io/name: anytype-heart-backup
            app.kubernetes.io/component: backup
        spec:
          restartPolicy: OnFailure
          serviceAccountName: anytype-backup
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: anytype-heart
                  topologyKey: kubernetes.io/hostname
          containers:
            - name: backup
              image: alpine:3.20
              command:
                - /bin/sh
                - -ceu
                - |
                  apk add --no-cache rclone kubectl ca-certificates tzdata
                  trap 'kubectl scale deploy/anytype-heart -n anytype --replicas=1 || true' EXIT INT TERM
                  ts=$(date +%Y-%m-%dT%H-%M-%S)
                  kubectl scale deploy/anytype-heart -n anytype --replicas=0
                  kubectl wait --for=delete pod -l app.kubernetes.io/name=anytype-heart -n anytype --timeout=120s || true
                  tar -C /data -czf "/scratch/anytype-heart-${ts}.tar.gz" .
                  rclone copy "/scratch/anytype-heart-${ts}.tar.gz" "r2:homelab-k3s-services-backup/anytype-heart/"
                  rclone delete --min-age 720h "r2:homelab-k3s-services-backup/anytype-heart/" || true
              env:
                - name: RCLONE_CONFIG_R2_NO_CHECK_BUCKET
                  value: "true"
              envFrom:
                - secretRef:
                    name: anytype-backup-r2
              volumeMounts:
                - name: data
                  mountPath: /data
                  readOnly: true
                - name: scratch
                  mountPath: /scratch
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: anytype-heart-data
            - name: scratch
              emptyDir: {}
