# Story 4.4 — SealedSecrets (THREE), all REALLY SEALED 2026-06-18 against this cluster's key:
#   anytype-secrets   : heart wallet (ANYTYPE_MNEMONIC + ANYTYPE_ACCOUNT_ID)
#   anytype-backup-r2 : backup CronJobs' R2 cred (reused from the live ntfy-backup-r2 Secret)
#   ghcr-sushistack   : GHCR pull cred for the PRIVATE anytype-heart image (dockerconfigjson)
# Safe to commit — the controller decrypts each in-cluster to a Secret of the matching name+ns.
#
# RE-SEAL (rotation) — controller is in ns `sealed-secrets` (NOT kube-system):
#   kubectl create secret generic anytype-secrets -n anytype --dry-run=client -o yaml \
#     --from-literal=ANYTYPE_MNEMONIC='<phrase>' --from-literal=ANYTYPE_ACCOUNT_ID='<id>' \
#     | kubeseal --format yaml --controller-name sealed-secrets --controller-namespace sealed-secrets
#   kubectl create secret docker-registry ghcr-sushistack -n anytype --dry-run=client -o yaml \
#     --docker-server=ghcr.io --docker-username='<gh user>' --docker-password='<PAT read:packages>' \
#     | kubeseal --format yaml --controller-name sealed-secrets --controller-namespace sealed-secrets
#   # anytype-backup-r2: re-seal from the live ntfy-backup-r2 Secret:
#   kubectl get secret ntfy-backup-r2 -n ntfy -o json \
#     | jq '{apiVersion:"v1",kind:"Secret",type,data,metadata:{name:"anytype-backup-r2",namespace:"anytype"}}' \
#     | kubeseal --format yaml --controller-name sealed-secrets --controller-namespace sealed-secrets
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: anytype-secrets
  namespace: anytype
spec:
  encryptedData:
    ANYTYPE_ACCOUNT_ID: 
    ANYTYPE_MNEMONIC: 
  template:
    metadata:
      name: anytype-secrets
      namespace: anytype
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: anytype-backup-r2
  namespace: anytype
spec:
  encryptedData:
    RCLONE_CONFIG_R2_ACCESS_KEY_ID: 
    RCLONE_CONFIG_R2_ENDPOINT: 
    RCLONE_CONFIG_R2_PROVIDER: 
    RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: 
    RCLONE_CONFIG_R2_TYPE: 
  template:
    metadata:
      name: anytype-backup-r2
      namespace: anytype
    type: Opaque
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: ghcr-sushistack
  namespace: anytype
spec:
  encryptedData:
    .dockerconfigjson: 
  template:
    metadata:
      name: ghcr-sushistack
      namespace: anytype
    type: kubernetes.io/dockerconfigjson
