# Story 4.4 — SealedSecrets (THREE), all REALLY SEALED against this cluster's key:
#   anytype-secrets   : heart wallet (ANYTYPE_MNEMONIC + ACCOUNT_ID) — sourced from the LIVE Compose
#                       anytype-heart container env (NOT a hand-typed value; avoids quote/format slips).
#   anytype-backup-r2 : backup CronJobs' R2 cred (reused from the live ntfy-backup-r2 Secret)
#   ghcr-sushistack   : GHCR pull cred for the PRIVATE anytype-heart image (dockerconfigjson)
# Re-seal: kubeseal --controller-name sealed-secrets --controller-namespace sealed-secrets (NOT kube-system).
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: anytype-secrets
  namespace: anytype
spec:
  encryptedData:
    ANYTYPE_ACCOUNT_ID: 
    ANYTYPE_MNEMONIC: 
  template:
    metadata:
      name: anytype-secrets
      namespace: anytype
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: anytype-backup-r2
  namespace: anytype
spec:
  encryptedData:
    RCLONE_CONFIG_R2_ACCESS_KEY_ID: 
    RCLONE_CONFIG_R2_ENDPOINT: 
    RCLONE_CONFIG_R2_PROVIDER: 
    RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: 
    RCLONE_CONFIG_R2_TYPE: 
  template:
    metadata:
      name: anytype-backup-r2
      namespace: anytype
    type: Opaque
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: ghcr-sushistack
  namespace: anytype
spec:
  encryptedData:
    .dockerconfigjson: 
  template:
    metadata:
      name: ghcr-sushistack
      namespace: anytype
    type: kubernetes.io/dockerconfigjson
