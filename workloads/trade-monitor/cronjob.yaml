# Story 5.6 — trade-monitor as a k8s CronJob (AC1). Stateless batch: every minute it fetches Binance
# OHLCV (BTC/ETH/XRP/SOL/DOGE) + Yahoo ^GSPC → renders 240×240 JPEGs → multipart-POSTs them to the
# LAN display devices (10.0.0.201–206) AND pushes a ^IXIC ticker to the AWTRIX ulanzi (10.0.0.200).
# NO PVC, NO Service, NO ingress, NO SealedSecret — outbound-only (Binance/Yahoo/LaMetric over the
# internet + the LAN devices). Replaces the LXC #205 `python-crontab` cron.
#
# 🔴 Reconciliation 2 — every-minute churn: a fresh pod spins each cycle on a heavy matplotlib/pandas
# image. Bounded by activeDeadlineSeconds 55 (mirrors the LXC `timeout 55`) + concurrencyPolicy
# Forbid (a slow run is skipped, never overlapped) + failedJobsHistoryLimit 3 (a blown budget is
# VISIBLE as Failed jobs, not silent). If cold-start regularly fails the 55s budget, the documented
# fallback is one warm Deployment with an internal sleep-60 loop (record the deviation) — ship the
# CronJob first.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: trade-monitor
spec:
  schedule: "* * * * *"
  timeZone: Asia/Seoul
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 120
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 55   # mirrors the LXC `timeout 55` — kill an over-budget run (-> Failed, visible)
      backoffLimit: 1             # a failed cycle retries once, not the default 6 (next minute tries fresh anyway)
      template:
        metadata:
          labels:
            app.kubernetes.io/name: trade-monitor
        spec:
          restartPolicy: OnFailure
          # PUBLIC ghcr.io/sushistack/trade.monitor -> no imagePullSecret (mark the GHCR package
          # public after the first CI build). If it is kept private instead, seal `ghcr-sushistack`
          # into this namespace and add imagePullSecrets here (Reconciliation 3).
          containers:
            - name: trade-monitor
              # Built from the trade.monitor repo CI (.github/workflows/build.yml). Tag `0.1.0` until
              # the first build; SWAP TO @sha256 digest at hardening (AR29 — the CI job summary prints
              # it). Bump via PR (versions.yaml mirror + this line in the same PR — bin/version-lint).
              image: ghcr.io/sushistack/trade.monitor:0.1.0
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  memory: 512Mi   # memory-only limit (no CPU limit -> no CFS throttle); matplotlib/pandas spike
              volumeMounts:
                - name: config
                  mountPath: /config
                  readOnly: true
          volumes:
            - name: config
              configMap:
                name: trade-monitor-config
