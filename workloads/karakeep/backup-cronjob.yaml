# Story 4.5 — backup actors (AC1, Reconciliation 2). Replaces the Compose offen sidecar
# (docker-compose.yml:580-611), which CANNOT port to k8s (a sidecar can't stop a peer pod) AND which
# quiesced karakeep-web on every run. The house pattern (ntfy 4.1 / navidrome 4.3, operator-confirmed)
# is an ONLINE `sqlite3 .backup` — lock-safe, NO scale-down, source stays live.
#
# TWO CronJobs, because the two SQLite files live on TWO separate RWO PVCs that Longhorn may attach
# to DIFFERENT nodes — one pod can't mount both:
#   karakeep-backup-web    : db.db (bookmarks + read-state) -> R2.  queue.db is regenerable job state;
#                            assets/ are large regenerable crawl snapshots -> Longhorn replication,
#                            NOT shipped every 6h (same call as navidrome's music). DB-class only.
#   karakeep-backup-bridge : bridge.sqlite (the DEDUP map). Reconciliation 2 — losing it re-emits
#                            DUPLICATE Anytype objects, so it IS dumped (app-consistent, cheap).
# meili is NOT dumped (rebuildable derived state, Reconciliation 5 / AR16).
#
# RWO multi-mount trap: each Job co-schedules onto its source pod's node via podAffinity and mounts
# the PVC read-write (online .backup needs the -wal/-shm files), writing to an emptyDir /scratch —
# NEVER back onto the source volume.
#
# Backup-FAILURE alerting (4-2): the ntfy poller (ops-alerts, */15) watches the cluster for Failed
# Jobs. activeDeadlineSeconds turns a hung run into a visible Failed Job (NOT a silent Forbid-suppressed
# no-op), so a stuck/erroring backup surfaces as an ntfy alert with no per-CronJob wiring here. (NFR5/NFR15a)
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: karakeep-backup-web
spec:
  schedule: "20 */6 * * *"        # the freed Compose offen slot (KARAKEEP_BACKUP_CRON default); ≤6h
  timeZone: Asia/Seoul
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 900       # ~15 min ceiling: apk + sqlite .backup + rclone copy -> Failed if hung
      backoffLimit: 2                  # fail fast for the ntfy Failed-Job watch (don't retry the default 6×)
      template:
        metadata:
          # NOT app.kubernetes.io/name: karakeep-web — that is the web Service selector, and this pod
          # has no listener; sharing it would add a dead endpoint to the Service every run. The
          # NetworkPolicy backup-egress + podAffinity target these labels.
          labels:
            app.kubernetes.io/name: karakeep-backup
            app.kubernetes.io/component: backup
        spec:
          restartPolicy: OnFailure
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: karakeep-web
                  topologyKey: kubernetes.io/hostname   # land on the node holding the RWO data volume
          containers:
            - name: backup
              # sqlite3 + rclone in one small image. // ponytail: runtime `apk add` floats the tool
              # versions + needs egress to the alpine CDN — fine under today's allow-all + the
              # backup-egress policy; bake a pinned sqlite+rclone image (and pin alpine by digest) when
              # the network-baseline default-deny sweep lands (upgrade path).
              image: alpine:3.20
              command:
                - /bin/sh
                - -ceu
                - |
                  apk add --no-cache sqlite rclone ca-certificates tzdata
                  ts=$(date +%Y-%m-%dT%H-%M-%S)
                  # online, lock-safe — source stays live (no scale-down). DB-class ONLY: assets/ and
                  # queue.db are deliberately excluded (regenerable). Karakeep's bookmark DB is db.db
                  # in DATA_DIR (verified on the live container, /data/db.db).
                  sqlite3 /data/db.db ".backup /scratch/db.db"
                  tar -C /scratch -czf "/scratch/karakeep-${ts}.tar.gz" db.db
                  rclone copy "/scratch/karakeep-${ts}.tar.gz" "r2:homelab-k3s-services-backup/karakeep/"
                  # ~30-day retention (offen semantics). The karakeep/ prefix holds BOTH web
                  # (karakeep-<ts>) and bridge (karakeep-bridge-<ts>) archives, so scope this prune to
                  # the web ones — an unfiltered delete would also drop the bridge dedup-map backups.
                  rclone delete --min-age 720h --include "karakeep-2*" "r2:homelab-k3s-services-backup/karakeep/" || true
              env:
                # bucket-scoped token (Object R&W) can't ListBuckets/CreateBucket -> rclone's default
                # bucket probe 403s; no_check_bucket skips it and PUTs straight to the existing bucket.
                - name: RCLONE_CONFIG_R2_NO_CHECK_BUCKET
                  value: "true"
              envFrom:
                - secretRef:
                    name: karakeep-backup-r2   # per-ns SealedSecret: R2 creds + rclone remote
              volumeMounts:
                - name: data
                  mountPath: /data          # RW: online .backup needs -wal/-shm
                - name: scratch
                  mountPath: /scratch
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: karakeep-data
            - name: scratch
              emptyDir: {}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: karakeep-backup-bridge
spec:
  schedule: "35 */6 * * *"        # offset from the web job so two RWO backups don't contend; ≤6h
  timeZone: Asia/Seoul
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 900
      backoffLimit: 2                  # fail fast for the ntfy Failed-Job watch (don't retry the default 6×)
      template:
        metadata:
          labels:
            app.kubernetes.io/name: karakeep-backup
            app.kubernetes.io/component: backup
        spec:
          restartPolicy: OnFailure
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: karakeep-anytype-bridge
                  topologyKey: kubernetes.io/hostname   # land on the node holding bridge-data
          containers:
            - name: backup
              image: alpine:3.20
              command:
                - /bin/sh
                - -ceu
                - |
                  apk add --no-cache sqlite rclone ca-certificates tzdata
                  ts=$(date +%Y-%m-%dT%H-%M-%S)
                  # the DEDUP map (Reconciliation 2). DB_PATH on the live bridge is /data/bridge.sqlite.
                  sqlite3 /data/bridge.sqlite ".backup /scratch/bridge.sqlite"
                  tar -C /scratch -czf "/scratch/karakeep-bridge-${ts}.tar.gz" bridge.sqlite
                  rclone copy "/scratch/karakeep-bridge-${ts}.tar.gz" "r2:homelab-k3s-services-backup/karakeep/"
                  rclone delete --min-age 720h --include "karakeep-bridge-*" "r2:homelab-k3s-services-backup/karakeep/" || true
              env:
                - name: RCLONE_CONFIG_R2_NO_CHECK_BUCKET
                  value: "true"
              envFrom:
                - secretRef:
                    name: karakeep-backup-r2
              volumeMounts:
                - name: data
                  mountPath: /data
                - name: scratch
                  mountPath: /scratch
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: karakeep-bridge-data
            - name: scratch
              emptyDir: {}
