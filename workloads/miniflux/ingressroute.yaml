# Story 4.6 — public route for miniflux APP ONLY (never the DB): web -> websecure, TLS from the
# miniflux-tls Secret (certificate.yaml); plain HTTP 301-redirects to HTTPS. Same shape as ntfy (4.1).
# Host is tokenized (${SECRET:DOMAIN_RSS}); the render CMP substitutes at ArgoCD sync time.
# traefik.io/v1alpha1 (v3) — the old traefik.containo.us API silently fails.
#
# CUTOVER switch (live, no file): the cloudflared tunnel origin for ${SECRET:DOMAIN_RSS} points at
# https://<node>:443 (originServerName=${SECRET:DOMAIN_RSS}, LE-prod origin cert). The cutover is
# flipping that route NPM -> Traefik (stateful-cutover.md Step 6); flipping back is the rollback.
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: miniflux-redirect-https
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
# HTTPS (websecure :443) — serves miniflux with the cert-manager cert.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: miniflux
  annotations:
    # public (whitelist): external-dns publishes this host to CF DNS
    external-dns.alpha.kubernetes.io/target: 761ca633-e9d6-4af8-8508-727bba00f0a9.cfargotunnel.com
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`${SECRET:DOMAIN_RSS}`)
      kind: Rule
      services:
        - name: miniflux
          port: 8080
  tls:
    secretName: miniflux-tls
---
# HTTP (web :80) — 301 to HTTPS via the redirect middleware.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: miniflux-redirect
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`${SECRET:DOMAIN_RSS}`)
      kind: Rule
      middlewares:
        - name: miniflux-redirect-https
      services:
        - name: miniflux   # required by the IngressRoute schema; middleware redirects before it is hit
          port: 8080
