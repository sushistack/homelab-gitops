# PLACEHOLDER — operator must seal before applying.
# Run seal-secrets.sh after it is updated (see the semaphore-backup-r2 section added below the
# existing seals). Reuses the same bucket-scoped R2 token as all other service backups
# (internal/r2-k3s.env). Sealed to name+ns (semaphore-backup-r2/semaphore).
#
# Quick reseal (from workstation with kubeconfig + kubeseal):
#   set -a; . internal/r2-k3s.env; set +a
#   kubectl create secret generic semaphore-backup-r2 -n semaphore \
#     --from-literal=RCLONE_CONFIG_R2_TYPE=s3 --from-literal=RCLONE_CONFIG_R2_PROVIDER=Cloudflare \
#     --from-literal=RCLONE_CONFIG_R2_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID" \
#     --from-literal=RCLONE_CONFIG_R2_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY" \
#     --from-literal=RCLONE_CONFIG_R2_ENDPOINT="$R2_ENDPOINT" \
#     --dry-run=client -o yaml | \
#     kubeseal --controller-name sealed-secrets --controller-namespace sealed-secrets --format yaml \
#     > workloads/semaphore/sealedsecret-backup-r2.yaml
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: semaphore-backup-r2
  namespace: semaphore
spec:
  encryptedData:
    RCLONE_CONFIG_R2_ACCESS_KEY_ID: PLACEHOLDER
    RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: PLACEHOLDER
    RCLONE_CONFIG_R2_ENDPOINT: PLACEHOLDER
    RCLONE_CONFIG_R2_TYPE: PLACEHOLDER
    RCLONE_CONFIG_R2_PROVIDER: PLACEHOLDER
  template:
    metadata:
      name: semaphore-backup-r2
      namespace: semaphore
