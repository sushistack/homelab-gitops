# Story 5.7 — STUB. Semaphore admin bootstrap creds + the access-key encryption key. Consumed via
# envFrom in the Deployment. SEMAPHORE_ACCESS_KEY_ENCRYPTION (base64 of 32 random bytes) MUST stay
# stable across restarts — it encrypts the access keys stored in BoltDB; rotating it orphans them.
# Sealed LIVE by the operator (ns sealed-secrets), Task 1b; kept OUT of kustomization.yaml resources:
# until then (the pod is Pending without it).
#
# Regenerate (operator):
#   kubectl create secret generic semaphore-admin -n semaphore \
#     --from-literal=SEMAPHORE_ADMIN=admin \
#     --from-literal=SEMAPHORE_ADMIN_NAME=admin \
#     --from-literal=SEMAPHORE_ADMIN_EMAIL=admin@eli.kr \
#     --from-literal=SEMAPHORE_ADMIN_PASSWORD='<choose>' \
#     --from-literal=SEMAPHORE_ACCESS_KEY_ENCRYPTION="$(head -c32 /dev/urandom | base64)" \
#     --dry-run=client -o yaml | kubeseal --controller-namespace sealed-secrets --format yaml
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: semaphore-admin
  namespace: semaphore
spec:
  encryptedData:
    SEMAPHORE_ADMIN: PLACEHOLDER_SEAL_ME
    SEMAPHORE_ADMIN_NAME: PLACEHOLDER_SEAL_ME
    SEMAPHORE_ADMIN_EMAIL: PLACEHOLDER_SEAL_ME
    SEMAPHORE_ADMIN_PASSWORD: PLACEHOLDER_SEAL_ME
    SEMAPHORE_ACCESS_KEY_ENCRYPTION: PLACEHOLDER_SEAL_ME
  template:
    metadata:
      name: semaphore-admin
      namespace: semaphore
