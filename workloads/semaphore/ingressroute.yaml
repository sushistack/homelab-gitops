# Story 5.7 — Semaphore is INTERNAL-only (operator tooling, not public). Internal-only =
# NO cloudflared tunnel rule + a LAN-only OpenWrt DNS override → 10.0.0.101 (staged in the runbook).
# Externally NXDOMAIN; the *.eli.kr wildcard now points at Traefik (NPM retired in 5.8), which
# default-denies unknown hosts → 404. NO
# ipAllowList middleware: cloudflared egresses from a LAN IP, so an allowlist would ADMIT
# internet-via-tunnel traffic — "no tunnel rule + LAN-only DNS" is the only correct internal gate
# (the suwayomi/5.6 rationale). traefik.io/v1alpha1 (v3) — the old containo.us API silently fails.
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: semaphore-redirect-https
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: semaphore
  annotations:
    # Stage 3: behind CF Access (email-OTP). Public record so Access can gate it.
    external-dns.alpha.kubernetes.io/target: 761ca633-e9d6-4af8-8508-727bba00f0a9.cfargotunnel.com
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`${SECRET:DOMAIN_SEMAPHORE}`)
      kind: Rule
      services:
        - name: semaphore
          port: 3000
  tls:
    secretName: semaphore-tls
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: semaphore-redirect
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`${SECRET:DOMAIN_SEMAPHORE}`)
      kind: Rule
      middlewares:
        - name: semaphore-redirect-https
      services:
        - name: semaphore
          port: 3000
