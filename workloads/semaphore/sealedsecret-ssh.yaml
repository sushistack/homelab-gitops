# Story 5.7 — STUB. SSH private key Semaphore uses to reach root@10.0.0.1 (OpenWrt) + ubuntu@Oracle.
# 🔴 root@10.0.0.1 is a HIGH-blast-radius credential (Plane 0 gateway). Sealed LIVE by the operator
# against the live controller (ns sealed-secrets — see memory kubeseal-controller-ns), Task 1b. Until
# then this file stays OUT of kustomization.yaml resources: (the pod is Pending without it).
#
# Regenerate (operator, with the real key on disk):
#   kubectl create secret generic semaphore-ssh -n semaphore \
#     --from-file=id_ed25519=/path/to/semaphore_ansible_ed25519 \
#     --dry-run=client -o yaml | kubeseal --controller-namespace sealed-secrets --format yaml
# Then paste the encryptedData below, uncomment the resource line in kustomization.yaml, commit.
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: semaphore-ssh
  namespace: semaphore
spec:
  encryptedData:
    id_ed25519: PLACEHOLDER_SEAL_ME   # operator replaces with sealed ciphertext (Task 1b)
  template:
    metadata:
      name: semaphore-ssh
      namespace: semaphore
