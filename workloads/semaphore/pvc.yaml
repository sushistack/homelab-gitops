# Story 5.7 — Semaphore embedded SQLite + project state on Longhorn. Small (project/template/run
# history + the DB-encrypted access-key store), reading-progress-class → 3× Longhorn replication.
# RWO → strategy:Recreate (SQLite is single-writer, the Epic 4 SQLite-class pattern). Prune=false +
# Retain so ArgoCD/Longhorn never delete the run history on PVC removal.
# # ponytail: embedded SQLite, not a postgres/mysql sidecar — a single-operator runner needs no DB server.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: semaphore-data
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path-retain
  volumeName: pvc-0b82146f-0cef-4dca-9a00-3bc628f57a54
  resources:
    requests:
      storage: 2Gi
