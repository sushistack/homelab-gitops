apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Story 5.7 — Semaphore (clickable + schedulable Ansible runner for configs/openwrt/). Generated as
# ONE Application by the `workloads` ApplicationSet (HTTP golden path; not excluded).
resources:
  - namespace.yaml
  - pvc.yaml
  - deployment.yaml
  - service.yaml
  - ingressroute.yaml
  - certificate.yaml
  # Sealed LIVE 2026-06-19 (Task 1b, seal-secrets.sh against ns sealed-secrets): admin (bootstrap +
  # stable access-key encryption), ssh (openwrt + oracle keys), age (cluster DR identity for sops).
  - sealedsecret-admin.yaml
  - sealedsecret-ssh.yaml
  - sealedsecret-age.yaml

labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/name: semaphore
      app.kubernetes.io/instance: semaphore
      app.kubernetes.io/part-of: semaphore
      app.kubernetes.io/managed-by: argocd
      app.kubernetes.io/component: ansible-runner
