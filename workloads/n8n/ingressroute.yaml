# Story 4.7 — public route for n8n: web -> websecure, TLS from the n8n-tls Secret (certificate.yaml);
# plain HTTP 301-redirects to HTTPS. Same worked shape as navidrome/miniflux/draw. Host is tokenized
# (${SECRET:DOMAIN_N8N}); the render CMP substitutes at ArgoCD sync time. traefik.io/v1alpha1 (v3) —
# the old traefik.containo.us API silently fails.
#
# CUTOVER switch (live, no file): the cloudflared tunnel origin for ${SECRET:DOMAIN_N8N} currently
# points at NPM (Compose). The cutover SWITCH is re-pointing that cloudflared route NPM -> Traefik
# (https://<node>:443, originServerName=${SECRET:DOMAIN_N8N}); flipping it back to NPM is the rollback
# (Compose stays parked the whole time). See docs/runbooks/n8n.md + stateful-cutover.md Step 6.
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: n8n-redirect-https
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
# HTTPS (websecure :443) — serves n8n with the cert-manager cert.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: n8n
  annotations:
    # public (whitelist): external-dns publishes this host to CF DNS
    external-dns.alpha.kubernetes.io/target: 761ca633-e9d6-4af8-8508-727bba00f0a9.cfargotunnel.com
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`${SECRET:DOMAIN_N8N}`)
      kind: Rule
      services:
        - name: n8n
          port: 5678
  tls:
    secretName: n8n-tls
---
# HTTP (web :80) — 301 to HTTPS via the redirect middleware.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: n8n-redirect
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`${SECRET:DOMAIN_N8N}`)
      kind: Rule
      middlewares:
        - name: n8n-redirect-https
      services:
        - name: n8n   # required by the IngressRoute schema; middleware redirects before it's hit
          port: 5678
