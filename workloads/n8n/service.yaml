# Story 4.7 — n8n ClusterIP. Public exposure is via the Traefik IngressRoute (ingressroute.yaml),
# not a host port (Compose bound ${N8N_PORT:-5678} behind NPM).
apiVersion: v1
kind: Service
metadata:
  name: n8n
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: n8n
  ports:
    - name: http
      port: 5678
      targetPort: 5678
