# Story 4.7 — per-namespace R2 credential for the n8n-backup CronJob (rclone "r2" remote).
# Sealed to name+ns (n8n-backup-r2/n8n) — safe to commit; only this cluster decrypts it. Same
# bucket-scoped token (Object R&W on homelab-k3s-services-backup) reused from the other k3s service
# backups (internal/r2-k3s.env). No central backup namespace, no cross-ns RBAC (AR17). Regenerate via:
#   set -a; . internal/r2-k3s.env; set +a
#   kubectl create secret generic n8n-backup-r2 -n n8n \
#     --from-literal=RCLONE_CONFIG_R2_TYPE=s3 --from-literal=RCLONE_CONFIG_R2_PROVIDER=Cloudflare \
#     --from-literal=RCLONE_CONFIG_R2_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID" \
#     --from-literal=RCLONE_CONFIG_R2_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY" \
#     --from-literal=RCLONE_CONFIG_R2_ENDPOINT="$R2_ENDPOINT" \
#     --dry-run=client -o yaml | kubeseal --format yaml
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: n8n-backup-r2
  namespace: n8n
spec:
  encryptedData:
    RCLONE_CONFIG_R2_ACCESS_KEY_ID: 
    RCLONE_CONFIG_R2_ENDPOINT: 
    RCLONE_CONFIG_R2_PROVIDER: 
    RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: 
    RCLONE_CONFIG_R2_TYPE: 
  template:
    metadata:
      name: n8n-backup-r2
      namespace: n8n
