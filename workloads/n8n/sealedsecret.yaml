# Story 4.7 — THE DISASTER GATE (Reconciliation 1). n8n encrypts every row of credentials_entity with
# an encryption key that is NOT in any .env — it auto-generated on first boot into the live Compose
# `data/n8n/config` file ({"encryptionKey": "..."}). If the k3s pod comes up with a DIFFERENT key
# (fresh PVC / lost config / new value) every saved credential decrypts to unrecoverable garbage.
# Resolution: the live value is extracted and sealed here as N8N_ENCRYPTION_KEY (env wins over the
# file and is deterministic), consumed via `envFrom: secretRef`. Sealed to name+ns (n8n-secrets/n8n)
# so it is safe to commit — only THIS cluster's controller can decrypt it.
#
# DUAL-RUN ROTATION NOTE (AC2 / AR24 documented exception): the secret's true origin is the Compose
# `data/n8n/config` file, NOT `.env`. A future operator rotating n8n secrets must look at the config
# file, not only `.env`. While Compose is parked the SealedSecret is the verified copy; once Compose
# is retired (Epic 5) it becomes the sole source. Re-seal from the live value with (on/against the
# LIVE host ${SECRET:IP_COMPOSE} — NOT a local working copy, whose key differs):
#   KEY=$(ssh root@${SECRET:IP_COMPOSE} 'jq -r .encryptionKey /opt/docker/data/n8n/config')
#   kubectl create secret generic n8n-secrets -n n8n --from-literal=N8N_ENCRYPTION_KEY="$KEY" \
#     --dry-run=client -o yaml | kubeseal --format yaml
#
# ALSO sealed here: the bounded set of workflow `$env.*` vars the live Compose n8n actually had set
# AND that workflow nodes reference (N8N_BLOCK_ENV_ACCESS_IN_NODE=false, so workflows read process
# env). Captured from the live container at cutover so active automation keeps working — ANYTYPE_BEARER
# + ANYTYPE_TASKS_SPACE_ID (the 2 ACTIVE workflows), plus LLM_*/ND_LASTFM_APIKEY/NAVIDROME_LASTFM_
# USERNAME/N8N_CRON_SCHEDULE (other set-but-inactive workflows). Referenced-but-UNSET vars on live
# (PULSE_*/SIYUAN_*/ROCKETCHAT_*) are deliberately NOT added — already dormant on Compose, not a
# cutover regression. Sealed (not ConfigMap) to skip per-var secret/config sorting; sealed never leaks.
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: n8n-secrets
  namespace: n8n
spec:
  encryptedData:
    ANYTYPE_BEARER: 
    ANYTYPE_TASKS_SPACE_ID: 
    LLM_API_KEY: 
    LLM_API_URL: 
    LLM_CONDITION_PROMPT: 
    LLM_MODEL: 
    LLM_SUMMARY_PROMPT: 
    N8N_CRON_SCHEDULE: 
    N8N_ENCRYPTION_KEY: 
    NAVIDROME_LASTFM_USERNAME: 
    ND_LASTFM_APIKEY: 
  template:
    metadata:
      name: n8n-secrets
      namespace: n8n
