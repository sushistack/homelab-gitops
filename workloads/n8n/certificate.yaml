# Story 4.7 — per-host production TLS for n8n. cert-manager issues a browser-trusted cert for the
# single host ${SECRET:DOMAIN_N8N} from the PRODUCTION DNS-01 ClusterIssuer (letsencrypt-prod,
# Story 2.4) into the `n8n-tls` Secret in THIS namespace, served by the websecure IngressRoute.
# Per-host (the copyable Epic 4 pattern) — automatic renewal via cert-manager.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: n8n-tls
spec:
  secretName: n8n-tls
  dnsNames:
    - "${SECRET:DOMAIN_N8N}"   # single public host (tokenized); n8n.<public-zone>
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
