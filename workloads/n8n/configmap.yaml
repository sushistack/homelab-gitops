# Story 4.7 — non-secret n8n config (ports the non-secret env from docker-compose.yml:17-24).
# Consumed via `envFrom: configMapRef` in the Deployment. The ONLY secret n8n consumes —
# N8N_ENCRYPTION_KEY — is NOT here; it lives in the n8n-secrets SealedSecret (sealedsecret.yaml),
# injected by a SEPARATE envFrom: secretRef (Reconciliation 1 — the disaster gate).
#
# Public host is tokenized (${SECRET:DOMAIN_N8N}) so no host literal lands in Git — the render CMP
# substitutes the real host at ArgoCD sync time (same mechanism as the IngressRoute/Certificate).
# WEBHOOK_URL + N8N_BASE_URL are CRITICAL: every webhook-trigger node builds its public callback URL
# from these — a wrong value silently breaks every inbound webhook while the pod stays Healthy.
apiVersion: v1
kind: ConfigMap
metadata:
  name: n8n-config
data:
  N8N_HOST: "${SECRET:DOMAIN_N8N}"
  N8N_PORT: "5678"
  WEBHOOK_URL: "https://${SECRET:DOMAIN_N8N}/"
  N8N_BASE_URL: "https://${SECRET:DOMAIN_N8N}"
  GENERIC_TIMEZONE: "Asia/Seoul"
  TZ: "Asia/Seoul"
  N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"   # ports the Compose setting — workflows may read process env
