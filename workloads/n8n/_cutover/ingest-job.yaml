# Story 4.7 — ONE-SHOT ingest Job (n8n.md / stateful-cutover.md Step 3). THROWAWAY scaffolding:
# NOT listed in workloads/n8n/kustomization.yaml, so the ApplicationSet/ArgoCD never manages it
# (// ponytail: let ArgoCD own this and it fights you on the next sync). Apply by hand during the
# WRITE-FROZEN cutover window, then delete.
#
# It parks a pod holding the n8n PVC open at /home/node/.n8n so the operator can copy the consistent,
# write-frozen `data/n8n/` tree (database.sqlite from `sqlite3 .backup` of the STOPPED Compose n8n,
# plus config / nodes / storage / settings) into it, then exits:
#
#   # 0. (write-freeze already done on the Compose host: `docker compose stop n8n`)
#   kubectl apply -f workloads/n8n/_cutover/ingest-job.yaml
#   pod=$(kubectl -n n8n get pod -l job-name=n8n-ingest -o name | head -1)
#   # carry the WHOLE tree (config = encryption-key fallback, binaryData, installed nodes, settings):
#   ssh root@${SECRET:IP_COMPOSE} 'tar -C /opt/docker/data/n8n -cf - .' \
#     | kubectl -n n8n exec -i "${pod#pod/}" -- tar -C /home/node/.n8n -xf -
#   # ownership: n8n runs as uid 1000 — fix it so the pod can write its own home dir
#   kubectl -n n8n exec "${pod#pod/}" -- chown -R 1000:1000 /home/node/.n8n
#   kubectl -n n8n exec "${pod#pod/}" -- sh -c \
#     'ls -l /home/node/.n8n/database.sqlite && sqlite3 /home/node/.n8n/database.sqlite \
#        "select count(*) from credentials_entity; select count(*) from workflow_entity;"'
#   kubectl -n n8n delete -f workloads/n8n/_cutover/ingest-job.yaml
#
# Then the steady-state n8n Deployment starts against the populated PVC (Step 4). RWO: this Job and
# the app pod must not hold the volume at the same time on different nodes — run ingest BEFORE the
# Deployment exists, or scale the Deployment to 0 (with autosync suspended) during ingest.
apiVersion: batch/v1
kind: Job
metadata:
  name: n8n-ingest
  namespace: n8n
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: ingest
          image: alpine:3.20   # needs a shell + sqlite3/tar for cp + verify; pin by digest if desired
          command:
            - /bin/sh
            - -c
            - "apk add --no-cache sqlite >/dev/null; echo 'ready for tar into /home/node/.n8n; sleeping'; sleep 3600"
          volumeMounts:
            - name: data
              mountPath: /home/node/.n8n
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: n8n-data
