apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - pvc.yaml                  # n8n-data (RWO, DB-class) — Prune=false/Retain
  - configmap.yaml            # n8n-config: non-secret env (envFrom: configMapRef)
  - deployment.yaml
  - service.yaml
  - ingressroute.yaml         # web->websecure (TLS serve + HTTP->HTTPS redirect); host tokenized
  - certificate.yaml          # per-host cert-manager Certificate -> n8n-tls (letsencrypt-prod)
  - backup-cronjob.yaml       # DB-class backup actor (online sqlite3 .backup -> R2)
  - sealedsecret.yaml         # n8n-secrets: N8N_ENCRYPTION_KEY (the disaster gate; envFrom: secretRef)
  - sealedsecret-backup-r2.yaml  # n8n-backup-r2: R2 cred for the CronJob (sealed to name+ns)
# NOT included on purpose:
#   _cutover/   -> one-shot ingest Job, applied by hand during the write-frozen cutover (must NOT be
#                 ArgoCD-managed). No networkpolicy.yaml: cluster is allow-all today; a per-ns
#                 default-deny is platform-baseline debt (same deferral as navidrome 4.3), not n8n's
#                 to introduce — n8n is single-component (no east-west isolation need).

# Use `labels:` (newer field), NEVER commonLabels (pollutes selectors -> immutable conflict) and
# NEVER namePrefix (breaks the name+ns binding SealedSecrets are sealed against). includeSelectors:
# false keeps these out of spec.selector / matchLabels (hand-written in deployment.yaml).
labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/name: n8n
      app.kubernetes.io/instance: n8n
      app.kubernetes.io/part-of: n8n
      app.kubernetes.io/managed-by: argocd
      app.kubernetes.io/component: app
