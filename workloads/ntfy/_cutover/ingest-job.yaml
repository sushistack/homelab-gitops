# Story 4.1 — ONE-SHOT ingest Job (stateful-cutover.md Step 3). THROWAWAY scaffolding:
# NOT listed in workloads/ntfy/kustomization.yaml, so the ApplicationSet/ArgoCD never manages it
# (// ponytail: let ArgoCD own this and it fights you on the next sync). Apply by hand during the
# cutover, then delete.
#
# It only parks a pod that holds the ntfy-data PVC open so the operator can copy the two consistent
# `.backup` files (taken from live Compose, Step 2) into it, then exits:
#
#   kubectl apply -f workloads/ntfy/_cutover/ingest-job.yaml
#   pod=$(kubectl -n ntfy get pod -l job-name=ntfy-ingest -o name | head -1)
#   kubectl -n ntfy cp ./auth.db  "${pod#pod/}:/data/auth.db"
#   kubectl -n ntfy cp ./cache.db "${pod#pod/}:/data/cache.db"
#   kubectl -n ntfy exec "${pod#pod/}" -- sh -c 'ls -l /data && sqlite3 /data/auth.db "select count(*) from user;"'
#   kubectl -n ntfy delete -f workloads/ntfy/_cutover/ingest-job.yaml
#
# Then the steady-state ntfy Deployment starts against the populated PVC (Step 4). RWO: this Job and
# the app pod must not hold the volume at the same time on different nodes — run ingest BEFORE the
# Deployment exists, or scale the Deployment to 0 during ingest.
apiVersion: batch/v1
kind: Job
metadata:
  name: ntfy-ingest
  namespace: ntfy
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: ingest
          image: alpine:3.20   # only needs `sleep` + a shell for `kubectl cp`; pin by digest if desired
          command: ["/bin/sh", "-c", "echo 'ready for kubectl cp into /data; sleeping'; sleep 3600"]
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ntfy-data
