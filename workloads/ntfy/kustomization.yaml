apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - pvc.yaml
  - deployment.yaml
  - service.yaml
  - ingressroute.yaml      # web->websecure (TLS serve + HTTP->HTTPS redirect); host tokenized
  - certificate.yaml       # per-host cert-manager Certificate -> ntfy-tls Secret (letsencrypt-prod)
  - backup-cronjob.yaml    # the reusable backup actor (replaces the offen sidecar)
  - sealedsecret.yaml      # ntfy-backup-r2: R2 cred for the CronJob (sealed to name+ns; safe to commit)
# NOT included on purpose:
#   _cutover/          -> one-shot ingest Job, applied by hand during the cutover (must NOT be ArgoCD-managed)

# server.yml -> ntfy-config ConfigMap, mounted at /etc/ntfy/server.yml.
# disableNameSuffixHash so the Deployment can reference the stable name `ntfy-config`.
configMapGenerator:
  - name: ntfy-config
    files:
      - server.yml
generatorOptions:
  disableNameSuffixHash: true

# Use `labels:` (newer field), NEVER commonLabels (pollutes selectors -> immutable conflict) and
# NEVER namePrefix (breaks the name+ns binding SealedSecrets are sealed against). includeSelectors:
# false keeps these out of spec.selector / matchLabels (hand-written in deployment.yaml).
labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/name: ntfy
      app.kubernetes.io/instance: ntfy
      app.kubernetes.io/part-of: ntfy
      app.kubernetes.io/managed-by: argocd
      app.kubernetes.io/component: app
