# Story 4.1 — public route for ntfy: web -> websecure, TLS from the ntfy-tls Secret (certificate.yaml);
# plain HTTP 301-redirects to HTTPS. Same worked shape as the draw route (Story 1.4/1.5).
# Host is tokenized (${SECRET:DOMAIN_NTFY}); the render CMP substitutes at ArgoCD sync time.
# traefik.io/v1alpha1 (v3) — the old traefik.containo.us API silently fails.
#
# CUTOVER (live, no file): the cloudflared tunnel origin for this host points at https://<node>:443
# with originServerName=${SECRET:DOMAIN_NTFY} and a real LE-prod origin cert. The cutover SWITCH is
# flipping that cloudflared route NPM -> Traefik (docs/runbooks/stateful-cutover.md Step 6); flipping
# it back to NPM is the rollback (Compose stays live the whole time).
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: ntfy-redirect-https
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
# HTTPS (websecure :443) — serves ntfy with the cert-manager cert.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ntfy
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`${SECRET:DOMAIN_NTFY}`)
      kind: Rule
      services:
        - name: ntfy
          port: 80
  tls:
    secretName: ntfy-tls
---
# HTTP (web :80) — 301 to HTTPS via the redirect middleware.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ntfy-redirect
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`${SECRET:DOMAIN_NTFY}`)
      kind: Rule
      middlewares:
        - name: ntfy-redirect-https
      services:
        - name: ntfy   # required by the IngressRoute schema; the middleware redirects before it is hit
          port: 80
