# Pinned component versions — the GitOps-revertible single source of truth (NFR14).
# Re-confirm the exact tags at install time; bump here (not ad-hoc on the host).

k3s:
  # Phase 2a (Story 2.1): 3-node cluster, EMBEDDED ETCD (node 1 `--cluster-init`; nodes 2/3 join
  # as `server`), k3s-bundled Traefik. NOT v1.36 — stay on the 1.35 line so etcd stays on the 3.5
  # series (v1.36 ships etcd 3.6, the component we most fear bumping). Re-confirm the +k3sN suffix.
  version: v1.35.5+k3s1

argocd:
  # Helm chart whose appVersion is ArgoCD 3.4.x. Vendor chart referenced as a source — not mirrored.
  # Phase 2a: now also SELF-MANAGED via argocd/apps/argocd.yaml (this same chartVersion), so upgrades
  # are a one-line bump here + a manual self-app sync (AR5/NFR14).
  repo: https://argoproj.github.io/argo-helm
  chart: argo-cd
  chartVersion: 9.5.21   # -> appVersion v3.4.3
  appVersion: v3.4.3

helm:
  # The Helm CLI is just the install tool, but pin it too: the upstream get-helm-3
  # script was being fetched from the moving `main` branch. Pin the script to a tag
  # AND the binary it installs (DESIRED_VERSION) so the host bootstrap is reproducible.
  installerRef: v3.16.4   # tag of helm/helm whose scripts/get-helm-3 we fetch
  version: v3.16.4        # DESIRED_VERSION the script installs

cert-manager:
  # Story 1.5: Phase 1 NON-PRODUCTION TLS (LE staging + Cloudflare DNS-01). Vendor Helm
  # chart referenced as an ArgoCD `source` (argocd/apps/cert-manager.yaml) — NOT mirrored.
  # For cert-manager the chart version == the app version. v1.19.x uses `crds.enabled: true`
  # (older charts used `installCRDs: true`). ServerSideApply required (CRD annotations are large).
  repo: https://charts.jetstack.io
  chart: cert-manager
  chartVersion: v1.19.5
  appVersion: v1.19.5

longhorn:
  # Story 2.2: persistent storage, wave 0 (must exist before any workload PVC). Vendor Helm
  # chart referenced as an ArgoCD `source` (argocd/apps/longhorn.yaml) — NOT mirrored.
  # Chart version == release version WITHOUT the leading `v`; appVersion carries the `v`.
  # PIN THE V1 DATA ENGINE EXPLICITLY: V2 went *GA* in v1.12.0 (not just tech-preview anymore),
  # so an unset defaultDataEngine is a real risk of landing on V2 — see the app values (AR6).
  # ServerSideApply required (Longhorn CRD annotations exceed client-side apply — AR7).
  repo: https://charts.longhorn.io
  chart: longhorn
  chartVersion: 1.12.0     # -> appVersion v1.12.0 (released 2026-06-02)
  appVersion: v1.12.0

sealed-secrets:
  # Story 2.3: workload-secret encryption, wave 0 (controller + CRD must exist before any
  # later-wave workload references a materialized Secret). Vendor Bitnami Helm chart referenced
  # as an ArgoCD `source` (argocd/apps/sealed-secrets.yaml) — NOT mirrored.
  # Chart 2.18.6 maps to controller appVersion 0.37.0 (verified against the chart's Chart.yaml at
  # install time, per Dev Notes). The local `kubeseal` CLI is pinned to the SAME v0.37.0 so the
  # sealing format stays aligned with the controller. ServerSideApply required (large CRD — AR7).
  repo: https://bitnami.github.io/sealed-secrets   # repo moved bitnami-labs -> bitnami (old Pages site 404s)
  chart: sealed-secrets
  chartVersion: 2.18.6     # -> appVersion v0.37.0
  appVersion: v0.37.0
  kubeseal: v0.37.0        # local CLI pin — keep in lockstep with appVersion on any bump
