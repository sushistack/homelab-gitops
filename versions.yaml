  anytype-anysync:
    manifest: workloads/anytype/deployment-anysync.yaml
    image: ghcr.io/grishy/any-sync-bundle@sha256:f25e0a648c78a3b36fa44dc8c0deda8c4b35c8b3f50799f04b31ba4531e732d5
  karakeep-web:
    manifest: workloads/karakeep/deployment-web.yaml
    image: ghcr.io/karakeep-app/karakeep@sha256:64d6a9bbf2d37b5c808cf06b5d87f1f1c7846fdd3844724145a9741aeb06fd31
  karakeep-meilisearch:
    manifest: workloads/karakeep/deployment-meilisearch.yaml
    image: getmeili/meilisearch@sha256:860fa4baed04ae1c235de870edab0c8006227546dea1bbb6411fbfc5e27cf1db
  karakeep-chrome:
