# No selector — Endpoints below routes to the Anki LXC at ${SECRET:IP_ANKI_LXC}:27701.
# Traefik picks this up as a normal backend via the IngressRoute in this same namespace.
apiVersion: v1
kind: Service
metadata:
  name: anki-sync
  namespace: anki-sync
spec:
  type: ClusterIP
  ports:
    - name: sync
      port: 27701
      targetPort: 27701
---
apiVersion: v1
kind: Endpoints
metadata:
  name: anki-sync
  namespace: anki-sync
subsets:
  - addresses:
      - ip: "${SECRET:IP_ANKI_LXC}"
    ports:
      - name: sync
        port: 27701
