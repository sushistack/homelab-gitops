# Stage 2 (public-host-automation) — cloudflared run config, FULLY git-managed.
#
# This tunnel ("home-server-local", id 761ca633…) was created with config_src=local, so it is
# LOCALLY-MANAGED: cloudflared uses the ingress below as the source of truth and pushes it up to CF
# for display (it does NOT fetch a remote config). The old dashboard-created tunnel (26586f61…,
# remotely-managed) could not be converted in place — its remote config had no DELETE (1089) and
# rejected an empty PUT (1056) — so we cut over to a fresh local tunnel and re-pointed every public
# CNAME (blue-green, zero downtime). The old tunnel is decommissioned.
#
# Single catch-all → Traefik: Traefik does all host routing, so this never changes when a host is
# added. The public/internal gate is external-dns (Stage 1: does a public CF record exist?).
# noTLSVerify: the cloudflared→Traefik hop is in-cluster and not browser-facing (browser sees CF's
# edge cert). Adding a public host = IngressRoute + external-dns target annotation only.
apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared-config
  namespace: cloudflared
data:
  config.yaml: |
    tunnel: 761ca633-e9d6-4af8-8508-727bba00f0a9
    credentials-file: /etc/cloudflared/creds/credentials.json
    metrics: 0.0.0.0:2000
    no-autoupdate: true
    ingress:
      - service: https://10.0.0.101:443
        originRequest:
          noTLSVerify: true
