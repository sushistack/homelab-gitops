# Stage 2 (public-host-automation) — cloudflared run config (credentials-file mode; token mode escaped).
#
# IMPORTANT — ingress is NOT here: this tunnel was created in the CF dashboard, so it is
# REMOTELY-MANAGED. cloudflared always uses the tunnel's remote (CF-side) ingress config and ignores
# any local `ingress:` block (verified: the local block was overridden; the API has no DELETE for the
# remote config — code 1089). So ingress lives in CF, set once to a single catch-all → Traefik:
#     PUT /accounts/<acc>/cfd_tunnel/<id>/configurations
#       {"config":{"ingress":[{"service":"https://10.0.0.101:443","originRequest":{"noTLSVerify":true}}]}}
# That catch-all never changes when a host is added (Traefik does host routing; the gate is external-dns
# Stage 1 — does a public CF record exist?). The toil is gone; the ingress just isn't in git for THIS
# tunnel. True git-SSOT would require recreating the tunnel as locally-managed (new id + re-point all
# CNAMEs) or managing the catch-all via Terraform (cloudflare provider) — deferred, not worth it for one
# static rule. This file therefore carries only tunnel id + credentials path.
apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared-config
  namespace: cloudflared
data:
  config.yaml: |
    tunnel: 26586f61-9c31-4d40-b8c5-8898b1e567e3
    credentials-file: /etc/cloudflared/creds/credentials.json
    metrics: 0.0.0.0:2000
    no-autoupdate: true
