apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - sealedsecret-credentials.yaml     # cloudflared-credentials (credentials.json) — locally-managed tunnel auth
  - configmap.yaml                    # config.yaml: tunnel id + catch-all ingress (git SSOT)
  - deployment.yaml

# labels: (never namePrefix/commonLabels — a SealedSecret is sealed to an exact
# namespace/name; a prefix rewrite breaks decryption — AR27).
labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/name: cloudflared
      app.kubernetes.io/instance: cloudflared
      app.kubernetes.io/part-of: cloudflared
      app.kubernetes.io/managed-by: argocd
      app.kubernetes.io/component: edge
