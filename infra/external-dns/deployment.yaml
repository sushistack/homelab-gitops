# Stage 1 — external-dns (Cloudflare provider). Watches Traefik IngressRoutes and reconciles
# public *.eli.kr CNAMEs into the eli.kr CF zone. Single replica: a DNS reconciler is not
# latency-critical and a second replica would just double the CF API polling (the TXT registry
# makes ownership safe, but there is no leader election here — keep it at 1).
#
# GATE MODEL (whitelist / opt-in): the traefik-proxy source emits a record ONLY for IngressRoutes
# that carry an `external-dns.alpha.kubernetes.io/target` annotation (verified against v0.21.0 — the
# source drops hosts with no target; --default-targets does NOT apply to it, see the dropped flag).
# So PUBLIC hosts opt in with `target: <tunnel>`; everything else has no record = NXDOMAIN
# (deny-by-default). Sensitive infra UIs (argocd/proxmox/openwrt/kvm) additionally carry
# `controller: none` (HARD-LOCK) so a stray target annotation can never publish them.
#
# SAFETY: --policy=upsert-only NEVER deletes. --domain-filter + --zone-id-filter are the blast-radius
# walls. --txt-owner-id stamps a TXT owner on every managed record. The 12 public targets already
# match the live CF records (CNAME -> tunnel, proxied), so first sync is a no-op adoption.
#
# --cloudflare-proxied=true (bare flag): cfargotunnel.com CNAMEs REQUIRE orange-cloud (doc 1.2 said
# false — wrong for a tunnel CNAME, corrected here).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-dns
spec:
  replicas: 1
  strategy:
    type: Recreate   # single owner of the CF zone state; no overlapping reconcilers during rollout
  selector:
    matchLabels:
      app.kubernetes.io/name: external-dns
  template:
    metadata:
      labels:
        app.kubernetes.io/name: external-dns
    spec:
      serviceAccountName: external-dns
      containers:
        - name: external-dns
          # Pinned in versions.yaml (Story 5.3 SSOT). CONFIRM the current stable tag and SWAP TO
          # @sha256 at apply (AR29): crane digest registry.k8s.io/external-dns/external-dns:v0.21.0
          image: registry.k8s.io/external-dns/external-dns:v0.21.0@sha256:f53faaf71cb270d1ca9dce6ea0c94bfebf1a18696263487f0fbc74b9bf2bd7ff
          args:
            - --source=traefik-proxy
            - --provider=cloudflare
            - --domain-filter=eli.kr
            - --zone-id-filter=4367617624907bc338dd9eda8ab5e561   # eli.kr only — the CF token is shared with cert-manager (broader scope); pin the zone too
            - --policy=upsert-only            # this stage: never delete. Promote to sync later (Ask First)
            - --registry=txt
            - --txt-owner-id=homelab-k3s
            # NO --default-targets: it is ignored by the traefik-proxy source in v0.21.0; the public
            # target comes from each route's `external-dns.alpha.kubernetes.io/target` annotation.
            - --cloudflare-proxied             # bare bool (kingpin) = true; cfargotunnel CNAMEs must be orange-cloud
            - --interval=1m
          env:
            - name: TZ
              value: Asia/Seoul
          envFrom:
            - secretRef:
                name: cloudflare-api-token     # CF_API_TOKEN — sealed; envFrom only (AR22/AR27)
          ports:
            - name: http
              containerPort: 7979              # external-dns serves /healthz + metrics here by default
          livenessProbe:
            # a wedged reconciler (e.g. CF API auth stuck) silently stops ALL DNS updates — restart it.
            httpGet:
              path: /healthz
              port: 7979
            failureThreshold: 3
            periodSeconds: 30
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 128Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534          # nobody — image defaults to root; required or kubelet refuses (runAsNonRoot)
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
