# Offsite backup of all active Longhorn volumes (Story 5.10).
# groups:[default] = every volume in Longhorn's default recurring-job group. DETACHED volumes are
# skipped (allowRecurringJobWhileVolumeDetached stays false) so parked/orphan PVCs aren't backed up.
# Backups are incremental after the first full -> tiny on R2 (~3.5 GiB first-full across 16 vols).
#
# MEDIA EXCLUSIONS (operator 2026-06-20): re-acquirable media is kept OUT of offsite to stay lean
# (under the 8 GiB R2 alert threshold / 10 GiB free tier):
#   - navidrome-music (2.47 GiB, music)  - calibre-data (ebook files; both calibre DBs are still
#     dumped to services-backup by the app CronJob, so only the ebook FILES drop offsite).
# Mechanism: Longhorn re-adds the `default` group to any volume that has no other recurring-job
# label, so a bare removal won't stick. Instead each excluded volume carries a dummy job-less group
# `recurring-job-group.longhorn.io/no-offsite=enabled` (no RecurringJob references it) which both
# removes it from `default` AND blocks the auto-re-add. Query the exclusion set with:
#     kubectl -n longhorn-system get volumes.longhorn.io -l recurring-job-group.longhorn.io/no-offsite
# NOT declarative (volume names are dynamic pvc-*). After a DR rebuild, re-exclude with:
#     kubectl -n longhorn-system label volume <music-vol> <calibre-vol> \
#         recurring-job-group.longhorn.io/no-offsite=enabled recurring-job-group.longhorn.io/default-
# Backstop if forgotten: the ops-alerter R2 8 GiB threshold alert fires if they creep back in.
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: offsite-daily
  namespace: longhorn-system
spec:
  task: backup
  cron: "0 */12 * * *"  # every 12h (operator choice 2026-06-20)
  retain: 10            # 10 × 12h = 5 days of backups per volume
  concurrency: 2
  groups:
    - default
