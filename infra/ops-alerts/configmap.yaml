# The four checks, all via apiserver reads (kubectl) + a curl publish to ntfy. Plain ConfigMap
# (stable name, no generator hash needed). No hosts/secrets here — NTFY_TOKEN arrives via envFrom
# from the SealedSecret; NTFY_URL/NTFY_TOPIC are env on the CronJob (AC4).
#
# ponytail: poll + curl, no Prometheus. Re-fires every 15 min while a condition persists (no dedupe
#   state) — acceptable for a 4-condition bus-factor-1 homelab (a real condition SHOULD keep nagging).
#   Phase 3 / NFR15b can replace this with kube-prometheus-stack + an Alertmanager ntfy receiver if
#   alert volume ever justifies a real pipeline.
#
# Message format: STRUCTURED KV CARDS (docs/ntfy-custom-message-format.md). Each alert publishes with
# tag `card` + a JSON body `{"type":"kv","rows":[...]}` so the redesigned ntfy-web/Android clients
# render a key-value table (status dots, inline meters). The title (plain header) still carries the
# gist, so a client without card support degrades to a readable title + raw JSON body, never silence.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ops-alerter-script
  namespace: ops-alerts
data:
  alert.sh: |
    #!/bin/sh
    # ops-alerter — NFR15a critical alerting poller (Story 4.2). Read-only apiserver reads -> ntfy.
    set -eu

    CERT_WARN_DAYS="${CERT_WARN_DAYS:-14}"   # backstop: cert-manager renews at ~2/3 life; <=14d => renewal failing
    DISK_PCT="${DISK_PCT:-80}"
    K3S_PINNED_VERSION="${K3S_PINNED_VERSION:-}"   # default so an unset env doesn't trip set -u mid-pipeline (which would
                                                   # silently drop BOTH (f) version-drift AND (g) NotReady). Empty = skip the
                                                   # (f) version compare only (jq guards on $pin != ""); (g) NotReady still runs.

    # Story 5.8 (AC3) — topic split by CONCERN (not per-app): NFR15a stateful/backup failures ->
    # critical (wake me); NFR15b drift/health -> ops (review when convenient). Beszel node-resource
    # goes to a third topic (homelab-monitor) configured on Beszel's side, not here. Defaults keep the
    # script working even if the CronJob env isn't updated. The ntfy token must hold `wo` on BOTH
    # topics (ntfy is deny-all — operator grants via `ntfy access`, see legacy-teardown.md).
    NTFY_TOPIC_CRITICAL="${NTFY_TOPIC_CRITICAL:-homelab-critical}"
    NTFY_TOPIC_OPS="${NTFY_TOPIC_OPS:-homelab-ops}"

    # Action button (ntfy `actions`): one-tap jump to the triage console. ArgoCD shows cert/service/
    # backup/drift/node state for nearly every alert here, so it's the DEFAULT; R2 capacity/reachability
    # is a Cloudflare-side concern -> those override to the CF dashboard. URLs are STATIC — a `view`
    # action 400s on an empty url (learned from the kuma webhook), so never interpolate a maybe-empty
    # field here. ${SECRET:DOMAIN_ARGOCD} is substituted by the render CMP at sync time (gitleaks-safe
    # token in git; the CMP fails closed if it is ever unresolved, so a broken literal never deploys).
    ARGO_BTN='[{"action":"view","label":"Open ArgoCD","url":"https://${SECRET:DOMAIN_ARGOCD}"}]'
    CF_BTN='[{"action":"view","label":"Open Cloudflare","url":"https://dash.cloudflare.com"}]'

    # Make the egress gotcha LOUD, not silent: if the apiserver is unreachable (the #1 predictable
    # failure once network-baseline default-deny lands without our egress allow), exit non-zero so
    # the Job goes Failed and is visible — rather than every check silently reading nothing.
    kubectl get --raw=/readyz >/dev/null 2>&1 || {
      echo "FATAL: kube-apiserver unreachable — check ops-alerts egress NetworkPolicy (apiserver allow)"; exit 1; }

    now=$(date -u +%s)

    notify() {  # $1 topic, $2 title, $3 rows-JSON (jq array of {key,value,status?,meter?,icon?}), $4 (opt) actions-JSON
      # Structured KV card: tag `card` + body = JSON spec (docs/ntfy-custom-message-format.md §2.1) +
      # a `view` action button ($4, default ARGO_BTN). JSON publish (not X-Title/-d headers): HTTP
      # headers are latin-1, so emoji in the title would mojibake. jq builds the payload (safe escaping);
      # `message` is the spec STRINGIFIED (the body is text that must PARSE to JSON). Publish failure
      # is logged, never aborts the poll.
      acts="${4:-$ARGO_BTN}"
      payload=$(jq -nc --arg topic "$1" --arg t "$2" --argjson rows "$3" --argjson acts "$acts" \
        '{topic:$topic, title:$t, priority:5, tags:["card"],
          message: ({type:"kv", rows:$rows} | tojson), actions:$acts}') \
        || { echo "ERROR: payload build failed [$2]"; return 0; }   # guard: under set -eu a bare $(…) failure aborts the whole poll
      # POST to the ntfy ROOT url (topic is in the JSON body, not the path). Content-Type makes the
      # JSON-publish contract explicit instead of relying on ntfy's lenient root-url body sniffing.
      if curl -fsS --max-time 10 \
           -H "Authorization: Bearer ${NTFY_TOKEN}" \
           -H "Content-Type: application/json" \
           -d "$payload" "${NTFY_URL}" >/dev/null; then
        echo "ALERT sent [$1] [$2]"
      else
        echo "ERROR: ntfy publish failed [$1] [$2]"
      fi
    }

    # (a) cert expiry — alert if notAfter within the warning window (renewal backstop, NFR10)
    kubectl get certificate -A -o json | jq -r --argjson now "$now" --argjson warn "$CERT_WARN_DAYS" '
      .items[] | select(.status.notAfter != null)
      | (.status.notAfter | fromdateiso8601) as $exp
      | select(($exp - $now) <= ($warn * 86400))
      | "\(.metadata.namespace)/\(.metadata.name)\t\(.status.notAfter)"' \
    | while IFS="$(printf '\t')" read -r cert exp; do
        rows=$(jq -nc --arg cert "$cert" --arg exp "$exp" --arg w "$CERT_WARN_DAYS" '[
          {key:"Certificate", value:$cert, icon:"status"},
          {key:"Expires", value:$exp, status:"error"},
          {key:"Window", value:"\($w)d"},
          {key:"Fix", value:"describe certificate, inspect the Order/Challenge (DNS-01/issuer)", icon:"exit"}]') || rows='[]'
        notify "$NTFY_TOPIC_CRITICAL" "🔐 Certificate expiring: $cert" "$rows"
      done

    # (b) Longhorn node disk >= 80%  (usage = 1 - storageAvailable/storageMaximum)
    kubectl get nodes.longhorn.io -A -o json | jq -r --argjson pct "$DISK_PCT" '
      .items[] | .metadata.name as $node
      | (.status.diskStatus // {}) | to_entries[]
      | select((.value.storageMaximum // 0) > 0 and .value.storageAvailable != null)
      | ((1 - (.value.storageAvailable / .value.storageMaximum)) * 100) as $used
      | select($used >= $pct)
      | "\($node)\t\(.key)\t\($used | floor)"' \
    | while IFS="$(printf '\t')" read -r node disk used; do
        rows=$(jq -nc --arg node "$node" --arg disk "$disk" --argjson used "$used" --arg thr "$DISK_PCT" '[
          {key:"Node", value:$node, icon:"host"},
          {key:"Disk", value:$disk, icon:"disk"},
          {key:"Usage", value:"\($used)%", meter:$used},
          {key:"Threshold", value:"\($thr)%"},
          {key:"Fix", value:"Free space or expand the disk in the Longhorn UI", icon:"exit"}]') || rows='[]'
        notify "$NTFY_TOPIC_CRITICAL" "💾 Storage low: $node" "$rows"
      done

    # Stateful namespaces = those carrying a <service>-backup CronJob (the Story 4.1 backup-actor
    # convention). Ties "stateful" to "has a backup actor" -> no noise from disposable workloads
    # (e.g. ytdlp-api), and self-enrolls each new cutover (4.3-4.8) as its backup CronJob lands.
    stateful_ns=$(kubectl get cronjob -A -o json | jq -r \
      '.items[].metadata | select(.name | test("-backup$")) | .namespace' | sort -u)

    # (c) stateful service down — readyReplicas < desired, scoped to stateful namespaces.
    #     NOTE: orthogonal to uptime-kuma's HTTP probes (catches a down pod even when the public
    #     endpoint is cached/healthy or internal-only). Does NOT self-monitor ntfy (the channel) —
    #     ntfy-down is covered out-of-band by Kuma (see runbook: self-monitoring gap).
    for ns in $stateful_ns; do
      kubectl get deploy,statefulset -n "$ns" -o json | jq -r '
        .items[] | select((.status.readyReplicas // 0) < (.spec.replicas // 0))
        | "\(.kind)/\(.metadata.name)\t\(.status.readyReplicas // 0)\t\(.spec.replicas // 0)"' \
      | while IFS="$(printf '\t')" read -r wl ready desired; do
          rows=$(jq -nc --arg wl "$wl" --arg ns "$ns" --arg ready "$ready" --arg desired "$desired" '[
            {key:"Workload", value:$wl, icon:"service"},
            {key:"Namespace", value:$ns},
            {key:"Ready", value:"\($ready)/\($desired)", status:"error"},
            {key:"Fix", value:"get pods, then describe / logs the not-ready pod", icon:"exit"}]') || rows='[]'
          notify "$NTFY_TOPIC_CRITICAL" "🔴 Service down: $ns/$wl" "$rows"
        done
    done

    # (d) backup/restore Job failure — any Job whose name carries the -backup OR -restore convention
    #     with status.failed>=1. Matches CronJob-spawned backups (ntfy-backup-<ts>, navidrome-backup-<ts>)
    #     AND one-off cutover restore Jobs (miniflux-restore, ...). AC1(d) covers backup *and* restore.
    kubectl get jobs -A -o json | jq -r '
      .items[] | select((.status.failed // 0) >= 1) | select(.metadata.name | test("-(backup|restore)"))
      | "\(.metadata.namespace)/\(.metadata.name)\t\(.status.failed)"' \
    | while IFS="$(printf '\t')" read -r job failed; do
        rows=$(jq -nc --arg job "$job" --arg failed "$failed" '[
          {key:"Job", value:$job, icon:"status"},
          {key:"Failed", value:$failed, status:"error", icon:"error"},
          {key:"Fix", value:"kubectl logs job/<name>; re-run after fixing creds / R2 / disk", icon:"exit"}]') || rows='[]'
        notify "$NTFY_TOPIC_CRITICAL" "❌ Backup/restore failed: $job" "$rows"
      done

    # ---- NFR15b: version/config drift (Story 5.1) ------------------------------------------------

    # (e) ArgoCD app drift — ArgoCD ALREADY computes live-vs-desired, so OutOfSync == config/version
    #     drift and Degraded/Missing/Unknown == broken. ONE read covers every ArgoCD-managed component
    #     (longhorn, cert-manager, sealed-secrets, all workloads). DRIFT_SYNC_IGNORE lists apps whose
    #     OutOfSync is benign steady-state: the self-managed `argocd` app is PERPETUALLY OutOfSync on
    #     its own CMs/Secrets (a Helm/SSA self-diff, not drift). Health is NEVER ignored — a Degraded
    #     argocd is a real alert. "Newer upstream exists" is Renovate's PR path, NOT alerted here.
    # ponytail: ArgoCD's OutOfSync IS the drift detector — read the CR, don't rebuild a version table.
    DRIFT_SYNC_IGNORE="${DRIFT_SYNC_IGNORE:-argocd}"
    kubectl get applications.argoproj.io -n argocd -o json | jq -r --arg ignore "$DRIFT_SYNC_IGNORE" '
      ($ignore | split(" ")) as $ig
      | .items[]
      | (.metadata.name) as $app
      | (.status.sync.status // "Unknown") as $sync
      | (.status.health.status // "Unknown") as $health
      | select(
          (["Degraded","Missing","Unknown"] | index($health))
          or ($sync != "Synced" and ($ig | index($app) | not))
        )
      | "\($app)\t\($sync)\t\($health)"' \
    | while IFS="$(printf '\t')" read -r app sync health; do
        rows=$(jq -nc --arg app "$app" --arg sync "$sync" --arg health "$health" '[
          {key:"App", value:$app, icon:"status"},
          {key:"Sync", value:$sync, status:(if $sync=="Synced" then "ok" else "error" end)},
          {key:"Health", value:$health, status:(if $health=="Healthy" then "ok" else "error" end)},
          {key:"Fix", value:"argocd app diff: revert+sync if wrong, else update Git to match", icon:"exit"}]') || rows='[]'
        notify "$NTFY_TOPIC_OPS" "🌥️ ArgoCD drift: $app" "$rows"
      done

    # (f) k3s node version drift + (g) node NotReady — ONE nodes read, two branches (no extra RBAC).
    #     k3s is the one component ArgoCD does NOT manage (k3s owns Traefik + its own version), so its
    #     pin lives in versions.yaml and is baked in as K3S_PINNED_VERSION at author time (the cluster
    #     can't read Git). Version drift = a node hand-upgraded past the pin (no-silent-upgrade rule).
    #     NotReady = a node down — the multi-node-on-one-host SPOF/health signal (pairs w/ Story 5.2).
    kubectl get nodes -o json | jq -r --arg pin "$K3S_PINNED_VERSION" '
      .items[]
      | .metadata.name as $node
      | (.status.nodeInfo.kubeletVersion) as $ver
      | ([.status.conditions[] | select(.type=="Ready") | .status][0] // "Unknown") as $ready
      | (if ($pin != "" and $ver != $pin) then "\($node)\tversion\t\($ver)\t\($pin)" else empty end),
        (if $ready != "True" then "\($node)\tnotready\tReady=\($ready)\t" else empty end)' \
    | while IFS="$(printf '\t')" read -r node kind detail pin; do
        if [ "$kind" = "version" ]; then
          rows=$(jq -nc --arg node "$node" --arg ver "$detail" --arg pin "$pin" '[
            {key:"Node", value:$node, icon:"host"},
            {key:"kubelet", value:$ver, status:"warn", icon:"version"},
            {key:"Pinned", value:$pin, icon:"version"},
            {key:"Fix", value:"Roll back to the pin, or bump versions.yaml + K3S_PINNED_VERSION if intended", icon:"exit"}]') || rows='[]'
          notify "$NTFY_TOPIC_OPS" "⬆️ k3s version drift: $node" "$rows"
        else
          rows=$(jq -nc --arg node "$node" --arg state "$detail" '[
            {key:"Node", value:$node, icon:"host"},
            {key:"State", value:$state, status:"error"},
            {key:"Fix", value:"describe node, check the host (Proxmox VM up? kubelet running?)", icon:"exit"}]') || rows='[]'
          notify "$NTFY_TOPIC_OPS" "🔴 Node NotReady: $node" "$rows"
        fi
      done

    # ---- Story 5.8 (AC2): R2 backup capacity + freshness + rotation -----------------------------
    # Folded INTO this poller, NOT a new monitor (Reconciliation 3 / NFR15 = lightweight ntfy alerting).
    # Reuses the bucket-scoped R2 cred via the ops-alerts-r2 SealedSecret (a reseal of ntfy-backup-r2
    # to ns ops-alerts) — LIVE since 5.8 (gitops a800d21). The block stays self-disabling if that cred
    # is ever removed: RCLONE_CONFIG_R2_TYPE unset -> the whole block is a no-op, poller keeps working.
    # rclone is apk-added on demand (same approach as the backup actors). The cred is literally an
    # rclone remote config (RCLONE_CONFIG_R2_*), so `r2:` works with zero extra setup.
    # ponytail: rclone size + ONE recursive lsjson per bucket; jq does the per-prefix math. No
    #   Cloudflare GraphQL R2-analytics API (MB-scale DB dumps — listing is instant). Single global
    #   staleness threshold (every backup actor runs */6h — per-svc intervals would be over-engineering).
    #   The date-parse + group-by jq logic is mirrored in test-r2-parse.sh — keep the two in sync.
    if [ -n "${RCLONE_CONFIG_R2_TYPE:-}" ]; then
      if apk add --no-cache rclone >/dev/null 2>&1; then
        R2_THRESHOLD_GB="${R2_THRESHOLD_GB:-8}"        # alert before the ~10 GB R2 free tier
        R2_STALE_HOURS="${R2_STALE_HOURS:-13}"         # 2x the 6h backup cadence + headroom; newer = healthy
        R2_RETENTION_DAYS="${R2_RETENTION_DAYS:-35}"   # oldest object older than this => rotation (4.8 `|| true`) broke
        SVC_BUCKET=homelab-k3s-services-backup
        LH_BUCKET=homelab-k3s-backup

        # Reachability gate (Story 5.8 review): if R2 itself is unreachable (cred expiry, network,
        # R2 5xx), the checks below would silently degrade — `rclone size` -> 0 (never trips capacity)
        # and the listing -> empty (never trips STALE/OLD) — going BLIND exactly when backups may also
        # be failing. Probe once; if it fails, alert + skip (re-fires every poll while down — same
        # no-dedupe contract as the rest of this poller). lsd exits non-zero on error but 0 on empty,
        # so it distinguishes "can't reach R2" from "bucket is empty".
        if ! rclone lsd "r2:$SVC_BUCKET" >/dev/null 2>&1; then
          rows=$(jq -nc --arg b "$SVC_BUCKET" '[
            {key:"Target", value:"r2:\($b)", icon:"net"},
            {key:"State", value:"unreachable", status:"error"},
            {key:"Impact", value:"capacity / freshness / rotation checks skipped (backup monitoring blind)"},
            {key:"Fix", value:"Check R2 credentials / network / endpoint", icon:"exit"}]') || rows='[]'
          notify "$NTFY_TOPIC_OPS" "🔌 R2 unreachable" "$rows" "$CF_BTN"
        else
          # (a) capacity — total bytes per bucket vs threshold
          for b in "$SVC_BUCKET" "$LH_BUCKET"; do
            bytes=$(rclone size "r2:$b" --json 2>/dev/null | jq -r '.bytes // 0' 2>/dev/null || echo 0)
            gb=$(( bytes / 1073741824 ))
            if [ "$gb" -ge "$R2_THRESHOLD_GB" ]; then
              rows=$(jq -nc --arg b "$b" --argjson gb "$gb" --arg thr "$R2_THRESHOLD_GB" '[
                {key:"Bucket", value:"r2:\($b)", icon:"disk"},
                {key:"Size", value:"\($gb)GiB", status:"error"},
                {key:"Threshold", value:"\($thr)GiB (free tier ~10GB)"},
                {key:"Fix", value:"Prune old backups or raise the limit", icon:"exit"}]') || rows='[]'
              notify "$NTFY_TOPIC_CRITICAL" "💽 R2 capacity: $b" "$rows" "$CF_BTN"
            fi
          done

          # (b) freshness (broke backup actor) + (c) rotation (broke retention) — ONE recursive listing
          #     of the services bucket, grouped by <svc>/ prefix. Longhorn's bucket uses its own layout
          #     (not <svc>/), so it gets the capacity check only; its job health is the RecurringJob's.
          stale=$(( R2_STALE_HOURS * 3600 )); ret=$(( R2_RETENTION_DAYS * 86400 ))
          rclone lsjson -R --files-only "r2:$SVC_BUCKET" 2>/dev/null \
          | jq -r --argjson now "$now" --argjson stale "$stale" --argjson ret "$ret" '
              # rclone ModTime: 2026-06-19T10:00:00.123456789Z -> strip fractional secs -> ISO8601 epoch
              def epoch: sub("\\.[0-9]+Z$";"Z") | fromdateiso8601;
              [ .[] | select(.Path | contains("/")) | {svc: (.Path|split("/")[0]), t: (.ModTime|epoch)} ]
              | group_by(.svc)[]
              | { svc: .[0].svc, newest: (map(.t)|max), oldest: (map(.t)|min) }
              | ( if ($now - .newest) > $stale then "STALE\t\(.svc)\t\((($now-.newest)/3600)|floor)" else empty end ),
                ( if ($now - .oldest) > $ret  then "OLD\t\(.svc)\t\((($now-.oldest)/86400)|floor)"  else empty end )' \
          | while IFS="$(printf '\t')" read -r kind svc age; do
              if [ "$kind" = "STALE" ]; then
                rows=$(jq -nc --arg svc "$svc" --arg age "$age" --arg b "$SVC_BUCKET" '[
                  {key:"Service", value:$svc, icon:"service"},
                  {key:"Newest", value:"\($age)h old", status:"error"},
                  {key:"Path", value:"r2:\($b)/\($svc)/", icon:"disk"},
                  {key:"Fix", value:"Check the \($svc)-backup CronJob logs (actor may have silently stopped)", icon:"exit"}]') || rows='[]'
                notify "$NTFY_TOPIC_CRITICAL" "🥪 Backup stale: $svc" "$rows"
              else
                rows=$(jq -nc --arg svc "$svc" --arg age "$age" --arg ret "$R2_RETENTION_DAYS" --arg b "$SVC_BUCKET" '[
                  {key:"Service", value:$svc, icon:"service"},
                  {key:"Oldest", value:"\($age)d old", status:"error"},
                  {key:"Retention", value:"\($ret)d exceeded"},
                  {key:"Path", value:"r2:\($b)/\($svc)/", icon:"disk"},
                  {key:"Fix", value:"Check the rotation logic / permissions (rclone delete failing)", icon:"exit"}]') || rows='[]'
                notify "$NTFY_TOPIC_CRITICAL" "🗑️ Backup not rotating: $svc" "$rows"
              fi
            done
        fi
      else
        rows=$(jq -nc '[
          {key:"State", value:"rclone install failed", status:"error"},
          {key:"Impact", value:"R2 capacity / freshness / rotation skipped this poll"},
          {key:"Fix", value:"Check the apk CDN egress", icon:"exit"}]') || rows='[]'
        notify "$NTFY_TOPIC_OPS" "🔌 R2 unreachable" "$rows" "$CF_BTN"
      fi
    fi

    echo "ops-alerter poll complete"
