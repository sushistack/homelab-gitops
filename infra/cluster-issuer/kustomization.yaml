apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - clusterissuer.yaml   # Story 1.5: LE staging + Cloudflare DNS-01 (non-production)

# `labels:` (newer field), NEVER commonLabels / namePrefix (see workloads/excalidraw note).
# includeSelectors: false — these are metadata labels, not selectors.
labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/name: cluster-issuer
      app.kubernetes.io/instance: cluster-issuer
      app.kubernetes.io/part-of: cert-manager
      app.kubernetes.io/managed-by: argocd
      app.kubernetes.io/component: tls
