# Story 2.4 — Task 1: Phase 2a PRODUCTION ClusterIssuer (LE PRODUCTION + Cloudflare DNS-01).
#
# Promoted from the Story 1.5 letsencrypt-staging issuer. This is the one-line promotion the
# 1.5 DNS-01 solver shape was built for: the ACME `server` swaps acme-staging-v02 -> acme-v02
# and the issuer gets a fresh account key. The dns01 cloudflare solver + apiTokenSecretRef are
# REUSED UNCHANGED — the exact machinery proven on staging now issues browser-trusted certs.
#
# PRODUCTION LE HAS REAL RATE LIMITS (per-registered-domain weekly + 5 duplicate-certs/week).
# The 1.5 staging rehearsal existed so this issues right the first time. The wildcard Certificate
# (workloads/excalidraw/certificate.yaml) further reduces issuance pressure. Issue once, verify.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory   # PRODUCTION — browser-trusted (was acme-staging-v02 in Phase 1)
    email: ${SECRET:ACME_EMAIL}   # tokenized: keep PII out of the public repo (render CMP substitutes at sync)
    privateKeySecretRef:
      name: letsencrypt-prod-account-key   # FRESH ACME account key (do NOT reuse the staging account)
    solvers:
      - dns01:
          cloudflare:
            # AR4 bootstrap secret: a PLAIN Secret injected DIRECTLY by Ansible into ns cert-manager
            # (NOT a SealedSecret — bootstrap creds stay out of Sealed Secrets to avoid a circular dep).
            # Token is least-privilege scoped Zone:DNS:Edit on the public zone only (NFR11).
            # Operator step (see runbook): kubectl create secret generic cloudflare-dns01-token \
            #   -n cert-manager --from-literal=api-token=<CF API token, Zone:DNS:Edit on the public zone>
            apiTokenSecretRef:
              name: cloudflare-dns01-token
              key: api-token
        selector:
          dnsZones:
            - ${SECRET:DOMAIN_PUBLIC}   # scope the solver to the public DNS zone (tokenized)
